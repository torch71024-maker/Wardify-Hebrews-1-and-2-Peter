          <div style={{fontSize:'.88rem',color:'rgba(90,190,130,0.55)'}}>{correct} of {history.length} correct</div>
        </div>

        {/* Review */}
        <div style={{...dc,padding:'.85rem 1rem',marginBottom:'1.2rem',maxHeight:'45vh',overflowY:'auto'}}>
          <div style={{fontFamily:'Cinzel,serif',fontSize:'.52rem',letterSpacing:'.14em',color:'rgba(70,180,120,0.38)',marginBottom:'.55rem'}}>REVIEW</div>
          {history.map((h,i)=>(
            <div key={i} style={{borderBottom:'1px solid rgba(40,100,65,0.18)',paddingBottom:'.55rem',marginBottom:'.55rem',lastChild:{border:'none'}}}>
              <div style={{fontSize:'.78rem',color:'rgba(100,190,140,0.55)',marginBottom:'.18rem',fontStyle:'italic'}}>{h.prompt}</div>
              <div style={{display:'flex',alignItems:'center',gap:'.45rem',flexWrap:'wrap'}}>
                <span style={{fontSize:'.88rem',color:h.correct?'rgba(70,220,120,0.85)':'rgba(210,60,60,0.85)'}}>{h.correct?'✓':'✗'}</span>
                {!h.correct&&<span style={{fontSize:'.82rem',color:'rgba(210,80,80,0.7)',textDecoration:'line-through'}}>{h.chosen}</span>}
                <span style={{fontSize:'.88rem',color:'rgba(130,240,170,0.8)'}}>{h.answer}</span>
              </div>
            </div>
          ))}
        </div>

        <div style={{display:'flex',gap:'.8rem',justifyContent:'center'}}>
          <button onClick={()=>{ startGame(); }} style={{fontFamily:'Cinzel,serif',fontSize:'.82rem',padding:'.58rem 1.6rem',borderRadius:9,border:'none',background:'linear-gradient(135deg,#1a6640,#0d4429)',color:'rgba(140,240,180,0.9)',cursor:'pointer',boxShadow:'0 4px 18px rgba(20,140,70,0.3)'}}>Again</button>
          <button onClick={()=>setPhase('setup')} style={{fontFamily:'Cinzel,serif',fontSize:'.82rem',padding:'.58rem 1.4rem',borderRadius:9,border:'1px solid rgba(50,140,90,0.38)',background:'rgba(5,20,14,0.88)',color:'rgba(90,190,130,0.55)',cursor:'pointer'}}>Change Setup</button>
          <button onClick={onBack} style={{fontFamily:'Cinzel,serif',fontSize:'.82rem',padding:'.58rem 1.2rem',borderRadius:9,border:'1px solid rgba(50,140,90,0.28)',background:'rgba(5,20,14,0.88)',color:'rgba(70,160,105,0.45)',cursor:'pointer'}}>← Back</button>
        </div>
      </div>
    </div>
  );
}


function AnswerJudgeMaterialPage({ onBack }){
  const [ajPhase, setAjPhase] = useState('chapters'); // 'chapters' | 'verses' | 'reader'
  const [ajCh, setAjCh] = useState(null);
  const [ajVerse, setAjVerse] = useState(null);
  const [searchInput, setSearchInput] = useState('');
  const [searchRefs, setSearchRefs] = useState(null);

  // ALL hooks at top level — no hooks after conditional returns
  React.useEffect(()=>{
    if(window.BgMgr) window.BgMgr.setAnswerJudgeMode(true);
    return ()=>{ if(window.BgMgr) window.BgMgr.setAnswerJudgeMode(false); };
  },[]);
  const readerRef = React.useRef(null);
  React.useEffect(()=>{
    if(ajPhase === 'reader'){
      setTimeout(()=>{
        const el = document.getElementById('aj-selected-verse');
        if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
      }, 120);
    }
  }, [ajPhase, ajCh, ajVerse]);

  const allChapters = CHAPTERS_DATA.map(cd => cd.ch);

  function getVerseList(ch){
    return CHAPTERS_DATA.find(cd => cd.ch === ch)?.verses || [];
  }

  function openVerse(ch, v){
    setAjCh(ch); setAjVerse(v);
    setSearchInput(''); setSearchRefs(null);
    setAjPhase('reader');
  }

  function getContextVerses(ch, v){
    const all = [];
    CHAPTERS_DATA.forEach(cd => cd.verses.forEach(vv => all.push({ch:cd.ch, v:vv.v, t:vv.t})));
    const selIdx = all.findIndex(x => x.ch === ch && x.v === v);
    if(selIdx < 0) return [];
    const start = Math.max(0, selIdx - 10);
    const end = Math.min(all.length - 1, selIdx + 10);
    return all.slice(start, end + 1).map(x => ({...x, isSelected: x.ch === ch && x.v === v}));
  }

  function renderVerseText(text){
    return text.split(/([\s\u2014\u2013]+)/).map((token, i) => {
      const core = token.replace(/[^a-zA-Z]/g,'').toLowerCase();
      if(core && KEY_WORDS.has(core)){
        return <span key={i} style={{color:'#e05555',fontWeight:600}}>{token}</span>;
      }
      return <span key={i}>{token}</span>;
    });
  }

  function handleSearch(val){
    setSearchInput(val);
    if(!val.trim()){ setSearchRefs(null); return; }
    // Strip all punctuation (dashes, quotes, periods, commas, etc.) before matching
    const normalize = s => s.toLowerCase().replace(/[-–—"'"'.,;:!?(){}\[\]\/\\]/g, ' ').replace(/\s+/g, ' ').trim();
    const phrase = normalize(val.trim());
    const wordBoundaryRe = new RegExp('(?<![a-z])' + phrase.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '(?![a-z])', 'i');
    const refs = [];
    CHAPTERS_DATA.forEach(cd => cd.verses.forEach(vv => {
      if(wordBoundaryRe.test(normalize(vv.t))) refs.push(`${chLabel(cd.ch)}:${vv.v}`);
    }));
    setSearchRefs(refs);
  }

  const navBtn = {
    fontFamily:"'Cinzel',serif", fontSize:'.72rem', letterSpacing:'.07em',
    padding:'.45rem 1.2rem', borderRadius:8, border:'1px solid var(--c-accent-a)',
    background:'var(--c-sel)', color:'var(--c-accent)', cursor:'pointer', transition:'all .18s',
  };

  if(ajPhase === 'chapters'){
    return (
      <div style={{minHeight:'100vh', position:'relative'}}>

          <button className="kq-nav-btn" onClick={onBack}>Exit</button>
        </div>
        <div style={{maxWidth:600, margin:'0 auto', padding:'5rem 1rem 4rem', fontFamily:"'Crimson Pro',serif", color:'var(--c-body)'}}>
          <div style={{textAlign:'center', marginBottom:'2.2rem'}}>
            <div style={{fontFamily:"'Cinzel',serif", fontSize:'clamp(1.2rem,3.5vw,1.8rem)', fontWeight:600, letterSpacing:'.08em', color:'var(--c-title)', marginBottom:'.3rem'}}>
              Answer Judge Material
            </div>
          </div>
          <div style={{display:'flex', flexWrap:'wrap', gap:'.5rem', justifyContent:'center'}}>
            {allChapters.map(ch => (
              <button key={ch}
                onClick={()=>{ setAjCh(ch); setAjPhase('verses'); }}
                style={{fontFamily:"'Cinzel',serif", fontSize:'.82rem', width:'3rem', height:'3rem',
                  borderRadius:10, border:'1px solid var(--c-accent-a)',

  /* ── READER VIEW ── */

  return (

      {/* Back button top-left */}

      {/* Reference label top-right */}
      <div style={{position:'fixed', top:'1.1rem', right:'1rem', zIndex:60,
        fontFamily:"'Cinzel',serif", fontSize:'.7rem', color:'var(--c-muted)',

        {chLabel(ajCh)}:{ajVerse}
      </div>

      {/* Scrollable verse list */}
      <div ref={readerRef} style={{maxWidth:680, margin:'0 auto', padding:'5rem 1rem 10rem', fontFamily:"'Crimson Pro',serif", color:'var(--c-body)'}}>
        {contextVerses.map(cv => (
          <div key={`${cv.ch}-${cv.v}`}
            id={cv.isSelected ? 'aj-selected-verse' : undefined}
            style={{
              display:'flex', gap:'.6rem', marginBottom:'.6rem',
              padding:'.85rem 1rem', borderRadius:10,
              background: cv.isSelected ? 'rgba(201,162,39,0.14)' : 'var(--c-card)',
              border: cv.isSelected ? '1px solid rgba(201,162,39,0.55)' : '1px solid var(--c-border)',
              boxShadow: cv.isSelected ? '0 0 22px rgba(201,162,39,0.32), 0 0 6px rgba(201,162,39,0.2)' : 'none',

            <div style={{flex:1, lineHeight:1.85, fontSize:'1.02rem',
              color: cv.isSelected ? 'var(--c-title)' : 'var(--c-body)'}}>

        background:'rgba(13,2,33,0.96)', borderTop:'1px solid var(--c-border)',
        backdropFilter:'blur(8px)', padding:'.75rem 1rem'}}>
        <div style={{maxWidth:680, margin:'0 auto'}}>
          <input
            type="text"
            placeholder="Search a phrase… get all references"
            value={searchInput}
            onChange={e=>handleSearch(e.target.value)}
            style={{width:'100%', background:'var(--c-input)', border:'1px solid var(--c-accent-a)',
              borderRadius:8, padding:'.5rem .9rem', fontFamily:"'Crimson Pro',serif",

            <div style={{fontFamily:"'Cinzel',serif", fontSize:'.7rem', color:'var(--c-muted)',

                : searchRefs.map((r,i) => (

                  ))

        </div>
      </div>
    </div>
  );
}

function MoreToolsPage({ onBack, onKeywords, onStudy, onRefMatch, onDrag, onSectionLocator, onOddOneOut, onAnswerJudge }) {
  const canvasRef = React.useRef(null);

  React.useEffect(()=>{
    if(window.BgMgr) window.BgMgr.setToolsMode(true);
    return ()=>{ if(window.BgMgr) window.BgMgr.setToolsMode(false); };
  },[]);

  React.useEffect(()=>{
    const c = canvasRef.current;
    if(!c) return;
    let W = c.width = window.innerWidth;
    let H = c.height = window.innerHeight;
    const ctx = c.getContext('2d');

    const N = 55;
    const nodes = Array.from({length:N},()=>({
      x: Math.random()*W, y: Math.random()*H,
      vx: (Math.random()-.5)*.38, vy: (Math.random()-.5)*.38,
      r: 1.5+Math.random()*3.5,
      hue: 38+Math.random()*30,
      pulse: Math.random()*Math.PI*2,
      pSpd: .012+Math.random()*.018,
    }));

    let t = 0;
    let raf;
    function draw(){
      raf = requestAnimationFrame(draw);
      t += .006;

      // Solid black base — no bleed-through from chapter bg
      ctx.fillStyle = '#000000';
      ctx.fillRect(0,0,W,H);

      // Black pulsing ripples (subtle)
      for(let i=0;i<5;i++){
        const prog = (t*.10 + i/5) % 1;
        const r = prog * Math.max(W,H) * .85;
        const a = (1-prog) * .07;
        ctx.strokeStyle=`rgba(28,28,28,${a})`;
        ctx.lineWidth=1.4;
        ctx.beginPath(); ctx.arc(W/2,H/2,r,0,Math.PI*2); ctx.stroke();
      }

      // Node connections
      for(let i=0;i<N;i++){
        for(let j=i+1;j<N;j++){
          const dx=nodes[j].x-nodes[i].x, dy=nodes[j].y-nodes[i].y;
          const d=Math.sqrt(dx*dx+dy*dy);
          if(d<120){
            const a = (1-d/120)*.18;
            ctx.strokeStyle=`rgba(201,162,39,${a})`;
            ctx.lineWidth=.7;
            ctx.beginPath(); ctx.moveTo(nodes[i].x,nodes[i].y); ctx.lineTo(nodes[j].x,nodes[j].y); ctx.stroke();
          }
        }
      }

      // Nodes
      nodes.forEach(n=>{
        n.pulse += n.pSpd;
        n.x += n.vx; n.y += n.vy;
        if(n.x<0||n.x>W) n.vx*=-1;
        if(n.y<0||n.y>H) n.vy*=-1;
        const a = .45+Math.sin(n.pulse)*.3;
        const g = ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*2.5);
        g.addColorStop(0,`hsla(${n.hue},90%,70%,${a})`);
        g.addColorStop(1,`hsla(${n.hue},80%,40%,0)`);
        ctx.fillStyle=g;
        ctx.beginPath(); ctx.arc(n.x,n.y,n.r*2.5,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=`hsla(${n.hue},95%,82%,${a+.2})`;
        ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fill();
      });

      // Slow golden expanding rings — limitlessness
      for(let i=0;i<3;i++){
        const phase = (t*.18 + i/3) % 1;
        const r = phase * Math.max(W,H) * .8;
        const a = (1-phase)*.06;
        ctx.strokeStyle=`rgba(201,162,39,${a})`;
        ctx.lineWidth=1.2;
        ctx.beginPath(); ctx.arc(W/2,H/2,r,0,Math.PI*2); ctx.stroke();
      }
    }
    draw();

    function onResize(){
      W = c.width = window.innerWidth;
      H = c.height = window.innerHeight;
    }
    window.addEventListener('resize', onResize);
    return ()=>{ cancelAnimationFrame(raf); window.removeEventListener('resize',onResize); };
  },[]);

  const tools = [
    { icon:'🔑', name:'Keywords Quiz', desc:'Keywords, phrases, or reverse mode — one chapter at a time', action: onKeywords },
    { icon:'📖', name:'Chapter Material Study', desc:'Sections, key verses & keywords for any chapter', action: onStudy },
    { icon:'↔', name:'Reference Matching', desc:'Match verses to references — or references to verses', action: onRefMatch },
    { icon:'🧺', name:'Drag Study Game', desc:'Sort keywords, phrases & jump points into chapter baskets', action: onDrag },
    { icon:'🧭', name:'Section Locator', desc:'Match section headings to chapters — or flip it around', action: onSectionLocator },
    { icon:'odd', name:'Odd One Out', desc:'Three from one chapter, one from another — spot the intruder', action: onOddOneOut },
    { icon:'⚖️', name:'Answer Judge Material', desc:'Navigate by chapter and verse — glowing context reader', action: onAnswerJudge },
  ];

  return (
    <div style={{position:'relative',minHeight:'100vh'}}>
      <canvas ref={canvasRef} style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',zIndex:2,pointerEvents:'none'}}/>
      <div className="tools-page" style={{position:'relative',zIndex:3}}>
        <div className="top-nav-left">
          <button className="kq-nav-btn" onClick={onBack}>← Back</button>
        </div>
        <div style={{paddingTop:'3rem'}}>
          <div className="tools-title" style={{textShadow:'0 2px 8px rgba(0,0,0,0.8)',background:'rgba(0,0,0,0.35)',display:'inline-block',padding:'.3rem 1.2rem',borderRadius:10}}>More Tools</div>
          <div className="tools-subtitle" style={{textShadow:'0 1px 4px rgba(0,0,0,0.7)',background:'rgba(0,0,0,0.25)',display:'inline-block',padding:'.15rem .9rem',borderRadius:8}}>Study smarter · every verse, every angle</div>
          <div className="tools-grid">
            {tools.map((tool,i)=>(
              <div key={i} className="tool-card"
                style={{opacity: tool.action ? 1 : .38, cursor: tool.action ? 'pointer' : 'default'}}
                onClick={()=>tool.action && tool.action()}>
                <div className="tool-card-icon">{tool.icon==='odd'
                  ? <svg width="22" height="22" viewBox="0 0 22 22" xmlns="http://www.w3.org/2000/svg"><circle cx="6" cy="6" r="4" fill="#e05050" opacity="0.9"/><circle cx="16" cy="6" r="4" fill="white" opacity="0.85"/><circle cx="6" cy="16" r="4" fill="white" opacity="0.85"/><circle cx="16" cy="16" r="4" fill="white" opacity="0.85"/></svg>
                  : tool.icon}</div>
                <div className="tool-card-name">{tool.name}</div>
                <div className="tool-card-desc">{tool.desc}</div>
              </div>
            ))}
          </div>

        </div>
      </div>
    </div>
  );
}

function App({ onScore }){
  const [page, setPage] = useState('main'); // 'main'|'tools'|'keywords'|'custom'|'study'|'refmatch'|'drag'
  const [sChIdx,setSChIdx]=useState(0);
  const [sV,setSV]=useState(1);
  const [eChIdx,setEChIdx]=useState(0);
  const [eV,setEV]=useState(CHAPTERS_DATA[0].verses.length);
  const [level,setLevel]=useState(null);
  const [modeRandom,setModeRandom]=useState(false);
  const [modeSpecialty,setModeSpecialty]=useState(false);
  const [quizSeed,setQuizSeed]=useState(()=>Math.floor(Math.random()*1e9));
  const [ans,setAns]=useState({});
  const [hinted,setHinted]=useState({});
  const [chk,setChk]=useState(false);
  const [score,setScore]=useState(null);
  const [customVerses,setCustomVerses]=useState(null); // null = use range, array = custom
  const [showJump,setShowJump]=useState(true);

  useEffect(()=>{
    function onFocusIn(e){
      const el=e.target;
      if(el.matches&&el.matches('input.blank')&&el.dataset.ch){
        const ch=parseInt(el.dataset.ch,10);
        if(!isNaN(ch)&&window.BgMgr) window.BgMgr.setChapter(ch);
      }
    }
    document.addEventListener('focusin',onFocusIn);
    return ()=>document.removeEventListener('focusin',onFocusIn);
  },[]);

  useEffect(()=>{
    if(window.BgMgr) window.BgMgr.setChapter(CHAPTERS_DATA[sChIdx].ch);
  },[sChIdx]);

  useEffect(()=>{
    function onKey(e){
      if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='h'){
        e.preventDefault();
        const inputs=Array.from(document.querySelectorAll('input.blank:not([disabled])'));
        const empty=inputs.find(inp=>!inp.value.trim());
        if(empty&&empty.dataset.correct&&empty.dataset.bkey){
          const k=empty.dataset.bkey, correct=empty.dataset.correct;
          setAns(a=>({...a,[k]:correct}));
          setHinted(h=>({...h,[k]:true}));
          setTimeout(()=>empty.focus(),10);
        }
      }
    }
    window.addEventListener('keydown',onKey);
    return ()=>window.removeEventListener('keydown',onKey);
  },[]);

  const selVerses=useMemo(()=>{
    if(customVerses) return customVerses;
    const sk=vkey(CHAPTERS_DATA[sChIdx].ch,sV);
    const ek=vkey(CHAPTERS_DATA[eChIdx].ch,eV);
    const out=[];
    CHAPTERS_DATA.forEach(cd=>cd.verses.forEach(v=>{
      const k=vkey(cd.ch,v.v);
      if(k>=sk&&k<=ek) out.push({ch:cd.ch,...v});
    }));
    return out;
  },[sChIdx,sV,eChIdx,eV,customVerses]);

  const displayVerses=useMemo(()=>{
    if(modeSpecialty && selVerses.length>0) return shuffleArr(selVerses, makeRng(quizSeed));
    return selVerses;
  },[selVerses, modeSpecialty, quizSeed]);

  const byChapter=useMemo(()=>{
    if(modeSpecialty) return null;
    const map=[];
    displayVerses.forEach(v=>{
      const last=map[map.length-1];
      if(last&&last.ch===v.ch) last.verses.push(v);
      else map.push({ch:v.ch,verses:[v]});
    });
    return map;
  },[displayVerses,modeSpecialty]);

  const segOpts=useMemo(()=>({
    seed: modeRandom ? quizSeed : null,
    specialty: modeSpecialty,
  }),[modeRandom, modeSpecialty, quizSeed]);

  function newSeed(){ setQuizSeed(Math.floor(Math.random()*1e9)); }
  function reset(){ setAns({}); setHinted({}); setChk(false); setScore(null); newSeed(); }
  function fullReset(){ setAns({}); setHinted({}); setChk(false); setScore(null); newSeed(); setCustomVerses(null); }

  function toggleRandom(){
    if(!modeRandom) setModeSpecialty(false);
    setModeRandom(v=>!v); reset();
  }
  function toggleSpecialty(){
    if(!modeSpecialty) setModeRandom(false);
    setModeSpecialty(v=>!v); reset();
  }

  function goSCh(i){
    const ni=+i, mx=CHAPTERS_DATA[ni].verses.length, sv=Math.min(sV,mx);
    setSChIdx(ni); setSV(sv);
    if(vkey(CHAPTERS_DATA[eChIdx].ch,eV)<vkey(CHAPTERS_DATA[ni].ch,sv)){setEChIdx(ni);setEV(mx);}
    fullReset();
  }
  function goSV(v){
    const nv=+v; setSV(nv);
    if(vkey(CHAPTERS_DATA[eChIdx].ch,eV)<vkey(CHAPTERS_DATA[sChIdx].ch,nv)){setEChIdx(sChIdx);setEV(CHAPTERS_DATA[sChIdx].verses.length);}
    fullReset();
  }
  function goECh(i){
    const ni=+i, mx=CHAPTERS_DATA[ni].verses.length;
    if(vkey(CHAPTERS_DATA[ni].ch,mx)<vkey(CHAPTERS_DATA[sChIdx].ch,sV)) return;
    setEChIdx(ni); setEV(Math.min(eV,mx)); fullReset();
  }
  function goEV(v){
    const nv=+v;
    if(vkey(CHAPTERS_DATA[eChIdx].ch,nv)<vkey(CHAPTERS_DATA[sChIdx].ch,sV)) return;
    setEV(nv); fullReset();
  }

  function check(){
    let c=0, tot=0, ptsEarned=0;
    selVerses.forEach(verse=>{
      tot++;
      const vnKey=`${verse.ch}-${verse.v}-vnum`;
      const vnOk = norm(ans[vnKey])===String(verse.v);
      if(vnOk){ c++; if(!hinted[vnKey]) ptsEarned+=0.5; }
      const verseSeed = segOpts.seed != null ? hashSeed(segOpts.seed, `${verse.ch}-${verse.v}`) : null;
      const uniquePrefix = VERSE_UNIQUE_PREFIX[`${verse.ch}-${verse.v}`] ?? 5;
      buildSegs(verse.t, level+1, {...segOpts, seed: verseSeed, uniquePrefix}).filter(s=>s.type==='blank').forEach(s=>{
        tot++;
        const k=`${verse.ch}-${verse.v}-${s.idx}`;
        if(matchAnswer(ans[k],s.core)){ c++; if(!hinted[k]) ptsEarned+=0.5; }
      });
    });
    setScore({c,tot}); setChk(true);
  }

  const sc=score?(score.c===score.tot?'perfect':score.c>=score.tot*.7?'good':'low'):'';
  const sCh=CHAPTERS_DATA[sChIdx], eCh=CHAPTERS_DATA[eChIdx];
  const modeTag = modeRandom ? ' · 🎲 Random' : modeSpecialty ? ' · ⭐ Specialty' : '';

  if(page === 'custom'){
    return <CustomPicker
      onBack={()=>setPage('main')}
      onApply={(verses)=>{ setCustomVerses(verses); setAns({}); setHinted({}); setChk(false); setScore(null); newSeed(); setPage('main'); }}
    />;
  }

  if(page === 'refmatch'){
    return <RefMatchPage onBack={()=>setPage('tools')} initialCustomVerses={customVerses} />;
  }

  if(page === 'study'){
    return <ChapterStudyPage onBack={()=>setPage('tools')} />;
  }

  if(page === 'drag'){
    return <DragStudyPage onBack={()=>setPage('tools')} initialCustomVerses={customVerses} />;
  }

  if(page === 'seclocator'){
    return <SectionLocatorPage onBack={()=>setPage('tools')} />;
  }

  if(page === 'answerjudge'){
    return <AnswerJudgeMaterialPage onBack={()=>setPage('tools')} />;
  }


  if(page === 'oddoneout'){
    return <OddOneOutPage onBack={()=>setPage('tools')} />;
  }

  if(page === 'tools'){
    return <MoreToolsPage
      onBack={()=>setPage('main')}
      onKeywords={()=>{ if(window.BgMgr) window.BgMgr.setKeyMode(true); setPage('keywords'); }}
      onStudy={()=>setPage('study')}
      onRefMatch={()=>setPage('refmatch')}
      onDrag={()=>setPage('drag')}
      onSectionLocator={()=>setPage('seclocator')}
      onOddOneOut={()=>setPage('oddoneout')}
      onAnswerJudge={()=>setPage('answerjudge')}
    />;
  }

  if(page === 'keywords'){
    return <KeywordQuiz onBack={()=>{ if(window.BgMgr) window.BgMgr.setKeyMode(false); setPage('tools'); }} />;
  }

  return (
    <div className="wrap">
      <div className="top-nav">
        <button className="kq-nav-btn" onClick={()=>setPage('tools')}>More Tools</button>
      </div>
      <div className="title">Wardify — Hebrews · 1 &amp; 2 Peter</div>
      <div className="subtitle">New International Version</div>
      <div className="range-card">
        <div className="range-label">PASSAGE SELECTION</div>
        {customVerses ? (
          <div style={{textAlign:'center',padding:'.4rem 0 .6rem'}}>
            <span className="cp-active-badge">
              ✦ Custom · {customVerses.length} verse{customVerses.length!==1?'s':''}
            </span>
            <div style={{marginTop:'.6rem',display:'flex',gap:'.5rem',justifyContent:'center',flexWrap:'wrap'}}>
              <button className="btn btn-ghost" style={{fontSize:'.7rem',padding:'.32rem .9rem'}}
                onClick={()=>setPage('custom')}>Edit Selection</button>
              <button className="btn btn-ghost" style={{fontSize:'.7rem',padding:'.32rem .9rem'}}
                onClick={fullReset}>✕ Clear Custom</button>
            </div>
          </div>
        ) : (
          <>
            <div className="range-row">
              <div className="range-group">
                <label>FROM CH</label>
                <select className="rsel" value={sChIdx} onChange={e=>goSCh(e.target.value)}>
                  {CHAPTERS_DATA.map((c,i)=><option key={i} value={i}>{chLabel(c.ch)}</option>)}
                </select>
                <label>V.</label>
                <select className="rsel" value={sV} onChange={e=>goSV(e.target.value)}>
                  {sCh.verses.map(vr=><option key={vr.v} value={vr.v}>{vr.v}</option>)}
                </select>
              </div>
              <span className="range-sep">—</span>
              <div className="range-group">
                <label>TO CH</label>
                <select className="rsel" value={eChIdx} onChange={e=>goECh(e.target.value)}>
                  {CHAPTERS_DATA.map((c,i)=><option key={i} value={i}>{chLabel(c.ch)}</option>)}
                </select>
                <label>V.</label>
                <select className="rsel" value={eV} onChange={e=>goEV(e.target.value)}>
                  {eCh.verses.map(vr=><option key={vr.v} value={vr.v} disabled={vkey(eCh.ch,vr.v)<vkey(sCh.ch,sV)}>{vr.v}</option>)}
                </select>
              </div>
            </div>
            <div className="range-info">
              {selVerses.length===0 ? 'Select a passage above to begin' : `${selVerses.length} verse${selVerses.length>1?'s':''} selected`}
            </div>
            <div style={{textAlign:'center',marginTop:'.65rem'}}>
              <button className="btn btn-ghost" style={{fontSize:'.7rem',padding:'.32rem 1.1rem'}}
                onClick={()=>setPage('custom')}>✦ Custom</button>
            </div>
          </>
        )}
      </div>

      {selVerses.length>0 && <>
        <div className="level-bar" style={{marginTop:'1rem'}}>
          <button className={'lv-btn'+(level===null?' active':'')} onClick={()=>{ setLevel(null); reset(); }}>📖 Read</button>
          {LEVELS.map((l,i)=>(
            <button key={i} className={'lv-btn'+(level===i?' active':'')} onClick={()=>{ setLevel(i); reset(); }}>{l.label}</button>
          ))}
        </div>

        {level!==null && (
          <div className="mode-bar">
            <label className={'mode-toggle'+(modeRandom?' mode-on':'')+(modeSpecialty?' mode-disabled':'')}>
              <input type="checkbox" checked={modeRandom} disabled={modeSpecialty} onChange={toggleRandom}/>
              <span className="mode-icon">🎲</span> Random
              <span className="mode-tip">Words blanked randomly at each level's rate</span>
            </label>
            <label className={'mode-toggle'+(modeSpecialty?' mode-on':'')+(modeRandom?' mode-disabled':'')}>
              <input type="checkbox" checked={modeSpecialty} disabled={modeRandom} onChange={toggleSpecialty}/>
              <span className="mode-icon">⭐</span> Specialty
              <span className="mode-tip">Verses shuffled · Opening words given until verse is unique</span>
            </label>
          </div>
        )}

        {level===null
          ? <div className="level-desc" style={{marginBottom:'.8rem',display:'flex',alignItems:'center',justifyContent:'center',gap:'.8rem',flexWrap:'wrap'}}>
              <span>Reading mode · <span style={{color:'var(--c-title)',fontWeight:700}}>Bold words</span> appear in only one verse anywhere in this text</span>
              <label className={'mode-toggle'+(showJump?' mode-on':'')} style={{fontSize:'.68rem',padding:'.28rem .8rem .28rem .6rem'}}>
                <input type="checkbox" checked={showJump} onChange={()=>setShowJump(v=>!v)}/>
                <span className="mode-icon" style={{fontSize:'.8rem'}}>/</span> Jump marks
                <span className="mode-tip">Show FTV jump point markers in read mode</span>
              </label>
            </div>
          : <div className="level-desc" style={{marginBottom:'.4rem'}}>
              {LEVELS[level].desc}{modeTag} · Verse number always required
            </div>
        }
        {level!==null && (
          <div className="kbd-tips"><kbd>Space</kbd> = next blank &nbsp;·&nbsp; <kbd>Ctrl+H</kbd> = hint next word</div>
        )}

        {modeSpecialty && level!==null
          ? <div>
              {displayVerses.map(verse=>(
                <div key={`${verse.ch}-${verse.v}`}>
                  <VerseRow verse={verse} ch={verse.ch} level={level+1} segOpts={segOpts}
                    ans={ans} hinted={hinted} setAns={(k,v)=>setAns(a=>({...a,[k]:v}))} checked={chk}/>
                </div>
              ))}
            </div>
          : level===null
            ? (byChapter||[]).map(({ch,verses})=>(
                <div key={ch}>
                  <div className="ch-heading">{chLabel(ch)}</div>
                  {verses.map(verse=>(<ReadingVerse key={`${ch}-${verse.v}`} verse={verse} ch={ch} showJump={showJump}/>))}
                </div>
              ))
            : (byChapter||[]).map(({ch,verses})=>(
                <div key={ch}>
                  <div className="ch-heading">{chLabel(ch)}</div>
                  {verses.map(verse=>(
                    <VerseRow key={`${ch}-${verse.v}`} verse={verse} ch={ch} level={level+1}
                      segOpts={segOpts} ans={ans} hinted={hinted}
                      setAns={(k,v)=>setAns(a=>({...a,[k]:v}))} checked={chk}/>
                  ))}
                </div>
              ))
        }

        {level!==null && <>
          <div className="btn-row">
            {!chk
              ? <button className="btn btn-gold" onClick={check}>Check Answers</button>
              : <button className="btn btn-gold" onClick={reset}>Try Again</button>}
            <button className="btn btn-ghost" onClick={reset}>Reset</button>
          </div>
          {score && (
            <div className={'score '+sc}>
              {score.c===score.tot ? `✦ Perfect — ${score.c} / ${score.tot} ✦` : `${score.c} / ${score.tot} correct`}
              {Object.keys(hinted).length>0 && (
                <span style={{fontSize:'.8rem',opacity:.7,marginLeft:'.5rem'}}>({Object.keys(hinted).length} hinted)</span>
              )}
            </div>
          )}
          {chk&&score&&score.c===score.tot&&level<4 && (
            <div className="next-banner" style={{marginTop:'.8rem'}}>
              <button className="btn btn-gold" onClick={()=>{setLevel(l=>l+1);reset();}}>Next Level →</button>
            </div>
          )}
        </>}
      </>}

      <div className="footer-note">New International Version · Bold words are unique to one verse in this text</div>
    </div>
  );
}

/* ════════════════════════════════════════════
   COMPETITIVE COMPONENTS
════════════════════════════════════════════ */

function ScoreToast({ toasts }){
  return (
    <div className="score-toast-wrap">
      {toasts.map(t=>(
        <div key={t.id} className="score-toast">{t.msg}</div>
      ))}
    </div>
  );
}

function LeaderboardPage({ scores, user, onBack }){
  const [view, setView] = useState('teams');
  const teamNums = [1,2,3];

  const teamEntries = teamNums.map(t=>({
    id: `team${t}`,
    label: TEAMS[t].label,
    color: TEAMS[t].color,
    pts: round2(scores?.[`team${t}`]?.total || 0),
    isMe: user?.team === t,
    members: TEAMS[t].members.map(name=>({
      name,
      pts: round2(scores?.[`team${t}`]?.[name] || 0),
      isMe: user?.team === t && user?.name === name
    })).sort((a,b)=>b.pts-a.pts)
  })).sort((a,b)=>b.pts-a.pts);

  const indivEntries = [];
  teamNums.forEach(t=>{
    TEAMS[t].members.forEach(name=>{
      indivEntries.push({
        id: `t${t}-${name}`, name,
        color: TEAMS[t].color,
        teamLabel: TEAMS[t].label,
        pts: round2(scores?.[`team${t}`]?.[name] || 0),
        isMe: user?.team === t && user?.name === name
      });
    });
  });
  indivEntries.sort((a,b)=>b.pts-a.pts);

  function medalClass(i){ return i===0?'lb-medal-1':i===1?'lb-medal-2':i===2?'lb-medal-3':''; }
  function medalLabel(i){ return i===0?'1st':i===1?'2nd':i===2?'3rd':`${i+1}`; }

  return (
    <div className="lb-page">
      <div className="lb-page-title">Leaderboard</div>
      <div className="lb-page-sub">Hebrews · 1 &amp; 2 Peter — Memory Quiz Competition</div>

      <div className="lb-toggle-row">
        <button className={'lb-toggle-btn'+(view==='teams'?' active':'')} onClick={()=>setView('teams')}>◀ Teams</button>
        <button className={'lb-toggle-btn'+(view==='individual'?' active':'')} onClick={()=>setView('individual')}>Individual ▶</button>
      </div>

      {view === 'teams' ? (
        <div>
          {teamEntries.map((team, ti)=>(
            <div key={team.id} className="lb-team-block"
              style={{borderColor: team.isMe ? team.color+'55' : 'var(--c-border)'}}>
              <div className="lb-team-header">
                <div style={{display:'flex',alignItems:'center',gap:'.7rem'}}>
                  <div className={`lb-rank-badge ${medalClass(ti)}`}>{medalLabel(ti)}</div>
                  <span className="lb-team-name" style={{color: team.color}}>{team.label}</span>
                </div>
                <span className="lb-team-total" style={{color: team.color}}>{team.pts.toFixed(1)}</span>
              </div>
              <div className="lb-team-members">
                {team.members.map(m=>(
                  <div key={m.name} className="lb-member-row">
                    <div className="lb-member-left">
                      <span className={'lb-member-name'+(m.isMe?' lb-me-name':'')}>{m.name}</span>
                    </div>
                    <span className="lb-member-pts" style={{color: team.color}}>{m.pts.toFixed(1)}</span>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      ) : (
        <div className="lb-indiv-list">
          {indivEntries.map((e, i)=>(
            <div key={e.id} className={'lb-indiv-row'+(e.isMe?' lb-me-row':'')}>
              <div className={`lb-rank-badge ${medalClass(i)}`}>{medalLabel(i)}</div>
              <span className={'lb-indiv-name'+(e.isMe?' lb-me-name':'')}>{e.name}</span>
              <div className="lb-indiv-team-dot" style={{background: e.color}} title={e.teamLabel}/>
              <span className="lb-indiv-pts" style={{color: e.color}}>{e.pts.toFixed(1)}</span>
            </div>
          ))}
        </div>
      )}

      <div className="btn-row" style={{marginTop:'1.8rem'}}>
        <button className="btn btn-ghost" onClick={onBack}>← Back to Quiz</button>
      </div>
    </div>
  );
}

function Login({ onLogin }){
  const [teamSel, setTeamSel] = useState(null);

  function handleName(name){
    if(!teamSel) return;
    onLogin({ team: teamSel, name });
  }

  return (
    <div className="login-bg">
      <div className="login-card">
        <div className="login-title">Hebrews · 1 &amp; 2 Peter — Memory Quiz</div>
        <div className="login-sub">Competition Mode</div>

        <div className="login-step-label">
          {!teamSel ? 'STEP 1 — SELECT YOUR TEAM' : 'STEP 2 — SELECT YOUR NAME'}
        </div>

        {!teamSel ? (
          <div className="login-teams">
            {[1,2,3].map(t=>(
              <button key={t} className="login-team-btn"
                style={{borderColor: TEAMS[t].color+'88', color: TEAMS[t].color}}
                onClick={()=>setTeamSel(t)}>
                <span className="login-team-num">{t}</span>
                <span className="login-team-lbl">TEAM</span>
              </button>
            ))}
          </div>
        ) : (
          <>
            <div style={{textAlign:'center',marginBottom:'.3rem'}}>
              <span style={{fontFamily:'Cinzel,serif',fontSize:'.75rem',color:TEAMS[teamSel].color,letterSpacing:'.06em'}}>
                {TEAMS[teamSel].label}
              </span>
            </div>
            <div className="login-names">
              {TEAMS[teamSel].members.map(name=>(
                <button key={name} className="login-name-btn"
                  style={{borderColor: TEAMS[teamSel].color+'55'}}
                  onClick={()=>handleName(name)}>
                  {name}
                </button>
              ))}
            </div>
            <button className="login-back-btn" onClick={()=>setTeamSel(null)}>← Back to teams</button>
          </>
        )}
      </div>
    </div>
  );
}

function Root(){
  return <App />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
