    {v:3,t:"This is why he has to offer sacrifices for his own sins, as well as for the sins of the people."},
    {v:4,t:"And no one takes this honor upon himself, but he receives it when called by God, just as Aaron was."},
    {v:5,t:"In the same way, Christ did not take on himself the glory of becoming a high priest. But God said to him, \"You are my Son; today I have become your Father.\""},
    {v:6,t:"And he says in another place, \"You are a priest forever, in the order of Melchizedek.\""},
    {v:7,t:"During the days of Jesus' life on earth, he offered up prayers and petitions with fervent cries and tears to the one who could save him from death, and he was heard because of his reverent submission."},
    {v:8,t:"Son though he was, he learned obedience from what he suffered"},
    {v:9,t:"and, once made perfect, he became the source of eternal salvation for all who obey him"},
    {v:10,t:"and was designated by God to be high priest in the order of Melchizedek."},
    {v:11,t:"We have much to say about this, but it is hard to make it clear to you because you no longer try to understand."},
    {v:12,t:"In fact, though by this time you ought to be teachers, you need someone to teach you the elementary truths of God's word all over again. You need milk, not solid food!"},
    {v:13,t:"Anyone who lives on milk, being still an infant, is not acquainted with the teaching about righteousness."},
    {v:14,t:"But solid food is for the mature, who by constant use have trained themselves to distinguish good from evil."},
  ]},
  { ch:6, verses:[
    {v:1,t:"Therefore let us move beyond the elementary teachings about Christ and be taken forward to maturity, not laying again the foundation of repentance from acts that lead to death, and of faith in God,"},
    {v:2,t:"instruction about cleansing rites, the laying on of hands, the resurrection of the dead, and eternal judgment."},
    {v:3,t:"And God permitting, we will do so."},
    {v:4,t:"It is impossible for those who have once been enlightened, who have tasted the heavenly gift, who have shared in the Holy Spirit,"},
    {v:5,t:"who have tasted the goodness of the word of God and the powers of the coming age"},
    {v:6,t:"and who have fallen away, to be brought back to repentance. To their loss they are crucifying the Son of God all over again and subjecting him to public disgrace."},
    {v:7,t:"Land that drinks in the rain often falling on it and that produces a crop useful to those for whom it is farmed receives the blessing of God."},
    {v:8,t:"But land that produces thorns and thistles is worthless and is in danger of being cursed. In the end it will be burned."},
    {v:9,t:"Even though we speak like this, dear friends, we are convinced of better things in your case—the things that have to do with salvation."},
    {v:10,t:"God is not unjust; he will not forget your work and the love you have shown him as you have helped his people and continue to help them."},
    {v:11,t:"We want each of you to show this same diligence to the very end, so that what you hope for may be fully realized."},
    {v:12,t:"We do not want you to become lazy, but to imitate those who through faith and patience inherit what has been promised."},
    {v:13,t:"When God made his promise to Abraham, since there was no one greater for him to swear by, he swore by himself,"},
    {v:14,t:"saying, \"I will surely bless you and give you many descendants.\""},
    {v:15,t:"And so after waiting patiently, Abraham received what was promised."},
    {v:16,t:"People swear by someone greater than themselves, and the oath confirms what is said and puts an end to all argument."},
    {v:17,t:"Because God wanted to make the unchanging nature of his purpose very clear to the heirs of what was promised, he confirmed it with an oath."},
    {v:18,t:"God did this so that, by two unchangeable things in which it is impossible for God to lie, we who have fled to take hold of the hope set before us may be greatly encouraged."},
    {v:19,t:"We have this hope as an anchor for the soul, firm and secure. It enters the inner sanctuary behind the curtain,"},
    {v:20,t:"where our forerunner, Jesus, has entered on our behalf. He has become a high priest forever, in the order of Melchizedek."},
  ]},
  { ch:7, verses:[
    {v:1,t:"This Melchizedek was king of Salem and priest of God Most High. He met Abraham returning from the defeat of the kings and blessed him,"},
    {v:2,t:"and Abraham gave him a tenth of everything. First, the name \"Melchizedek\" means \"king of righteousness\"; then also, \"king of Salem\" means \"king of peace.\""},
    {v:3,t:"Without father or mother, without genealogy, without beginning of days or end of life, resembling the Son of God, he remains a priest forever."},
    {v:4,t:"Just think how great he was: Even the patriarch Abraham gave him a tenth of the plunder!"},
    {v:5,t:"Now the law requires the descendants of Levi who become priests to collect a tenth from the people—that is, from their fellow Israelites—even though they also are descended from Abraham."},
    {v:6,t:"This man, however, did not trace his descent from Levi, yet he collected a tenth from Abraham and blessed him who had the promises."},
    {v:7,t:"And without doubt the lesser is blessed by the greater."},
    {v:8,t:"In the one case, the tenth is collected by people who die; but in the other case, by him who is declared to be living."},
    {v:9,t:"One might even say that Levi, who collects the tenth, paid the tenth through Abraham,"},
    {v:10,t:"because when Melchizedek met Abraham, Levi was still in the body of his ancestor."},
    {v:11,t:"If perfection could have been attained through the Levitical priesthood—and indeed the law given to the people established that priesthood—why was there still need for another priest to come, one in the order of Melchizedek, not in the order of Aaron?"},
    {v:12,t:"For when the priesthood is changed, the law must be changed also."},
    {v:13,t:"He of whom these things are said belonged to a different tribe, and no one from that tribe has ever served at the altar."},
    {v:14,t:"For it is clear that our Lord descended from Judah, and in regard to that tribe Moses said nothing about priests."},
    {v:15,t:"And what we have said is even more clear if another priest like Melchizedek appears,"},
    {v:16,t:"one who has become a priest not on the basis of a regulation as to his ancestry but on the basis of the power of an indestructible life."},
    {v:17,t:"For it is declared: \"You are a priest forever, in the order of Melchizedek.\""},
    {v:18,t:"The former regulation is set aside because it was weak and useless"},
    {v:19,t:"(for the law made nothing perfect), and a better hope is introduced, by which we draw near to God."},
    {v:20,t:"And it was not without an oath! Others became priests without any oath,"},
    {v:21,t:"but he became a priest with an oath when God said to him: \"The Lord has sworn and will not change his mind: 'You are a priest forever.'\""},
    {v:22,t:"Because of this oath, Jesus has become the guarantor of a better covenant."},
    {v:23,t:"Now there have been many of those priests, since death prevented them from continuing in office;"},
    {v:24,t:"but because Jesus lives forever, he has a permanent priesthood."},
    {v:25,t:"Therefore he is able to save completely those who come to God through him, because he always lives to intercede for them."},
    {v:26,t:"Such a high priest truly meets our need—one who is holy, blameless, pure, set apart from sinners, exalted above the heavens."},
    {v:27,t:"Unlike the other high priests, he does not need to offer sacrifices day after day, first for his own sins, and then for the sins of the people. He sacrificed for their sins once for all when he offered himself."},
    {v:28,t:"For the law appoints as high priests men in all their weakness; but the oath, which came after the law, appointed the Son, who has been made perfect forever."},
  ]},
  { ch:8, verses:[
    {v:1,t:"Now the main point of what we are saying is this: We do have such a high priest, who sat down at the right hand of the throne of the Majesty in heaven,"},
    {v:2,t:"and who serves in the sanctuary, the true tabernacle set up by the Lord, not by a mere human being."},
    {v:3,t:"Every high priest is appointed to offer both gifts and sacrifices, and so it was necessary for this one also to have something to offer."},
    {v:4,t:"If he were on earth, he would not be a priest, for there are already priests who offer the gifts prescribed by the law."},
    {v:5,t:"They serve at a sanctuary that is a copy and shadow of what is in heaven. This is why Moses was warned when he was about to build the tabernacle: \"See to it that you make everything according to the pattern shown you on the mountain.\""},
    {v:6,t:"But in fact the ministry Jesus has received is as superior to theirs as the covenant of which he is mediator is better, and it has been enacted on better promises."},
    {v:7,t:"For if there had been nothing wrong with that first covenant, no place would have been sought for another."},
    {v:8,t:"But God found fault with the people and said: \"The days are coming, declares the Lord, when I will make a new covenant with the people of Israel and with the people of Judah."},
    {v:9,t:"It will not be like the covenant I made with their ancestors when I took them by the hand to lead them out of Egypt, because they did not remain faithful to my covenant, and I turned away from them, declares the Lord."},
    {v:10,t:"This is the covenant I will make with the people of Israel after that time, declares the Lord. I will put my laws in their minds and write them on their hearts. I will be their God, and they will be my people."},
    {v:11,t:"No longer will they teach their neighbor, or say to one another, 'Know the Lord,' because they will all know me, from the least of them to the greatest."},
    {v:12,t:"For I will forgive their wickedness and will remember their sins no more.\""},
    {v:13,t:"By calling this covenant \"new,\" he has made the first one obsolete; and what is obsolete and aging will soon disappear."},
  ]},
  { ch:9, verses:[
    {v:1,t:"Now the first covenant had regulations for worship and also an earthly sanctuary."},
    {v:2,t:"A tabernacle was set up. In its first room were the lampstand and the table with its consecrated bread; this was called the Holy Place."},
    {v:3,t:"Behind the second curtain was a room called the Most Holy Place,"},
    {v:4,t:"which had the golden altar of incense and the gold-covered ark of the covenant. This ark contained the gold jar of manna, Aaron's staff that had budded, and the stone tablets of the covenant."},
    {v:5,t:"Above the ark were the cherubim of the Glory, overshadowing the atonement cover. But we cannot discuss these things in detail now."},
    {v:6,t:"When everything had been arranged like this, the priests entered regularly into the outer room to carry on their ministry."},
    {v:7,t:"But only the high priest entered the inner room, and that only once a year, and never without blood, which he offered for himself and for the sins the people had committed in ignorance."},
    {v:8,t:"The Holy Spirit was showing by this that the way into the Most Holy Place had not yet been disclosed as long as the first tabernacle was still functioning."},
    {v:9,t:"This is an illustration for the present time, indicating that the gifts and sacrifices being offered were not able to clear the conscience of the worshiper."},
    {v:10,t:"They are only a matter of food and drink and various ceremonial washings—external regulations applying until the time of the new order."},
    {v:11,t:"But when Christ came as high priest of the good things that are now already here, he went through the greater and more perfect tabernacle that is not made with human hands, that is to say, is not a part of this creation."},
    {v:12,t:"He did not enter by means of the blood of goats and calves; but he entered the Most Holy Place once for all by his own blood, thus obtaining eternal redemption."},
    {v:13,t:"The blood of goats and bulls and the ashes of a heifer sprinkled on those who are ceremonially unclean sanctify them so that they are outwardly clean."},
    {v:14,t:"How much more, then, will the blood of Christ, who through the eternal Spirit offered himself unblemished to God, cleanse our consciences from acts that lead to death, so that we may serve the living God!"},
    {v:15,t:"For this reason Christ is the mediator of a new covenant, that those who are called may receive the promised eternal inheritance—now that he has died as a ransom to set them free from the sins committed under the first covenant."},
    {v:16,t:"In the case of a will, it is necessary to prove the death of the one who made it,"},
    {v:17,t:"because a will is in force only when somebody has died; it never takes effect while the one who made it is living."},
    {v:18,t:"This is why even the first covenant was not put into effect without blood."},
    {v:19,t:"When Moses had proclaimed every command of the law to all the people, he took the blood of calves, together with water, scarlet wool and branches of hyssop, and sprinkled the scroll and all the people."},
    {v:20,t:"He said, \"This is the blood of the covenant, which God has commanded you to keep.\""},
    {v:21,t:"In the same way, he sprinkled with the blood both the tabernacle and everything used in its ceremonies."},
    {v:22,t:"In fact, the law requires that nearly everything be cleansed with blood, and without the shedding of blood there is no forgiveness."},
    {v:23,t:"It was necessary, then, for the copies of the heavenly things to be purified with these sacrifices, but the heavenly things themselves with better sacrifices than these."},
    {v:24,t:"For Christ did not enter a sanctuary made with human hands that was only a copy of the true one; he entered heaven itself, now to appear for us in God's presence."},
    {v:25,t:"Nor did he enter heaven to offer himself again and again, the way the high priest enters the Most Holy Place every year with blood that is not his own."},
    {v:26,t:"Otherwise Christ would have had to suffer many times since the creation of the world. But he has appeared once for all at the culmination of the ages to do away with sin by the sacrifice of himself."},
    {v:27,t:"Just as people are destined to die once, and after that to face judgment,"},
    {v:28,t:"so Christ was sacrificed once to take away the sins of many; and he will appear a second time, not to bear sin, but to bring salvation to those who are waiting for him."},
  ]},
  { ch:10, verses:[
    {v:1,t:"The law is only a shadow of the good things that are coming—not the realities themselves. For this reason it can never, by the same sacrifices repeated endlessly year after year, make perfect those who draw near to worship."},
    {v:2,t:"Otherwise, would they not have stopped being offered? For the worshipers would have been cleansed once for all, and would no longer have felt guilty for their sins."},
    {v:3,t:"But those sacrifices are an annual reminder of sins."},
    {v:4,t:"It is impossible for the blood of bulls and goats to take away sins."},
    {v:5,t:"Therefore, when Christ came into the world, he said: \"Sacrifice and offering you did not desire, but a body you prepared for me;"},
    {v:6,t:"with burnt offerings and sin offerings you were not pleased."},
    {v:7,t:"Then I said, 'Here I am—it is written about me in the scroll—I have come to do your will, my God.'\""},
    {v:8,t:"First he said, \"Sacrifices and offerings, burnt offerings and sin offerings you did not desire, nor were you pleased with them\"—though they were offered in accordance with the law."},
    {v:9,t:"Then he said, \"Here I am, I have come to do your will.\" He sets aside the first to establish the second."},
    {v:10,t:"And by that will, we have been made holy through the sacrifice of the body of Jesus Christ once for all."},
    {v:11,t:"Day after day every priest stands and performs his religious duties; again and again he offers the same sacrifices, which can never take away sins."},
    {v:12,t:"But when this priest had offered for all time one sacrifice for sins, he sat down at the right hand of God,"},
    {v:13,t:"and since that time he waits for his enemies to be made his footstool."},
    {v:14,t:"For by one offering he has made perfect forever those who are being made holy."},
    {v:15,t:"The Holy Spirit also testifies to us about this. First he says:"},
    {v:16,t:"\"This is the covenant I will make with them after that time, says the Lord. I will put my laws in their hearts, and I will write them on their minds.\""},
    {v:17,t:"Then he adds: \"Their sins and lawless acts I will remember no more.\""},
    {v:18,t:"And where these have been forgiven, sacrifice for sin is no longer necessary."},
    {v:19,t:"Therefore, brothers and sisters, since we have confidence to enter the Most Holy Place by the blood of Jesus,"},
    {v:20,t:"by a new and living way opened for us through the curtain, that is, his body,"},
    {v:21,t:"and since we have a great priest over the house of God,"},
    {v:22,t:"let us draw near to God with a sincere heart and with the full assurance that faith brings, having our hearts sprinkled to cleanse us from a guilty conscience and having our bodies washed with pure water."},
    {v:23,t:"Let us hold unswervingly to the hope we profess, for he who promised is faithful."},
    {v:24,t:"And let us consider how we may spur one another on toward love and good deeds,"},
    {v:25,t:"not giving up meeting together, as some are in the habit of doing, but encouraging one another—and all the more as you see the Day approaching."},
    {v:26,t:"If we deliberately keep on sinning after we have received the knowledge of the truth, no sacrifice for sins is left,"},
    {v:27,t:"but only a fearful expectation of judgment and of raging fire that will consume the enemies of God."},
    {v:28,t:"Anyone who rejected the law of Moses died without mercy on the testimony of two or three witnesses."},
    {v:29,t:"How much more severely do you think someone deserves to be punished who has trampled the Son of God underfoot, who has treated as an unholy thing the blood of the covenant that sanctified them, and who has insulted the Spirit of grace?"},
    {v:30,t:"For we know him who said, \"It is mine to avenge; I will repay,\" and again, \"The Lord will judge his people.\""},
    {v:31,t:"It is a dreadful thing to fall into the hands of the living God."},
    {v:32,t:"Remember those earlier days after you had received the light, when you endured in a great conflict full of suffering."},
    {v:33,t:"Sometimes you were publicly exposed to insult and persecution; at other times you stood side by side with those who were so treated."},
    {v:34,t:"You suffered along with those in prison and joyfully accepted the confiscation of your property, because you knew that you yourselves had better and lasting possessions."},
    {v:35,t:"So do not throw away your confidence; it will be richly rewarded."},
    {v:36,t:"You need to persevere so that when you have done the will of God, you will receive what he has promised."},
    {v:37,t:"For, \"In just a little while, he who is coming will come and will not delay.\""},
    {v:38,t:"And, \"But my righteous one will live by faith. And I take no pleasure in the one who shrinks back.\""},
    {v:39,t:"But we do not belong to those who shrink back and are destroyed, but to those who have faith and are saved."},
  ]},
  { ch:11, verses:[
    {v:1,t:"Now faith is confidence in what we hope for and assurance about what we do not see."},
    {v:2,t:"This is what the ancients were commended for."},
    {v:3,t:"By faith we understand that the universe was formed at God's command, so that what is seen was not made out of what was visible."},
    {v:4,t:"By faith Abel brought God a better offering than Cain did. By faith he was commended as righteous, when God spoke well of his offerings. And by faith Abel still speaks, even though he is dead."},
    {v:5,t:"By faith Enoch was taken from this life, so that he did not experience death: \"He could not be found, because God had taken him away.\" For before he was taken, he was commended as one who pleased God."},
    {v:6,t:"And without faith it is impossible to please God, because anyone who comes to him must believe that he exists and that he rewards those who earnestly seek him."},
    {v:7,t:"By faith Noah, when warned about things not yet seen, in holy fear built an ark to save his family. By his faith he condemned the world and became heir of the righteousness that is in keeping with faith."},
    {v:8,t:"By faith Abraham, when called to go to a place he would later receive as his inheritance, obeyed and went, even though he did not know where he was going."},
    {v:9,t:"By faith he made his home in the promised land like a stranger in a foreign country; he lived in tents, as did Isaac and Jacob, who were heirs with him of the same promise."},
    {v:10,t:"For he was looking forward to the city with foundations, whose architect and builder is God."},
    {v:11,t:"And by faith even Sarah, who was past childbearing age, was enabled to bear children because she considered him faithful who had made the promise."},
    {v:12,t:"And so from this one man, and he as good as dead, came descendants as numerous as the stars in the sky and as countless as the sand on the seashore."},
    {v:13,t:"All these people were still living by faith when they died. They did not receive the things promised; they only saw them and welcomed them from a distance, admitting that they were foreigners and strangers on earth."},
    {v:14,t:"People who say such things show that they are looking for a country of their own."},
    {v:15,t:"If they had been thinking of the country they had left, they would have had opportunity to return."},
    {v:16,t:"Instead, they were longing for a better country—a heavenly one. Therefore God is not ashamed to be called their God, for he has prepared a city for them."},
    {v:17,t:"By faith Abraham, when God tested him, offered Isaac as a sacrifice. He who had embraced the promises was about to sacrifice his one and only son,"},
    {v:18,t:"even though God had said to him, \"It is through Isaac that your offspring will be reckoned.\""},
    {v:19,t:"Abraham reasoned that God could even raise the dead, and so in a manner of speaking he did receive Isaac back from death."},
    {v:20,t:"By faith Isaac blessed Jacob and Esau in regard to their future."},
    {v:21,t:"By faith Jacob, when he was dying, blessed each of Joseph's sons, and worshiped as he leaned on the top of his staff."},
    {v:22,t:"By faith Joseph, when his end was near, spoke about the exodus of the Israelites from Egypt and gave instructions concerning the burial of his bones."},
    {v:23,t:"By faith Moses' parents hid him for three months after he was born, because they saw he was no ordinary child, and they were not afraid of the king's edict."},
    {v:24,t:"By faith Moses, when he had grown up, refused to be known as the son of Pharaoh's daughter."},
    {v:25,t:"He chose to be mistreated along with the people of God rather than to enjoy the fleeting pleasures of sin."},
    {v:26,t:"He regarded disgrace for the sake of Christ as of greater value than the treasures of Egypt, because he was looking ahead to his reward."},
    {v:27,t:"By faith he left Egypt, not fearing the king's anger; he persevered because he saw him who is invisible."},
    {v:28,t:"By faith he kept the Passover and the application of blood, so that the destroyer of the firstborn would not touch the firstborn of Israel."},
    {v:29,t:"By faith the people passed through the Red Sea as on dry land; but when the Egyptians tried to do so, they were drowned."},
    {v:30,t:"By faith the walls of Jericho fell, after the army had marched around them for seven days."},
    {v:31,t:"By faith the prostitute Rahab, because she welcomed the spies, was not killed with those who were disobedient."},
    {v:32,t:"And what more shall I say? I do not have time to tell about Gideon, Barak, Samson and Jephthah, about David and Samuel and the prophets,"},
    {v:33,t:"who through faith conquered kingdoms, administered justice, and gained what was promised; who shut the mouths of lions,"},
    {v:34,t:"quenched the fury of the flames, and escaped the edge of the sword; whose weakness was turned to strength; and who became powerful in battle and routed foreign armies."},
    {v:35,t:"Women received back their dead, raised to life again. There were others who were tortured, refusing to be released so that they might gain an even better resurrection."},
    {v:36,t:"Some faced jeers and flogging, and even chains and imprisonment."},
    {v:37,t:"They were put to death by stoning; they were sawed in two; they were killed by the sword. They went about in sheepskins and goatskins, destitute, persecuted and mistreated—"},
    {v:38,t:"the world was not worthy of them. They wandered in deserts and mountains, living in caves and in holes in the ground."},
    {v:39,t:"These were all commended for their faith, yet none of them received what had been promised,"},
    {v:40,t:"since God had planned something better for us so that only together with us would they be made perfect."},
  ]},
  { ch:12, verses:[
    {v:1,t:"Therefore, since we are surrounded by such a great cloud of witnesses, let us throw off everything that hinders and the sin that so easily entangles. And let us run with perseverance the race marked out for us,"},
    {v:2,t:"fixing our eyes on Jesus, the pioneer and perfecter of faith. For the joy set before him he endured the cross, scorning its shame, and sat down at the right hand of the throne of God."},
    {v:3,t:"Consider him who endured such opposition from sinners, so that you will not grow weary and lose heart."},
    {v:4,t:"In your struggle against sin, you have not yet resisted to the point of shedding your blood."},
    {v:5,t:"And have you completely forgotten this word of encouragement that addresses you as a father addresses his son? It says, \"My son, do not make light of the Lord's discipline, and do not lose heart when he rebukes you,"},
    {v:6,t:"because the Lord disciplines the one he loves, and he chastens everyone he accepts as his son.\""},
    {v:7,t:"Endure hardship as discipline; God is treating you as his children. For what children are not disciplined by their father?"},
    {v:8,t:"If you are not disciplined—and everyone undergoes discipline—then you are not legitimate, not true sons and daughters at all."},
    {v:9,t:"Moreover, we have all had human fathers who disciplined us and we respected them for it. How much more should we submit to the Father of spirits and live!"},
    {v:10,t:"They disciplined us for a little while as they thought best; but God disciplines us for our good, in order that we may share in his holiness."},
    {v:11,t:"No discipline seems pleasant at the time, but painful. Later on, however, it produces a harvest of righteousness and peace for those who have been trained by it."},
    {v:12,t:"Therefore, strengthen your feeble arms and weak knees."},
    {v:13,t:"\"Make level paths for your feet,\" so that the lame may not be disabled, but rather healed."},
    {v:14,t:"Make every effort to live in peace with everyone and to be holy; without holiness no one will see the Lord."},
    {v:15,t:"See to it that no one falls short of the grace of God and that no bitter root grows up to cause trouble and defile many."},
    {v:16,t:"See that no one is sexually immoral, or is godless like Esau, who for a single meal sold his inheritance rights as the oldest son."},
    {v:17,t:"Afterward, as you know, when he wanted to inherit this blessing, he was rejected. Even though he sought the blessing with tears, he could not change what he had done."},
    {v:18,t:"You have not come to a mountain that can be touched and that is burning with fire; to darkness, gloom and storm;"},
    {v:19,t:"to a trumpet blast or to such a voice speaking words that those who heard it begged that no further word be spoken to them,"},
    {v:20,t:"because they could not bear what was commanded: \"If even an animal touches the mountain, it must be stoned to death.\""},
    {v:21,t:"The sight was so terrifying that Moses said, \"I am trembling with fear.\""},
    {v:22,t:"But you have come to Mount Zion, to the city of the living God, the heavenly Jerusalem. You have come to thousands upon thousands of angels in joyful assembly,"},
    {v:23,t:"to the church of the firstborn, whose names are written in heaven. You have come to God, the Judge of all, to the spirits of the righteous made perfect,"},
    {v:24,t:"to Jesus the mediator of a new covenant, and to the sprinkled blood that speaks a better word than the blood of Abel."},
    {v:25,t:"See to it that you do not refuse him who speaks. If they did not escape when they refused him who warned them on earth, how much less will we, if we turn away from him who warns us from heaven?"},
    {v:26,t:"At that time his voice shook the earth, but now he has promised, \"Once more I will shake not only the earth but also the heavens.\""},
    {v:27,t:"The words \"once more\" indicate the removing of what can be shaken—that is, created things—so that what cannot be shaken may remain."},
    {v:28,t:"Therefore, since we are receiving a kingdom that cannot be shaken, let us be thankful, and so worship God acceptably with reverence and awe,"},
    {v:29,t:"for our \"God is a consuming fire.\""},
  ]},
  { ch:13, verses:[
    {v:1,t:"Keep on loving one another as brothers and sisters."},

const KEY_WORDS = (()=>{
  const map = {};
  CHAPTERS_DATA.forEach(cd=>{
    cd.verses.forEach(verse=>{
      const vk = cd.ch+'-'+verse.v;
      verse.t.split(/[\s\u2014\u2013]+/).forEach(w=>{
        const core = w.replace(/[^a-zA-Z]/g,'').toLowerCase();
        if(!core) return;
        if(!map[core]) map[core]=new Set();
        map[core].add(vk);
      });
    });
  });
  const result = new Set();
  Object.entries(map).forEach(([word,verses])=>{ if(verses.size===1) result.add(word); });
  return result;
})();

// Maps each unique keyword → the chapter number it belongs to
const KEYWORD_TO_CHAPTER = (()=>{
  const result = {};
  CHAPTERS_DATA.forEach(cd=>{
    cd.verses.forEach(verse=>{
      verse.t.split(/[\s\u2014\u2013]+/).forEach(w=>{
        const core = w.replace(/[^a-zA-Z]/g,'').toLowerCase();
        if(KEY_WORDS.has(core)) result[core] = cd.ch;
      });
    });
  });
  return result;
})();

// ── Chapter label helper ──
function chLabel(ch) {
  if (ch <= 13) return 'Heb ' + ch;
  if (ch <= 18) return '1 Pet ' + (ch - 13);
  return '2 Pet ' + (ch - 18);
}

const VERSE_UNIQUE_PREFIX = (()=>{
  const result = {};
  const allVerses = [];
  CHAPTERS_DATA.forEach(cd=>{
    cd.verses.forEach(v=>{
      const key = `${cd.ch}-${v.v}`;
      const words = v.t.split(/[\s\u2014\u2013]+/).map(w=>w.replace(/[^a-zA-Z]/g,'').toLowerCase()).filter(Boolean);
      allVerses.push({key, words});
    });
  });
  allVerses.forEach((verse,i)=>{
    let maxCommon = 0;
    allVerses.forEach((other,j)=>{
      if(i===j) return;
      let c=0;
      const minLen=Math.min(verse.words.length, other.words.length);
      while(c<minLen && verse.words[c]===other.words[c]) c++;
      maxCommon=Math.max(maxCommon,c);
    });
    result[verse.key] = maxCommon + 1; // include the diverging word itself
  });
  return result;
})();

const STOP = new Set(['the','a','an','and','or','but','in','on','at','to','for','of','with','is','are','was','were','be','been','being','have','has','had','do','does','did','will','would','could','should','may','might','shall','can','not','no','nor','so','yet','both','either','neither','than','as','if','he','she','it','we','you','they','i','me','him','her','us','them','my','your','his','its','our','their','this','that','these','those','who','which','what','when','where','how','all','any','each','more','most','other','such','only','same','too','very','from','by','about','into','through','before','after','above','below','between','out','off','over','under','again','then','once','here','there','why','up','down','am','just','because','while','although','though','since','even','also','now','still','already','always','never','often','some','many','much','said','say','says','than','those']);

// ── Unique N-gram phrases (unique across ALL chapters; no component word is itself a keyword) ──
// Must be defined AFTER STOP and KEY_WORDS
function buildPhraseMap(n){
  const map={};
  CHAPTERS_DATA.forEach(cd=>{
    cd.verses.forEach(verse=>{
      const raw=verse.t.split(/[\s\u2014\u2013]+/);
      const clean=raw.map(w=>w.replace(/[^a-zA-Z]/g,'').toLowerCase()).filter(Boolean);
      for(let i=0;i<=clean.length-n;i++){
        const gram=clean.slice(i,i+n).join(' ');
        if(!map[gram]) map[gram]={ch:cd.ch,v:verse.v,count:0};
        map[gram].count++;
      }
    });
  });
  return map;
}
const KEY_PHRASES_2=(()=>{
  const map=buildPhraseMap(2); const result={};
  Object.entries(map).forEach(([gram,info])=>{
    if(info.count!==1) return;
    const words=gram.split(' ');
    if(words.some(w=>KEY_WORDS.has(w))) return;   // exclude if any word is itself a keyword
    if(words.every(w=>STOP.has(w))) return;        // exclude all-stopword phrases
    result[gram]=info.ch;
  });
  return result;
})();
const KEY_PHRASES_3=(()=>{
  const map=buildPhraseMap(3); const result={};
  Object.entries(map).forEach(([gram,info])=>{
    if(info.count!==1) return;
    const words=gram.split(' ');
    if(words.some(w=>KEY_WORDS.has(w))) return;
    if(words.every(w=>STOP.has(w))) return;
    result[gram]=info.ch;
  });
  return result;
})();

function parseWord(w){
  const m=w.match(/^([^a-zA-Z0-9\u2018\u2019''\-]*)([a-zA-Z0-9\u2018\u2019''\-]+)([^a-zA-Z0-9\u2018\u2019''\-]*)$/);
  return m ? {pre:m[1],core:m[2],post:m[3]} : {pre:'',core:w,post:''};
}
function isContent(core){
  const c=core.replace(/[^a-zA-Z]/g,'').toLowerCase();
  return c.length>0 && !STOP.has(c);
}
function norm(s){ return (s||'').trim().toLowerCase().replace(/[^a-z0-9''\-]/gi,''); }
function vkey(ch,v){ return ch*1000+v; }
function matchAnswer(userInput, correct){
  // Strip to bare letters+digits for the lax comparison (apostrophes, hyphens, quotes not required)
  const lettersOnly = s => (s||'').replace(/[^a-zA-Z0-9]/g,'').toLowerCase();
  // Normalize punctuation for a slightly stricter comparison
  const normPunct = s => (s||'').toLowerCase()
    .replace(/[\u2018\u2019\u02bc''`]/g,"'")   // curly apostrophes → straight
    .replace(/[\u201c\u201d"]/g,'')             // strip all quote marks (not required)
    .replace(/[\u2013\u2014\u2015]/g,'-')       // em/en dash → hyphen (- suffices)
    .replace(/[^a-z0-9'\-]/g,'');
  return lettersOnly(userInput)===lettersOnly(correct) || normPunct(userInput)===normPunct(correct);
}

function makeRng(seed){
  let s = (seed >>> 0) || 1;
  return function(){
    s ^= s << 13; s = s >>> 0;
    s ^= s >> 17;
    s ^= s << 5;  s = s >>> 0;
    return s / 0xFFFFFFFF;
  };
}
function hashSeed(base, str){
  let h = base >>> 0;
  for(let i=0;i<str.length;i++){
    h = Math.imul(h ^ str.charCodeAt(i), 0x9e3779b9) >>> 0;
  }
  return h;
}
function shuffleArr(arr, rng){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(rng() * (i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function buildSegs(text, level, opts={}){
  const {seed, specialty, uniquePrefix} = opts;
  const useRandom = seed != null;
  const words = text.split(/[\s\u2014\u2013]+/);
  const protectedPfx = new Set();
  if(specialty){
    const protectN = uniquePrefix ?? 5;
    let count=0;
    for(let i=0;i<words.length&&count<protectN;i++){
      const {core}=parseWord(words[i]);
      if(core){ protectedPfx.add(i); count++; }
    }
  }
  function shouldBlank(globalIdx, poolIdx, poolLen, rng){
    if(protectedPfx.has(globalIdx)) return false;
    if(level===3) return true;
    if(level===1){ return useRandom ? (rng() < 0.25) : (poolIdx % 4 === 0); }
    if(level===2){ return useRandom ? (rng() < 0.50) : (poolIdx % 2 === 0); }
    return false;
  }
  if(level===5){
    return words.map((w,i)=>{
      if(!w.trim()) return {type:'text',value:w};
      const {pre,core,post}=parseWord(w);
      if(!core) return {type:'text',value:w};
      if(protectedPfx.has(i)) return {type:'text',value:w};
      return {type:'blank',pre,core,post,idx:i};
    });
  }
  if(level===4){
    const rng = useRandom ? makeRng(seed) : null;
    return words.map((w,i)=>{
      if(!w.trim()) return {type:'text',value:w};
      const {pre,core,post}=parseWord(w);
      if(!core) return {type:'text',value:w};
      if(protectedPfx.has(i)) return {type:'text',value:w};
      const c=core.replace(/[^a-zA-Z]/g,'').toLowerCase();
      if(STOP.has(c)){
        if(useRandom && rng() > 0.80) return {type:'text',value:w};
        return {type:'blank',pre,core,post,idx:i};
      }
      return {type:'text',value:w};
    });
  }
  const ci = words.map((w,i)=>({i,...parseWord(w)})).filter(({core})=>isContent(core)).map(({i})=>i);
  const bs = new Set();
  const rng = useRandom ? makeRng(seed) : null;
  ci.forEach((idx,n)=>{ if(shouldBlank(idx, n, ci.length, rng)) bs.add(idx); });
  return words.map((w,i)=>{
    if(bs.has(i)){ const {pre,core,post}=parseWord(w); return {type:'blank',pre,core,post,idx:i}; }
    return {type:'text',value:w};
  });
}

function onSpace(e){
  if(e.key!==' ') return;
  e.preventDefault();
  const all=Array.from(document.querySelectorAll('input.blank:not([disabled])'));
  const i=all.indexOf(e.target);
  if(i>=0&&i<all.length-1) all[i+1].focus();
}

const LEVELS=[
  {label:'Level 1', desc:'~25% of content words removed'},
  {label:'Level 2', desc:'~50% of content words removed'},
  {label:'Level 3', desc:'All content words removed'},
  {label:'Level 4', desc:'Content words shown — fill in every grammar word'},
  {label:'Level 5', desc:'Every single word removed'},
];

function ReadingVerse({verse, ch, showJump}){
  const words = verse.t.split(/[\s\u2014\u2013]+/);
  const uniquePrefix = VERSE_UNIQUE_PREFIX[`${ch}-${verse.v}`] ?? 5;
  return (
    <div className="verse">
      <span className="vnum static-vnum">{verse.v}</span>
      <span className="vtext">
        {words.map((w,i)=>{
          const core = w.replace(/[^a-zA-Z]/g,'').toLowerCase();
          const isKey = core.length>=3 && KEY_WORDS.has(core);
          const isJumpPoint = showJump && i === uniquePrefix;
          return (
            <span key={i}>
              {isJumpPoint && <span className="ftv-jump" title="FTV jump point">/</span>}
              {isKey ? <strong className="key-word">{w}</strong> : w}{' '}
            </span>
          );
        })}
      </span>
    </div>
  );
}

function VerseRow({verse, ch, level, segOpts, ans, hinted, setAns, checked}){
  const verseSeed = segOpts.seed != null ? hashSeed(segOpts.seed, `${ch}-${verse.v}`) : null;
  const uniquePrefix = VERSE_UNIQUE_PREFIX[`${ch}-${verse.v}`] ?? 5;
  const opts = {...segOpts, seed: verseSeed, uniquePrefix};
  const segs = useMemo(()=>buildSegs(verse.t, level, opts), [verse.t, level, verseSeed, segOpts.specialty]);
  const vnKey=`${ch}-${verse.v}-vnum`;
  const vnVal=ans[vnKey]||'';
  const vnOk=checked && norm(vnVal)===String(verse.v);
  const vnBad=checked && norm(vnVal)!==String(verse.v);
  return (
    <div className="verse">
      <span className="vnum">
        <input className={'blank vnum-blank'+(vnOk?' ok':vnBad?' bad':'')} value={vnVal}
          onChange={e=>setAns(vnKey,e.target.value)} onKeyDown={onSpace} disabled={checked}
          autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false"
          name={`q_${vnKey}`}
          data-bkey={vnKey} data-correct={String(verse.v)} data-ch={ch} placeholder="#" title="Verse number"/>
        {vnBad&&checked&&<span className="hint-ans" style={{fontSize:'.65rem'}}>({verse.v})</span>}
      </span>
      <span className="vtext">
        {segs.map((s,i)=>{
          if(s.type==='text') return <span key={i}>{s.value}{' '}</span>;
          const k=`${ch}-${verse.v}-${s.idx}`;
          const val=ans[k]||'';
          const wasHinted=hinted[k];
          const isOk=checked&&matchAnswer(val,s.core);
          const isBad=checked&&!matchAnswer(val,s.core);
          const w=Math.max(s.core.length*9,28);
          return (
            <span key={i}>
              {s.pre}
              <input className={'blank'+(isOk?' ok':isBad?' bad':wasHinted&&!checked?' hinted':'')}
                style={{width:w+'px'}} value={val}
                onChange={e=>setAns(k,e.target.value)} onKeyDown={onSpace} disabled={checked}
                autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false"
                name={`q_${k}`}
                data-bkey={k} data-correct={s.core} data-ch={ch} placeholder="…"/>
              {isBad&&checked&&<span className="hint-ans">({s.core})</span>}
              {s.post}{' '}
            </span>
          );
        })}
      </span>
    </div>
  );
}

/* ════════════════════════════════════════════
   KEYWORDS QUIZ FEATURE
════════════════════════════════════════════ */
const TIMER_MAX = 20;

function KeywordQuiz({ onBack }) {
  const allChapters = CHAPTERS_DATA.map(c => c.ch);

  // ── Setup state ──
  const [phase, setPhase]         = useState('setup'); // 'setup' | 'playing' | 'results'
  const [selChs, setSelChs]       = useState(new Set());
  const [phraseMode, setPhraseMode] = useState(null);  // null | '2' | '3'
  const [reverseMode, setReverseMode] = useState(false);

  // ── Game state ──
  const [pool, setPool]           = useState([]);   // [{item, ch}] shuffled
  const [qIdx, setQIdx]           = useState(0);
  const [picked, setPicked]       = useState(null); // chapter/item user chose, or 'timeout'
  const [timeLeft, setTimeLeft]   = useState(TIMER_MAX);
  const [history, setHistory]     = useState([]);

  const timerRef   = useRef(null);
  const autoRef    = useRef(null);
  const choicesRef = useRef({qIdx:-1, choices:null}); // stable reverse-mode choices per question

  // ── Timer ──
  useEffect(()=>{
    if(phase !== 'playing' || picked !== null) return;
    if(timeLeft <= 0){ handleAnswer('timeout'); return; }
    timerRef.current = setTimeout(()=> setTimeLeft(t => t - 1), 1000);
    return ()=> clearTimeout(timerRef.current);
  }, [phase, timeLeft, picked]);

  function getSourceMap(){
    if(phraseMode==='2') return KEY_PHRASES_2;
    if(phraseMode==='3') return KEY_PHRASES_3;
    return KEYWORD_TO_CHAPTER;
  }

  function buildPool(chs){
    const src=getSourceMap();
    const entries=[];
    chs.forEach(ch=>{
      Object.entries(src).forEach(([item,itemCh])=>{
        if(itemCh===ch) entries.push({item,ch});
      });
    });
    for(let i=entries.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [entries[i],entries[j]]=[entries[j],entries[i]];
    }
    return entries;
  }

  // For reverse mode: given current chapter, generate choices {item,ch}
  // Returns {correct, choices[]} where choices is 4 items shuffled
  function buildReverseChoices(pool, qIdx, rng){
    const correct=pool[qIdx];
    // Distractors: items from other chapters in the pool
    const others=pool.filter((_,i)=>i!==qIdx && _.ch!==correct.ch);
    // Shuffle others deterministically
    const shuffled=others.slice().sort(()=>Math.random()-.5);
    const distractors=shuffled.slice(0,3);
    const choices=[correct,...distractors].sort(()=>Math.random()-.5);
    return {correct,choices};
  }

  function startQuiz(){
    if(selChs.size===0) return;
    const p=buildPool([...selChs]);
    if(p.length===0) return;
    setPool(p); setQIdx(0); setHistory([]); setPicked(null); setTimeLeft(TIMER_MAX);
    choicesRef.current = {qIdx:-1, choices:null};
    setPhase('playing');
    if(window.BgMgr) window.BgMgr.setChapter([...selChs][0]);
  }

  function handleAnswer(ans){
    clearTimeout(timerRef.current); clearTimeout(autoRef.current);
    const current=pool[qIdx];
    const isTimeout=ans==='timeout';
    let correct;
    if(reverseMode){
      correct=!isTimeout && ans===current.item;
    } else {
      correct=!isTimeout && ans===current.ch;
    }
    setPicked(ans);
    setHistory(h=>[...h,{
      item:current.item, correctCh:current.ch,
      picked:ans, correct, timedOut:isTimeout,
      correctItem:current.item
    }]);
    if(correct) autoRef.current=setTimeout(()=>advance(),1800);
    // On wrong/timeout, don't auto-advance — let user see & click Next
  }

  function advance(){
    clearTimeout(autoRef.current);
    const nextIdx=qIdx+1;
    if(nextIdx>=pool.length){ setPhase('results'); return; }
    setQIdx(nextIdx); setPicked(null); setTimeLeft(TIMER_MAX);
    if(window.BgMgr) window.BgMgr.setChapter(pool[nextIdx].ch);
  }

  function restart(){ setPhase('setup'); setPicked(null); setTimeLeft(TIMER_MAX); setHistory([]); clearTimeout(timerRef.current); clearTimeout(autoRef.current); }

  function toggleCh(ch){ setSelChs(prev=>{ const n=new Set(prev); n.has(ch)?n.delete(ch):n.add(ch); return n; }); }
  function togglePhrase(mode){ setPhraseMode(prev=>prev===mode?null:mode); }

  // ── Keyboard: number keys → submit chapter (forward mode) ──
  useEffect(()=>{
    if(phase!=='playing'||picked!==null||reverseMode) return;
    let buf=''; let bufTimer=null;
    function onKey(e){
      if(e.key==='Escape'){ restart(); return; }
      if(/^\d$/.test(e.key)){
        buf+=e.key; clearTimeout(bufTimer);
        bufTimer=setTimeout(()=>{
          const ch=parseInt(buf,10);
          if([...selChs].includes(ch)) handleAnswer(ch);
          buf='';
        },400);
      }
    }
    window.addEventListener('keydown',onKey);
    return ()=>{ window.removeEventListener('keydown',onKey); clearTimeout(bufTimer); };
  },[phase,picked,qIdx,reverseMode]);

  /* ── RENDER: SETUP ── */
  if(phase==='setup'){
    const poolSize=buildPool([...selChs]).length;
    const modeLabel=phraseMode==='2'?'2-word phrases':phraseMode==='3'?'3-word phrases':'keywords';
    return (
      <div className="kq-wrap">
        <div className="top-nav">
          <button className="kq-nav-btn" onClick={onBack}>← Memory Quiz</button>
        </div>
        <div className="kq-title">Keywords Quiz</div>
        <div className="kq-subtitle">Identify which chapter each unique {modeLabel} belongs to</div>

        {/* Chapter select */}
        <div className="range-card">
          <div className="kq-section-label">SELECT CHAPTERS TO QUIZ</div>
          <div className="kq-ch-grid">
            {allChapters.map(ch=>(
              <button key={ch} className={'kq-ch-btn'+(selChs.has(ch)?' kq-sel':'')}
                onClick={()=>toggleCh(ch)}>{chLabel(ch)}</button>
            ))}
          </div>
          <div className="kq-sel-row">
            <button className="btn btn-ghost" style={{fontSize:'.7rem',padding:'.3rem .9rem'}} onClick={()=>setSelChs(new Set(allChapters))}>Select All</button>
            <button className="btn btn-ghost" style={{fontSize:'.7rem',padding:'.3rem .9rem'}} onClick={()=>setSelChs(new Set())}>Clear</button>
          </div>
          <div className="kq-sel-count">
            {selChs.size===0 ? 'No chapters selected' : `${selChs.size} chapter${selChs.size>1?'s':''} selected · ${poolSize} ${modeLabel}`}
          </div>
        </div>

        {/* Word type options */}
        <div className="range-card" style={{marginTop:'.7rem'}}>
          <div className="kq-section-label">QUIZ TYPE</div>
          <div style={{display:'flex',gap:'1rem',justifyContent:'center',flexWrap:'wrap',marginBottom:'.75rem'}}>
            <button
              className={'kq-ch-btn'+(phraseMode===null?' kq-sel':'')}
              onClick={()=>setPhraseMode(null)}
              style={{padding:'.7rem 1.4rem',minWidth:'130px',fontSize:'.88rem',lineHeight:1.4}}>
              🔑 Keywords
            </button>
            <button
              className={'kq-ch-btn'+(phraseMode==='2'?' kq-sel':'')}
              onClick={()=>togglePhrase('2')}
              style={{padding:'.7rem 1.4rem',minWidth:'150px',fontSize:'.88rem',lineHeight:1.4}}>
              ✦✦ 2-Word Phrases
            </button>
            <button
              className={'kq-ch-btn'+(phraseMode==='3'?' kq-sel':'')}
              onClick={()=>togglePhrase('3')}
              style={{padding:'.7rem 1.4rem',minWidth:'150px',fontSize:'.88rem',lineHeight:1.4}}>
              ✦✦✦ 3-Word Phrases
            </button>
          </div>
          <div style={{textAlign:'center',fontSize:'.75rem',fontStyle:'italic',color:'var(--c-vmuted)',lineHeight:1.6}}>
            {phraseMode===null && 'Words unique to one verse across all chapters · phrases excluded'}
            {phraseMode==='2' && '2-word sequences unique to one verse · not containing any keyword'}
            {phraseMode==='3' && '3-word sequences unique to one verse · not containing any keyword'}
          </div>
        </div>

        {/* Reverse mode */}
        <div className="range-card" style={{marginTop:'.7rem'}}>
          <div className="kq-section-label">DIRECTION</div>
          <div style={{display:'flex',gap:'1rem',justifyContent:'center',marginBottom:'.6rem',flexWrap:'wrap'}}>
            <button className={'kq-ch-btn'+(!reverseMode?' kq-sel':'')} onClick={()=>setReverseMode(false)}
              style={{padding:'.7rem 1.6rem',minWidth:'160px',fontSize:'.88rem',lineHeight:1.4}}>
              → Word → Chapter
            </button>
            <button className={'kq-ch-btn'+(reverseMode?' kq-sel':'')} onClick={()=>setReverseMode(true)}
              style={{padding:'.7rem 1.6rem',minWidth:'160px',fontSize:'.88rem',lineHeight:1.4}}>
              ↩ Chapter → Word
            </button>
          </div>
          <div style={{textAlign:'center',fontSize:'.75rem',fontStyle:'italic',color:'var(--c-vmuted)',lineHeight:1.6}}>
            {reverseMode
              ? 'Given a chapter, pick the correct keyword/phrase from 4 choices'
              : 'Given a keyword/phrase, click the chapter it belongs to'}
          </div>
        </div>

        <div style={{textAlign:'center',marginBottom:'1rem',marginTop:'.8rem',fontSize:'.83rem',fontStyle:'italic',color:'var(--c-vmuted)'}}>
          You have {TIMER_MAX} seconds per question.
        </div>

        <div className="btn-row" style={{marginTop:0}}>
          <button className="btn btn-gold" disabled={selChs.size===0||poolSize===0} onClick={startQuiz}>
            Start Quiz
          </button>
        </div>

        <div className="footer-note" style={{marginTop:'2rem'}}>
          {phraseMode===null && 'Keywords appear in only one verse across the entire text'}
          {phraseMode==='2' && '2-word key phrases: unique across the text, no word is itself a keyword'}
          {phraseMode==='3' && '3-word key phrases: unique across the text, no word is itself a keyword'}
        </div>
      </div>
    );
  }

  /* ── RENDER: PLAYING ── */
  if(phase==='playing'){
    const current=pool[qIdx];
    const answered=picked!==null;
    const isTimeout=picked==='timeout';
    const isCorrect=!isTimeout&&answered&&(reverseMode ? picked===current.item : picked===current.ch);
    const correctCount=history.filter(h=>h.correct).length;
    const attempted=history.length;
    const pct=Math.round((timeLeft/TIMER_MAX)*100);
    const urgent=timeLeft<=5;
    const sortedChs=[...selChs].sort((a,b)=>a-b);

    // Stable reverse choices: only rebuilt when qIdx changes (uses top-level choicesRef)
    if(reverseMode && choicesRef.current.qIdx !== qIdx){
      const others=pool.filter((_,i)=>i!==qIdx&&_.ch!==current.ch);
      const shuffled=others.slice().sort(()=>Math.random()-.5);
      const distractors=shuffled.slice(0,3);
      choicesRef.current={qIdx, choices:[current,...distractors].sort(()=>Math.random()-.5)};
    }
    const choices = reverseMode ? choicesRef.current.choices : null;

    const modeLabel=phraseMode==='2'?'KEY PHRASE (2-WORD)':phraseMode==='3'?'KEY PHRASE (3-WORD)':'KEYWORD';

    // Verse ref helper
    function getVerseRef(item,ch){
      const srcMap=phraseMode?null:KEYWORD_TO_CHAPTER;
      if(phraseMode){
        const map=phraseMode==='2'?buildPhraseMap(2):buildPhraseMap(3);
        // find verse
        const entry=map[item];
        return entry?`${chLabel(ch)} · v.${entry.v}`:`${chLabel(ch)}`;
      }
      // keyword
      const verse=CHAPTERS_DATA.find(c=>c.ch===ch)?.verses.find(v=>
        v.t.split(/[\s\u2014\u2013]+/).some(w=>w.replace(/[^a-zA-Z]/g,'').toLowerCase()===item)
      );
      return verse?`${chLabel(ch)} · v.${verse.v}`:`${chLabel(ch)}`;
    }

    return (
      <div className="kq-wrap">
        <div className="top-nav">
          <button className="kq-nav-btn" onClick={restart}>✕ Exit</button>
        </div>

                    </button>

              </div>
            </>

            <>
              <div className="kq-q-label">WHICH CHAPTER CONTAINS THIS {modeLabel}?</div>

                    else if(ch===picked&&!isCorrect) cls+=' kq-wrong';
                  }
                  return (
                    <button key={ch} className={cls} disabled={answered}
                      onClick={()=>!answered&&handleAnswer(ch)}>
                      {chLabel(ch)}
                    </button>
                  );
                })}
              </div>
            </>
          )}

          <div className={'kq-feedback'+
            (answered?(isTimeout?' kq-fb-timeout':isCorrect?' kq-fb-correct':' kq-fb-wrong'):'')}>

              ? isTimeout ? `Time's up — ${reverseMode?`"${current.item}"`:''} ${chLabel(current.ch)}`
                : isCorrect ? '✦ Correct!'
                : reverseMode ? `✗  "${current.item}" — ${chLabel(current.ch)}` : `✗  ${chLabel(current.ch)}`
              : <span style={{opacity:0}}>·</span>}
          </div>
        </div>

        {answered && (
          <div className="kq-next-row">

              {qIdx+1>=pool.length?'See Results':'Next →'}

        <div style={{textAlign:'center',fontSize:'.7rem',color:'var(--c-vmuted)',opacity:.55,marginTop:'.8rem',fontStyle:'italic'}}>
          {reverseMode ? 'Click the correct keyword/phrase · Esc to exit' : 'Type chapter number + Enter · Esc to exit'}
        </div>
      </div>
    );
  }

  /* ── RENDER: RESULTS ── */
  const correct=history.filter(h=>h.correct).length;
  const total=history.length;
  const pctScore=total>0?Math.round((correct/total)*100):0;
  const modeLabel=phraseMode==='2'?'2-word phrases':phraseMode==='3'?'3-word phrases':'keywords';

  return (
    <div className="kq-wrap">
      <div className="top-nav">
        <button className="kq-nav-btn" onClick={onBack}>← Memory Quiz</button>
      </div>

      <div className="kq-title">Keywords Quiz</div>

      <div className="kq-results-card">
        <div className={'kq-results-pct'+(pctScore===100?' score perfect':pctScore>=70?' score good':' score low')}

          {pctScore}%
        </div>
        <div className="kq-results-label">
          {pctScore===100?'Perfect — every item placed correctly!':`${correct} of ${total} correct`}
        </div>
        <div className="kq-results-stats">
          <div className="kq-stat"><span className="kq-stat-num green">{correct}</span><span className="kq-stat-lbl">CORRECT</span></div>
          <div className="kq-stat"><span className="kq-stat-num red">{history.filter(h=>!h.correct&&!h.timedOut).length}</span><span className="kq-stat-lbl">WRONG</span></div>
          <div className="kq-stat"><span className="kq-stat-num" style={{color:'var(--c-vmuted)'}}>{history.filter(h=>h.timedOut).length}</span><span className="kq-stat-lbl">TIMED OUT</span></div>
        </div>

        {history.length>0 && (
          <div className="kq-history">
            {history.map((h,i)=>(
              <div key={i} className={'kq-history-row '+(h.correct?'h-ok':'h-bad')}>
                <span className="kq-h-word" style={phraseMode?{fontStyle:'italic',fontFamily:"'Crimson Pro',serif"}:{}}>{h.item}</span>
                <span className={'kq-h-info '+(h.correct?'ok':'bad')}>
                  {h.correct ? `${chLabel(h.correctCh)} ✓`
                    : h.timedOut ? `${chLabel(h.correctCh)} (timed out)`
                    : reverseMode ? `You: "${h.picked}" · Answer: "${h.correctItem}"`
                    : `You: ${chLabel(h.picked)} · Answer: ${chLabel(h.correctCh)}`}
                </span>
              </div>
            ))}
          </div>
        )}
      </div>

      <div className="btn-row">
        <button className="btn btn-gold" onClick={restart}>Try Again</button>
      </div>
      <div className="footer-note" style={{marginTop:'1.5rem'}}>
        Quizzed on {modeLabel}{reverseMode?' (reverse mode)':''}

    </div>
  );
}

/* ════════════════════════════════════════════
   CUSTOM VERSE PICKER
════════════════════════════════════════════ */
const STORAGE_KEY = 'wardify_custom_selection';

function loadSaved(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return null;
    const parsed = JSON.parse(raw);
    if(Array.isArray(parsed) && parsed.length > 0) return new Set(parsed);
  } catch(e){}
  return null;
}

function CustomPicker({ onBack, onApply }){
  const allChapters = CHAPTERS_DATA.map(c => c.ch);
  const [openChs, setOpenChs] = React.useState(new Set());
  const [picked, setPicked] = React.useState(() => loadSaved() || new Set());
  const [saveFlash, setSaveFlash] = React.useState(false);

  // Which chapters have any picked verses
  function chHasPicked(ch){
    return CHAPTERS_DATA.find(c=>c.ch===ch)?.verses.some(v=>picked.has(`${ch}-${v.v}`));
  }

  // Max 2 chapters open at once
  function toggleChapter(ch){
    setOpenChs(prev=>{
      const next = new Set(prev);
      if(next.has(ch)){
        next.delete(ch);
      } else {
        if(next.size >= 2){
          // close the oldest (first) one
          const first = [...next][0];
          next.delete(first);
        }
        next.add(ch);
      }
      return next;
    });
  }

  function toggleVerse(ch, v){
    const key = `${ch}-${v}`;
    setPicked(prev=>{
      const next = new Set(prev);
      next.has(key) ? next.delete(key) : next.add(key);
      return next;
    });
  }

  function selectAllCh(ch){
    const verses = CHAPTERS_DATA.find(c=>c.ch===ch)?.verses || [];
    setPicked(prev=>{
      const next = new Set(prev);
      verses.forEach(v => next.add(`${ch}-${v.v}`));
      return next;
    });
  }

  function clearCh(ch){
    const verses = CHAPTERS_DATA.find(c=>c.ch===ch)?.verses || [];
    setPicked(prev=>{
      const next = new Set(prev);
      verses.forEach(v => next.delete(`${ch}-${v.v}`));
      return next;
    });
  }

  function saveSelection(){
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...picked]));
      setSaveFlash(true);
      setTimeout(()=>setSaveFlash(false), 1800);
    } catch(e){}
  }

  function applySelection(){
    // Build ordered verse array from CHAPTERS_DATA order
    const verses = [];
    CHAPTERS_DATA.forEach(cd=>{
      cd.verses.forEach(v=>{
        if(picked.has(`${cd.ch}-${v.v}`)) verses.push({ch:cd.ch, ...v});
      });
    });
    if(verses.length > 0) onApply(verses);
  }

  const totalPicked = picked.size;

  return (
    <div className="cp-page">
      <div className="top-nav-left" style={{position:'fixed',top:'1.1rem',left:'1rem',zIndex:60}}>
        <button className="kq-nav-btn" onClick={onBack}>← Back</button>
      </div>

      <div style={{paddingTop:'3rem'}}>
        <div className="cp-title">Custom Selection</div>
        <div className="cp-subtitle">Choose up to 2 chapters · pick any verses you want</div>

        <div className="range-card" style={{marginBottom:'1.2rem'}}>
          <div className="range-label" style={{marginBottom:'.8rem'}}>SELECT CHAPTERS (UP TO 2)</div>
          <div className="cp-ch-grid">
            {allChapters.map(ch=>{
              const isOpen = openChs.has(ch);
              const hasPicked = chHasPicked(ch);
              return (
                <button key={ch}
                  className={'cp-ch-btn'+(isOpen?' cp-ch-open':hasPicked?' cp-ch-has':'')}
                  onClick={()=>toggleChapter(ch)}>
                  {chLabel(ch)}
                  {hasPicked && !isOpen && <span className="cp-ch-dot"/>}
                </button>
              );
            })}
          </div>
          {openChs.size===0 && (
            <div style={{textAlign:'center',fontStyle:'italic',fontSize:'.82rem',color:'var(--c-vmuted)'}}>
              Click a chapter number to expand its verses
            </div>
          )}
        </div>

        {[...openChs].sort((a,b)=>a-b).map(ch=>{
          const chData = CHAPTERS_DATA.find(c=>c.ch===ch);
          if(!chData) return null;
          return (
            <div key={ch} className="cp-verses-block">
              <div className="cp-verses-header">
                <span className="cp-verses-label">{chLabel(ch)}</span>
                <div className="cp-verses-actions">
                  <button className="cp-mini-btn" onClick={()=>selectAllCh(ch)}>All</button>
                  <button className="cp-mini-btn" onClick={()=>clearCh(ch)}>None</button>
                </div>
              </div>
              <div className="cp-verse-chips">
                {chData.verses.map(v=>{
                  const key = `${ch}-${v.v}`;
                  const on = picked.has(key);
                  return (
                    <button key={v.v} className={'cp-chip'+(on?' cp-chip-on':'')}
                      onClick={()=>toggleVerse(ch, v.v)}
                      title={v.t.substring(0,60)+'…'}>
                      {v.v}
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>

      {/* Sticky footer */}
      <div className="cp-footer">
        <span className="cp-count-label">
          <span>{totalPicked}</span> verse{totalPicked!==1?'s':''} selected
        </span>
        <button className="btn btn-ghost" style={{fontSize:'.72rem',padding:'.42rem 1.1rem'}}
          onClick={saveSelection}>
          {saveFlash ? '✓ Saved!' : '💾 Save Selection'}
        </button>
        <button className="btn btn-gold" style={{fontSize:'.72rem',padding:'.42rem 1.3rem'}}
          disabled={totalPicked===0}
          onClick={applySelection}>
          Use These Verses →
        </button>
      </div>
    </div>
  );
}

function ChapterStudyPage({ onBack }) {
  const canvasRef = React.useRef(null);
  const [selectedCh, setSelectedCh] = React.useState(null);
  const [confirmed, setConfirmed] = React.useState(false);

  // Picker view: inky tools bg. Detail view: chapter's own bg
  React.useEffect(()=>{
    if(confirmed && selectedCh){
      // Switch off tools mode so BgMgr allows setChapter
      if(window.BgMgr){ window.BgMgr.toolsMode=false; window.BgMgr.setChapter(selectedCh); }
    } else {
      if(window.BgMgr) window.BgMgr.setToolsMode(true);
    }
    return ()=>{ if(window.BgMgr) window.BgMgr.setToolsMode(false); };
  },[confirmed, selectedCh]);

  // Inky splash canvas
  React.useEffect(()=>{
    const c=canvasRef.current; if(!c) return;
    let W=c.width=window.innerWidth, H=c.height=window.innerHeight;
    const ctx=c.getContext('2d');

    // Ink blobs: each has position, radius, spread speed, alpha, hue
    const blobs=Array.from({length:18},(_,i)=>({
      x:(0.05+Math.random()*0.9)*W,
      y:(0.05+Math.random()*0.9)*H,
      r:30+Math.random()*80,
      maxR:(120+Math.random()*200),
      spd:0.12+Math.random()*0.18,
      a:0.55+Math.random()*0.35,
      hue:220+Math.random()*60,   // deep indigo–violet
      phase:Math.random()*Math.PI*2,
      pspd:0.004+Math.random()*0.006,
    }));

    // Ink ripples
    const ripples=Array.from({length:6},(_,i)=>({
      x:(0.15+Math.random()*0.7)*W,
      y:(0.15+Math.random()*0.7)*H,
      r:0, maxR:160+Math.random()*120,
      spd:0.35+Math.random()*0.4,
      a:0,
    }));
    let rRespawn=0;

    let raf, t=0;
    function draw(){
      raf=requestAnimationFrame(draw); t+=1;

      // Deep inky base
      ctx.fillStyle='#04030a';
      ctx.fillRect(0,0,W,H);

      // Subtle ink wash gradient overlay
      const wash=ctx.createRadialGradient(W*0.4,H*0.35,0,W*0.4,H*0.35,Math.max(W,H)*0.75);
      wash.addColorStop(0,'rgba(18,10,40,0.7)');
      wash.addColorStop(0.5,'rgba(8,4,20,0.5)');
      wash.addColorStop(1,'rgba(0,0,0,0.2)');
      ctx.fillStyle=wash; ctx.fillRect(0,0,W,H);

      // Ink blobs — slow pulsing amorphous shapes
      blobs.forEach(b=>{
        b.phase+=b.pspd;
        if(b.r<b.maxR) b.r+=b.spd;
        const pulse=Math.sin(b.phase)*0.08;
        const rx=b.r*(1+pulse), ry=b.r*(1-pulse*0.6);
        const g=ctx.createRadialGradient(b.x,b.y,0,b.x,b.y,rx);
        g.addColorStop(0,`hsla(${b.hue},55%,18%,${b.a})`);
        g.addColorStop(0.55,`hsla(${b.hue},45%,10%,${b.a*0.5})`);
        g.addColorStop(1,`hsla(${b.hue},40%,5%,0)`);
        ctx.save();
        ctx.translate(b.x,b.y);
        ctx.scale(1, ry/rx);
        ctx.beginPath(); ctx.arc(0,0,rx,0,Math.PI*2);
        ctx.fillStyle=g; ctx.fill();
        ctx.restore();
      });

      // Ink droplet splash ripples
      rRespawn++;
      if(rRespawn>90){
        rRespawn=0;
        const rr=ripples[Math.floor(Math.random()*ripples.length)];
        rr.x=(0.1+Math.random()*0.8)*W;
        rr.y=(0.1+Math.random()*0.8)*H;
        rr.r=0; rr.a=0.45+Math.random()*0.3;
      }
      ripples.forEach(rr=>{
        if(rr.r>=rr.maxR){ rr.r=0; return; }
        rr.r+=rr.spd; rr.a*=0.988;
        const hue=230+Math.sin(t*0.02)*20;
        ctx.strokeStyle=`hsla(${hue},60%,55%,${rr.a*0.35})`;
        ctx.lineWidth=1.2;
        ctx.beginPath(); ctx.arc(rr.x,rr.y,rr.r,0,Math.PI*2); ctx.stroke();
      });

      // Fine ink particle dust
      ctx.fillStyle='rgba(140,120,200,0.025)';
      for(let i=0;i<8;i++){
        const px=(Math.sin(t*0.007+i*1.3)*0.4+0.5)*W;
        const py=(Math.cos(t*0.005+i*2.1)*0.4+0.5)*H;
        ctx.beginPath(); ctx.arc(px,py,1.2,0,Math.PI*2); ctx.fill();
      }
    }
    draw();
    function onResize(){ W=c.width=window.innerWidth; H=c.height=window.innerHeight; }
    window.addEventListener('resize',onResize);
    return ()=>{ cancelAnimationFrame(raf); window.removeEventListener('resize',onResize); };
  },[]);

  const allChapters=CHAPTERS_DATA.map(c=>c.ch);

  /* ── Chapter detail view ── */
  if(confirmed && selectedCh){
    const chData=CHAPTERS_DATA.find(c=>c.ch===selectedCh);
    const sections=CHAPTER_SECTIONS[selectedCh]||[];

    // Build chronological keywords list for this chapter
    const chKeywords=[];
    chData.verses.forEach(verse=>{
      verse.t.split(/[\s\u2014\u2013]+/).forEach(w=>{
        const core=w.replace(/[^a-zA-Z]/g,'').toLowerCase();
        if(core.length>=3 && KEY_WORDS.has(core) && KEYWORD_TO_CHAPTER[core]===selectedCh){
          chKeywords.push(core);
        }
      });
    });

    return (
      <div style={{position:'relative',minHeight:'100vh'}}>
        <div style={{position:'relative',zIndex:3,maxWidth:700,margin:'0 auto',padding:'1rem 1.2rem 5rem',fontFamily:"'Crimson Pro',serif",color:'var(--c-body)'}}>

          <div style={{display:'flex',alignItems:'center',gap:'1rem',paddingTop:'.6rem',marginBottom:'1.8rem'}}>
            <button className="kq-nav-btn" onClick={()=>setConfirmed(false)}>← Chapters</button>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'.7rem',letterSpacing:'.12em',color:'var(--c-vmuted)'}}>
              {chLabel(selectedCh)} MATERIAL
            </div>
          </div>

          <div style={{textAlign:'center',marginBottom:'2rem'}}>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'1.6rem',letterSpacing:'.1em',color:'#d4c0f0',textShadow:'0 0 40px rgba(160,120,220,.4)'}}>
              {chLabel(selectedCh)}
            </div>

  /* ── Chapter picker view ── */

                  display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:'.15rem',
                  boxShadow:on?'0 0 18px rgba(160,120,220,.25)':'none',
                }}>
                <span style={{fontSize:'.72rem'}}>{chLabel(ch)}</span>
                <span style={{fontSize:'.52rem',opacity:.6,letterSpacing:'.04em'}}>{secCount}sec</span>

        </div>

        {selectedCh && (
          <div style={{textAlign:'center',marginBottom:'1rem'}}>
            <div style={{fontStyle:'italic',fontSize:'.88rem',color:'rgba(180,160,220,.55)',marginBottom:'.9rem'}}>
              {chLabel(selectedCh)} · {(CHAPTER_SECTIONS[selectedCh]||[]).length} sections · {CHAPTERS_DATA.find(c=>c.ch===selectedCh)?.verses.length} verses
            </div>
            <button className="btn btn-gold"
              style={{background:'linear-gradient(135deg,rgba(140,80,220,.35),rgba(100,60,180,.35))',border:'1px solid rgba(160,120,240,.5)',color:'#d4b8f8',fontSize:'.88rem',padding:'.65rem 2rem'}}
              onClick={()=>setConfirmed(true)}>

        )}

        {!selectedCh && (
          <div style={{textAlign:'center',fontStyle:'italic',fontSize:'.82rem',color:'rgba(180,160,220,.3)',marginTop:'.5rem'}}>

    </div>
  );

/* ════════════════════════════════════════════
   REFERENCE MATCHING — racing dots canvas
════════════════════════════════════════════ */
const RM_COLORS=['#ff4444','#ff8c00','#ffe135','#44dd66','#22ccff','#8855ff','#ff44bb','#ff6622','#00ffcc','#ff2277','#66ff22','#4488ff','#ffcc00','#cc44ff','#00ee88','#ff5533','#33ddff','#ff3388','#aaff00','#ff77aa'];
function useRefMatchCanvas(canvasRef){
  React.useEffect(()=>{
    const c=canvasRef.current; if(!c) return;
    let W=c.width=window.innerWidth, H=c.height=window.innerHeight;
    const ctx=c.getContext('2d');
    const RADIUS=5, N_DOTS=22;
    const dots=Array.from({length:N_DOTS},(_,i)=>({
      yFrac:(i+0.5)/N_DOTS,
      phase:Math.random()*Math.PI*2,
      speed:0.018+Math.random()*0.032,
      color:RM_COLORS[i%RM_COLORS.length],
    }));
    let raf;
    function draw(){
      raf=requestAnimationFrame(draw);
      ctx.fillStyle='#0c0c0c'; ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='rgba(55,55,55,0.35)'; ctx.lineWidth=0.5;
      dots.forEach(d=>{
        const y=d.yFrac*H;
        ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
      });
      dots.forEach(d=>{
        d.phase+=d.speed;
        const x=W*(0.5+0.46*Math.sin(d.phase));
        const y=d.yFrac*H;
        const rv=parseInt(d.color.slice(1,3),16), gv=parseInt(d.color.slice(3,5),16), bv=parseInt(d.color.slice(5,7),16);
        const glow=ctx.createRadialGradient(x,y,0,x,y,RADIUS*5);
        glow.addColorStop(0,`rgba(${rv},${gv},${bv},0.4)`);
        glow.addColorStop(1,`rgba(${rv},${gv},${bv},0)`);
        ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(x,y,RADIUS*5,0,Math.PI*2); ctx.fill();
        ctx.fillStyle=d.color; ctx.beginPath(); ctx.arc(x,y,RADIUS,0,Math.PI*2); ctx.fill();
      });
    }
    draw();
    function onResize(){ W=c.width=window.innerWidth; H=c.height=window.innerHeight; }
    window.addEventListener('resize',onResize);
    return ()=>{ cancelAnimationFrame(raf); window.removeEventListener('resize',onResize); };
  },[]);
}

const RM_SEL_KEY='wardify_refmatch_sel';
function rmSaveSel(obj){ try{ localStorage.setItem(RM_SEL_KEY,JSON.stringify(obj)); }catch(e){} }
function rmLoadSel(){ try{ const r=localStorage.getItem(RM_SEL_KEY); return r?JSON.parse(r):null; }catch(e){ return null; } }

function RefMatchPage({ onBack, initialCustomVerses }) {
  const canvasRef=React.useRef(null);
  useRefMatchCanvas(canvasRef);
  React.useEffect(()=>{ if(window.BgMgr) window.BgMgr.setToolsMode(true); return()=>{ if(window.BgMgr) window.BgMgr.setToolsMode(false); }; },[]);

  const allChapters=CHAPTERS_DATA.map(c=>c.ch);
  const saved=React.useMemo(()=>rmLoadSel(),[]);

  // ── Setup state ──
  const [phase, setPhase]=React.useState('setup');
  const [selMode, setSelMode]=React.useState(saved?.selMode||'chapter');
  const [selChs, setSelChs]=React.useState(()=>new Set(saved?.selChs||[]));
  const [sChIdx, setSChIdx]=React.useState(saved?.sChIdx??0);
  const [sV, setSV]=React.useState(saved?.sV??1);
  const [eChIdx, setEChIdx]=React.useState(saved?.eChIdx??0);
  const [eV, setEV]=React.useState(saved?.eV??CHAPTERS_DATA[0].verses.length);
  const [direction, setDirection]=React.useState(saved?.direction||'refFromVerse');
  const [saveFlash, setSaveFlash]=React.useState(false);

  // ── Inline custom picker state ──
  const [inlineOpenChs, setInlineOpenChs]=React.useState(new Set());
  const [inlinePicked, setInlinePicked]=React.useState(()=>{
    if(saved?.inlinePicked) return new Set(saved.inlinePicked);
    if(initialCustomVerses) return new Set(initialCustomVerses.map(v=>`${v.ch}-${v.v}`));
    return new Set();
  });

  // ── Game state ──
  const [pool, setPool]=React.useState([]);
  const [qIdx, setQIdx]=React.useState(0);
  const [picked, setPicked]=React.useState(null);
  const [history, setHistory]=React.useState([]);
  const [timeLeft, setTimeLeft]=React.useState(20);
  const timerRef=React.useRef(null);
  const autoRef=React.useRef(null);
  const choicesRef=React.useRef({qIdx:-1,choices:null});

  React.useEffect(()=>{
    if(phase!=='playing'||picked!==null) return;
    if(timeLeft<=0){ handlePick('timeout'); return; }
    timerRef.current=setTimeout(()=>setTimeLeft(t=>t-1),1000);
    return()=>clearTimeout(timerRef.current);
  },[phase,timeLeft,picked]);

  // ── Inline picker helpers ──
  function toggleInlineCh(ch){
    setInlineOpenChs(prev=>{
      const n=new Set(prev);
      if(n.has(ch)){ n.delete(ch); } else { if(n.size>=2){ n.delete([...n][0]); } n.add(ch); }
      return n;
    });
  }
  function toggleInlineVerse(ch,v){
    const key=`${ch}-${v}`;
    setInlinePicked(prev=>{ const n=new Set(prev); n.has(key)?n.delete(key):n.add(key); return n; });
  }
  function inlineSelectAll(ch){
    const vv=CHAPTERS_DATA.find(c=>c.ch===ch)?.verses||[];
    setInlinePicked(prev=>{ const n=new Set(prev); vv.forEach(v=>n.add(`${ch}-${v.v}`)); return n; });
  }
  function inlineClearCh(ch){
    const vv=CHAPTERS_DATA.find(c=>c.ch===ch)?.verses||[];
    setInlinePicked(prev=>{ const n=new Set(prev); vv.forEach(v=>n.delete(`${ch}-${v.v}`)); return n; });
  }
  function inlineChHasPicked(ch){ return CHAPTERS_DATA.find(c=>c.ch===ch)?.verses.some(v=>inlinePicked.has(`${ch}-${v.v}`)); }

  function saveSelection(){
    rmSaveSel({ selMode, selChs:[...selChs], sChIdx, sV, eChIdx, eV, direction, inlinePicked:[...inlinePicked] });
    setSaveFlash(true); setTimeout(()=>setSaveFlash(false),1800);
  }

  function getVersePool(){
    if(selMode==='chapter'){
      const verses=[];
      [...selChs].forEach(ch=>{ const cd=CHAPTERS_DATA.find(c=>c.ch===ch); if(cd) cd.verses.forEach(v=>verses.push({ch,v:v.v,t:v.t})); });
      return verses;
    }
    if(selMode==='custom'){
      const verses=[];
      CHAPTERS_DATA.forEach(cd=>cd.verses.forEach(v=>{ if(inlinePicked.has(`${cd.ch}-${v.v}`)) verses.push({ch:cd.ch,v:v.v,t:v.t}); }));
      return verses;
    }
    const sk=vkey(CHAPTERS_DATA[sChIdx].ch,sV), ek=vkey(CHAPTERS_DATA[eChIdx].ch,eV);
    const verses=[];
    CHAPTERS_DATA.forEach(cd=>cd.verses.forEach(v=>{ const k=vkey(cd.ch,v.v); if(k>=sk&&k<=ek) verses.push({ch:cd.ch,v:v.v,t:v.t}); }));
    return verses;
  }

  function buildChoicesForQ(allVerses,correct){
    const others=allVerses.filter(v=>!(v.ch===correct.ch&&v.v===correct.v));
    const shuffled=others.slice().sort(()=>Math.random()-.5).slice(0,3);
    return [correct,...shuffled].sort(()=>Math.random()-.5);
  }

  function startQuiz(){
    const verses=getVersePool();
    if(verses.length<4) return;
    const shuffled=verses.slice().sort(()=>Math.random()-.5);
    setPool(shuffled); setQIdx(0); setHistory([]); setPicked(null); setTimeLeft(20);
    choicesRef.current={qIdx:-1,choices:null};
    setPhase('playing');
  }

  function handlePick(ans){
    clearTimeout(timerRef.current); clearTimeout(autoRef.current);
    const current=pool[qIdx];
    const isTimeout=ans==='timeout';
    let correct=false;
    if(!isTimeout){
      if(direction==='refFromVerse') correct=(ans===`${current.ch}:${current.v}`);
      else correct=(ans===current.t);
    }
    setPicked(ans);
    setHistory(h=>[...h,{ch:current.ch,v:current.v,t:current.t,picked:ans,correct,timedOut:isTimeout}]);
    if(correct) autoRef.current=setTimeout(advance,1600);
  }

  function advance(){
    clearTimeout(autoRef.current);
    const next=qIdx+1;
    if(next>=pool.length){ setPhase('results'); return; }
    setQIdx(next); setPicked(null); setTimeLeft(20);
    choicesRef.current={qIdx:-1,choices:null};
  }

  function restart(){ setPhase('setup'); setPicked(null); setTimeLeft(20); setHistory([]); clearTimeout(timerRef.current); clearTimeout(autoRef.current); }

  function getChoices(){
    if(choicesRef.current.qIdx!==qIdx){
      const allVerses=getVersePool();
      const correct=pool[qIdx];
      choicesRef.current={qIdx, choices:buildChoicesForQ(allVerses,correct)};
    }
    return choicesRef.current.choices;
  }

  // Dark card style
  const dc={background:'rgba(22,22,28,0.92)',border:'1px solid rgba(90,90,110,0.4)',borderRadius:14,backdropFilter:'blur(8px)'};
  const lbl={fontFamily:'Cinzel,serif',fontSize:'.6rem',letterSpacing:'.12em',color:'rgba(200,200,220,0.45)',marginBottom:'.7rem'};

  /* ─── SETUP ─── */
  if(phase==='setup'){
    const verses=getVersePool();
    const enough=verses.length>=4;
    return (
      <div style={{position:'relative',minHeight:'100vh'}}>
        <canvas ref={canvasRef} style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',zIndex:2,pointerEvents:'none'}}/>
