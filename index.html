          <div style={{position:'fixed',top:'1.1rem',left:'1rem',zIndex:60,display:'flex',gap:'.6rem'}}>
            <button className="kq-nav-btn" onClick={onBack}>← Back</button>
          </div>
          <div style={{paddingTop:'3.5rem',textAlign:'center',marginBottom:'1.6rem'}}>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'1.55rem',letterSpacing:'.08em',color:'#e8e8f0',marginBottom:'.3rem'}}>Reference Matching</div>
            <div style={{fontStyle:'italic',fontSize:'.88rem',color:'rgba(180,180,200,0.55)'}}>Match verses to their references — or references to their verses</div>
          </div>

          {/* Passage Selection Mode tabs */}
          <div style={{...dc,padding:'1.1rem 1.2rem',marginBottom:'.8rem'}}>
            <div style={lbl}>PASSAGE SELECTION</div>
            <div style={{display:'flex',gap:'.5rem',justifyContent:'center',marginBottom:'1rem',flexWrap:'wrap'}}>
              {['chapter','range','custom'].map(m=>{
                const on=selMode===m;
                return <button key={m} onClick={()=>setSelMode(m)} style={{fontFamily:'Cinzel,serif',fontSize:'.74rem',padding:'.5rem 1rem',borderRadius:8,border:`1px solid ${on?'rgba(160,120,255,0.7)':'rgba(100,100,130,0.35)'}`,background:on?'rgba(120,80,220,0.22)':'rgba(30,30,40,0.6)',color:on?'#c4a8ff':'rgba(180,180,200,0.5)',cursor:'pointer',transition:'all .15s'}}>
                  {m==='chapter'?'Chapter(s)':m==='range'?'Passage Range':'Custom Verses'}
                </button>;
              })}
            </div>

            {selMode==='chapter' && (
              <>
                <div style={{display:'flex',flexWrap:'wrap',gap:'.4rem',justifyContent:'center',marginBottom:'.5rem'}}>
                  {allChapters.map(ch=>{
                    const on=selChs.has(ch);
                    return <button key={ch} onClick={()=>setSelChs(p=>{const n=new Set(p);n.has(ch)?n.delete(ch):n.add(ch);return n;})}
                      style={{fontFamily:'Cinzel,serif',fontSize:'.72rem',width:'2.6rem',height:'2.6rem',borderRadius:7,border:`1px solid ${on?'rgba(160,120,255,0.6)':'rgba(90,90,110,0.35)'}`,background:on?'rgba(120,80,220,0.2)':'rgba(25,25,35,0.7)',color:on?'#c4a8ff':'rgba(160,160,180,0.45)',cursor:'pointer',transition:'all .15s'}}>
                      {chLabel(ch)}</button>;
                  })}
                </div>
                <div style={{display:'flex',gap:'.5rem',justifyContent:'center'}}>
                  <button onClick={()=>setSelChs(new Set(allChapters))} style={{fontFamily:'Cinzel,serif',fontSize:'.63rem',padding:'.2rem .65rem',borderRadius:6,border:'1px solid rgba(90,90,110,0.35)',background:'rgba(30,30,40,0.6)',color:'rgba(180,180,200,0.5)',cursor:'pointer'}}>All</button>
                  <button onClick={()=>setSelChs(new Set())} style={{fontFamily:'Cinzel,serif',fontSize:'.63rem',padding:'.2rem .65rem',borderRadius:6,border:'1px solid rgba(90,90,110,0.35)',background:'rgba(30,30,40,0.6)',color:'rgba(180,180,200,0.5)',cursor:'pointer'}}>None</button>
                </div>
              </>

            {selMode==='range' && (
              <div style={{display:'flex',gap:'.55rem',justifyContent:'center',alignItems:'center',flexWrap:'wrap'}}>

                <span style={{fontFamily:'Cinzel,serif',fontSize:'.63rem',color:'rgba(180,180,200,0.45)'}}>TO</span>
                <select className="rsel" value={eChIdx} onChange={e=>{const i=+e.target.value;setEChIdx(i);setEV(CHAPTERS_DATA[i].verses.length);}}>
                  {CHAPTERS_DATA.map((c,i)=><option key={i} value={i}>{chLabel(c.ch)}</option>)}

                <select className="rsel" value={eV} onChange={e=>setEV(+e.target.value)}>

  /* ─── PLAYING ─── */

  /* ─── RESULTS ─── */
  const correct=history.filter(h=>h.correct).length;

          {history.map((h,i)=>(

        </div>
        <div style={{display:'flex',gap:'.8rem',justifyContent:'center'}}>
          <button onClick={restart} style={{fontFamily:'Cinzel,serif',fontSize:'.82rem',padding:'.6rem 1.6rem',borderRadius:9,border:'none',background:'linear-gradient(135deg,#8844cc,#5522aa)',color:'#f0e8ff',cursor:'pointer'}}>Try Again</button>

    </div>
  );

/* ════════════════════════════════════════════
   DRAG STUDY GAME — shiny blue canvas
════════════════════════════════════════════ */
function useDragBgCanvas(canvasRef){
  React.useEffect(()=>{
    const c=canvasRef.current; if(!c) return;
    let W=c.width=window.innerWidth, H=c.height=window.innerHeight;
    const ctx=c.getContext('2d');
    const orbs=Array.from({length:9},()=>({
      x:Math.random()*W, y:Math.random()*H,
      r:70+Math.random()*140,
      vx:(Math.random()-.5)*0.2, vy:(Math.random()-.5)*0.2,
      hue:195+Math.random()*50, sat:55+Math.random()*25, lit:72+Math.random()*18,
      a:0.18+Math.random()*0.2,
      phase:Math.random()*Math.PI*2, pspd:0.004+Math.random()*0.005,
    }));
    let sheenX=-W*0.4, raf, t=0;
    let bgG=null;
    function mkBg(){bgG=ctx.createLinearGradient(0,0,W,H);bgG.addColorStop(0,'#c8e8ff');bgG.addColorStop(0.55,'#b0d8f8');bgG.addColorStop(1,'#d4ecff');}
    mkBg();
    function draw(){
      raf=requestAnimationFrame(draw); t++;
      ctx.fillStyle=bgG; ctx.fillRect(0,0,W,H);
      orbs.forEach(o=>{
        o.phase+=o.pspd; o.x+=o.vx; o.y+=o.vy;
        if(o.x<-o.r)o.x=W+o.r; if(o.x>W+o.r)o.x=-o.r;
        if(o.y<-o.r)o.y=H+o.r; if(o.y>H+o.r)o.y=-o.r;
        const rr=o.r*(1+Math.sin(o.phase)*0.05);
        const g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,rr);
        g.addColorStop(0,`hsla(${o.hue},${o.sat}%,${o.lit}%,${o.a})`);
        g.addColorStop(0.5,`hsla(${o.hue},${o.sat-8}%,${o.lit-10}%,${o.a*0.38})`);
        g.addColorStop(1,`hsla(${o.hue},${o.sat}%,${o.lit}%,0)`);
        ctx.fillStyle=g; ctx.beginPath(); ctx.arc(o.x,o.y,rr,0,Math.PI*2); ctx.fill();
      });
      if(t%3===0){
        sheenX+=2.7; if(sheenX>W*1.4) sheenX=-W*0.4;
        const sh=ctx.createLinearGradient(sheenX-200,0,sheenX+200,H);
        sh.addColorStop(0,'rgba(255,255,255,0)');sh.addColorStop(0.5,'rgba(255,255,255,0.05)');sh.addColorStop(1,'rgba(255,255,255,0)');
        ctx.fillStyle=sh; ctx.fillRect(0,0,W,H);
      }
      if(t%2===0){
        for(let i=0;i<2;i++){
          const y=((H*0.5*i+t*0.2)%H);
          ctx.fillStyle=`rgba(180,220,255,${0.024+i*0.007})`; ctx.fillRect(0,y-1,W,2);
        }
      }
    }
    draw();
    function onResize(){ W=c.width=window.innerWidth; H=c.height=window.innerHeight; mkBg(); }
    window.addEventListener('resize',onResize);
    return ()=>{ cancelAnimationFrame(raf); window.removeEventListener('resize',onResize); };
  },[]);
}


/* ════════════════════════════════════════
   DRAG STUDY GAME — light shiny blue
════════════════════════════════════════ */
function useLightBlueBg(ref){
  React.useEffect(()=>{
    const c=ref.current; if(!c) return;
    let W=c.width=window.innerWidth,H=c.height=window.innerHeight;
    const ctx=c.getContext('2d');

    // Rain drops falling vertically
    function mkDrop(){
      return {
        x: Math.random()*W,
        y: -18 - Math.random()*H,
        len: 10+Math.random()*22,
        spd: 3.2+Math.random()*4.5,
        al: 0.12+Math.random()*0.28,
      };
    }
    const drops = Array.from({length:180},()=>{ const d=mkDrop(); d.y=Math.random()*H; return d; });

    // Ripple rings on surface
    const ripples = [];
    let nextRipple = 0;

    let raf,t=0;
    function draw(){
      raf=requestAnimationFrame(draw); t++;

      // Deep blue gradient background
      const bg=ctx.createLinearGradient(0,0,0,H);
      bg.addColorStop(0,'#0a1a35');
      bg.addColorStop(0.5,'#0d2248');
      bg.addColorStop(1,'#091830');
      ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

      // Subtle deep glow in centre
      const cg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.min(W,H)*.55);
      cg.addColorStop(0,'rgba(30,80,180,0.12)');
      cg.addColorStop(1,'transparent');
      ctx.fillStyle=cg; ctx.fillRect(0,0,W,H);

      // Rain drops
      drops.forEach(d=>{
        d.y += d.spd;
        if(d.y > H + d.len + 10){
          // Spawn a ripple where it lands
          ripples.push({x:d.x, y:H*0.82+Math.random()*H*0.18, r:0, maxR:18+Math.random()*28, al:0.55, spd:0.55+Math.random()*0.4});
          Object.assign(d, mkDrop()); d.x=Math.random()*W;
        }
        ctx.save();
        ctx.globalAlpha=d.al;
        ctx.strokeStyle='rgba(100,175,255,0.9)';
        ctx.lineWidth=1;
        ctx.beginPath();
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x, d.y + d.len);
        ctx.stroke();
        ctx.restore();
      });

      // Ripple rings
      for(let i=ripples.length-1;i>=0;i--){
        const r=ripples[i];
        r.r += r.spd;
        r.al *= 0.93;
        if(r.al < 0.015 || r.r > r.maxR){ ripples.splice(i,1); continue; }
        ctx.save();
        ctx.globalAlpha = r.al;
        ctx.strokeStyle='rgba(120,190,255,1)';
        ctx.lineWidth=1;
        ctx.beginPath();
        ctx.ellipse(r.x, r.y, r.r, r.r*0.28, 0, 0, Math.PI*2);
        ctx.stroke();
        ctx.restore();
      }
    }
    draw();
    function onRes(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;}
    window.addEventListener('resize',onRes);
    return()=>{cancelAnimationFrame(raf);window.removeEventListener('resize',onRes);};
  },[]);
}

function DragStudyPage({ onBack, initialCustomVerses }){
  const bgRef=React.useRef(null);
  useLightBlueBg(bgRef);
  React.useEffect(()=>{
    if(window.BgMgr)window.BgMgr.setToolsMode(true);
    return()=>{if(window.BgMgr)window.BgMgr.setToolsMode(false);};
  },[]);

  const allChs=CHAPTERS_DATA.map(c=>c.ch);

  /* ── Setup state ── */
  const [phase,setPhase]=React.useState('setup');
  const [selMode,setSelMode]=React.useState('chapter');
  const [selChs,setSelChs]=React.useState(new Set());
  const [sChIdx,setSChIdx]=React.useState(0);
  const [sV,setSV]=React.useState(1);
  const [eChIdx,setEChIdx]=React.useState(0);
  const [eV,setEV]=React.useState(CHAPTERS_DATA[0].verses.length);
  const [openChs,setOpenChs]=React.useState(new Set());
  const [picked,setPicked]=React.useState(()=>{
    if(initialCustomVerses) return new Set(initialCustomVerses.map(v=>`${v.ch}-${v.v}`));
    return new Set();
  });

  /* ── Game state ── */
  const [activeChs,setActiveChs]=React.useState([]);
  const [roundItems,setRoundItems]=React.useState([]);
  const [placed,setPlaced]=React.useState({});  // {[itemId]: chapterNum}
  const [checked,setChecked]=React.useState(false);
  const [score,setScore]=React.useState({correct:0,total:0});
  const [ghost,setGhost]=React.useState(null);  // {id,x,y,offX,offY,item}
  const poolRef=React.useRef([]);
  const usedRef=React.useRef(new Set());

  /* ── Physics refs (no state) ── */
  const physRef=React.useRef({});   // {[id]:{x,y,vx,vy,w,h}}
  const elemRef=React.useRef({});   // {[id]:HTMLElement}
  const trayRef=React.useRef(null);
  const rafRef=React.useRef(null);
  const dragRef=React.useRef(null); // {id} while dragging
  const placedRef=React.useRef({}); // mirror of placed (for rAF closure)

  React.useEffect(()=>{placedRef.current=placed;},[placed]);

  /* ── Physics loop function ── */
  function runLoop(){
    cancelAnimationFrame(rafRef.current);
    function tick(){
      rafRef.current=requestAnimationFrame(tick);
      const tray=trayRef.current;if(!tray)return;
      const W=tray.offsetWidth,H=tray.offsetHeight;
      const dragId=dragRef.current?.id;
      const ids=Object.keys(physRef.current);
      ids.forEach(id=>{
        if(id===dragId||placedRef.current[id]!==undefined)return;
        const p=physRef.current[id];if(!p)return;
        p.x+=p.vx;p.y+=p.vy;
        const m=5;
        if(p.x<m){p.x=m;p.vx=Math.abs(p.vx)*(0.9+Math.random()*0.15);}
        if(p.x+p.w>W-m){p.x=W-m-p.w;p.vx=-Math.abs(p.vx)*(0.9+Math.random()*0.15);}
        if(p.y<m){p.y=m;p.vy=Math.abs(p.vy)*(0.9+Math.random()*0.15);}
        if(p.y+p.h>H-m){p.y=H-m-p.h;p.vy=-Math.abs(p.vy)*(0.9+Math.random()*0.15);}
        const el=elemRef.current[id];
        if(el){el.style.left=p.x+'px';el.style.top=p.y+'px';}
      });
      // Soft repulsion
      for(let i=0;i<ids.length-1;i++){
        const a=physRef.current[ids[i]];
        if(!a||placedRef.current[ids[i]]!==undefined)continue;
        for(let j=i+1;j<ids.length;j++){
          const b=physRef.current[ids[j]];
          if(!b||placedRef.current[ids[j]]!==undefined)continue;
          const dx=(b.x+b.w/2)-(a.x+a.w/2),dy=(b.y+b.h/2)-(a.y+a.h/2);
          const dist=Math.sqrt(dx*dx+dy*dy)||1;
          const md=(a.w+b.w)*0.44;
          if(dist<md){
            const f=(md-dist)/md*0.14,nx=dx/dist,ny=dy/dist;
            a.vx-=nx*f;a.vy-=ny*f;b.vx+=nx*f;b.vy+=ny*f;
            const cap=2.1;
            [a,b].forEach(p=>{const s=Math.sqrt(p.vx*p.vx+p.vy*p.vy);if(s>cap){p.vx=p.vx/s*cap;p.vy=p.vy/s*cap;}});
          }
        }
      }
    }
    rafRef.current=requestAnimationFrame(tick);
  }

  /* ── Init physics when round changes ── */
  React.useEffect(()=>{
    if(phase!=='playing')return;
    cancelAnimationFrame(rafRef.current);
    physRef.current={};
    const r1=requestAnimationFrame(()=>{
      const r2=requestAnimationFrame(()=>{
        const tray=trayRef.current;if(!tray)return;
        const W=tray.offsetWidth,H=tray.offsetHeight;
        roundItems.forEach(item=>{
          const el=elemRef.current[item.id];
          const w=el?el.offsetWidth:110,h=el?el.offsetHeight:34;
          const ang=Math.random()*Math.PI*2,spd=0.7+Math.random()*0.9;
          physRef.current[item.id]={
            x:8+Math.random()*Math.max(1,W-w-16),
            y:8+Math.random()*Math.max(1,H-h-16),
            vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,w,h
          };
          if(el){el.style.left=physRef.current[item.id].x+'px';el.style.top=physRef.current[item.id].y+'px';}
        });
        runLoop();
      });
    });
    return()=>{cancelAnimationFrame(r1);cancelAnimationFrame(rafRef.current);};
  },[roundItems,phase]);

  /* ── Stop/resume loop on check ── */
  React.useEffect(()=>{
    if(checked){cancelAnimationFrame(rafRef.current);}
    else if(phase==='playing'&&Object.keys(physRef.current).length>0){runLoop();}
  },[checked]);

  React.useEffect(()=>()=>cancelAnimationFrame(rafRef.current),[]);

  /* ── Drag ── */
  function startDrag(e,item){
    if(checked)return;
    e.preventDefault();e.stopPropagation();
    const pt=e.touches?.[0]||e;
    const el=elemRef.current[item.id];
    const rect=el?el.getBoundingClientRect():{left:pt.clientX-55,top:pt.clientY-17};
    dragRef.current={id:item.id};
    if(el)el.style.opacity='0.15';
    setGhost({id:item.id,x:pt.clientX,y:pt.clientY,offX:pt.clientX-rect.left,offY:pt.clientY-rect.top,item});
  }

  React.useEffect(()=>{
    if(!ghost)return;
    function onMove(e){e.preventDefault();const pt=e.touches?.[0]||e;setGhost(g=>g?{...g,x:pt.clientX,y:pt.clientY}:null);}
    function onEnd(e){
      const pt=e.changedTouches?.[0]||e;
      const el2=document.elementFromPoint(pt.clientX,pt.clientY);
      const basket=el2?.closest('[data-basket-ch]');
      const id=dragRef.current?.id;
      dragRef.current=null;
      if(basket&&id){
        const ch=parseInt(basket.dataset.basketCh);
        setPlaced(prev=>({...prev,[id]:ch}));
        if(elemRef.current[id])elemRef.current[id].style.opacity='1';
      } else {
        if(id&&physRef.current[id]){
          const ang=Math.random()*Math.PI*2;
          physRef.current[id].vx=Math.cos(ang)*1.4;
          physRef.current[id].vy=Math.sin(ang)*1.4;
        }
        if(id&&elemRef.current[id])elemRef.current[id].style.opacity='1';
      }
      setGhost(null);
    }
    window.addEventListener('mousemove',onMove,{passive:false});
    window.addEventListener('mouseup',onEnd);
    window.addEventListener('touchmove',onMove,{passive:false});
    window.addEventListener('touchend',onEnd);
    return()=>{window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onEnd);window.removeEventListener('touchmove',onMove);window.removeEventListener('touchend',onEnd);};
  },[ghost]);

  /* ── Inline custom picker ── */
  function toggleOpenCh(ch){setOpenChs(prev=>{const n=new Set(prev);if(n.has(ch)){n.delete(ch);}else{if(n.size>=2)n.delete([...n][0]);n.add(ch);}return n;});}
  function toggleV(ch,v){const k=`${ch}-${v}`;setPicked(prev=>{const n=new Set(prev);n.has(k)?n.delete(k):n.add(k);return n;});}
  function pickAll(ch){const vv=CHAPTERS_DATA.find(c=>c.ch===ch)?.verses||[];setPicked(prev=>{const n=new Set(prev);vv.forEach(v=>n.add(`${ch}-${v.v}`));return n;});}
  function clearCh(ch){const vv=CHAPTERS_DATA.find(c=>c.ch===ch)?.verses||[];setPicked(prev=>{const n=new Set(prev);vv.forEach(v=>n.delete(`${ch}-${v.v}`));return n;});}
  function hasPicked(ch){return CHAPTERS_DATA.find(c=>c.ch===ch)?.verses.some(v=>picked.has(`${ch}-${v.v}`));}

  function getVersePool(){
    if(selMode==='chapter'){const vv=[];[...selChs].forEach(ch=>{CHAPTERS_DATA.find(c=>c.ch===ch)?.verses.forEach(v=>vv.push({ch,v:v.v,t:v.t}));});return vv;}
    if(selMode==='custom'){const vv=[];CHAPTERS_DATA.forEach(cd=>cd.verses.forEach(v=>{if(picked.has(`${cd.ch}-${v.v}`))vv.push({ch:cd.ch,v:v.v,t:v.t});}));return vv;}
    const sk=vkey(CHAPTERS_DATA[sChIdx].ch,sV),ek=vkey(CHAPTERS_DATA[eChIdx].ch,eV);
    const vv=[];CHAPTERS_DATA.forEach(cd=>cd.verses.forEach(v=>{const k=vkey(cd.ch,v.v);if(k>=sk&&k<=ek)vv.push({ch:cd.ch,v:v.v,t:v.t});}));return vv;
  }

  function sh(arr){return arr.slice().sort(()=>Math.random()-.5);}

  function buildPool(verses){
    const items=[];
    const byCh={};
    verses.forEach(v=>{if(!byCh[v.ch])byCh[v.ch]=[];byCh[v.ch].push(v);});
    Object.entries(byCh).forEach(([chStr,cv])=>{
      const ch=parseInt(chStr);
      // FTV: words 0..uniquePrefix-1 (everything before the / mark)
      const ftvSeen=new Set();
      cv.forEach(verse=>{
        const idx=VERSE_UNIQUE_PREFIX[`${ch}-${verse.v}`];
        if(idx==null||idx<2)return;
        const words=verse.t.split(/[\s\u2014\u2013]+/);
        const phrase=words.slice(0,Math.min(idx,9)).join(' ').replace(/[^a-zA-Z ']/g,'').replace(/  +/g,' ').toLowerCase().trim();
        if(phrase.split(' ').length<2||ftvSeen.has(phrase))return;
        ftvSeen.add(phrase);
        items.push({id:`ftv-${ch}-${verse.v}`,text:phrase,ch,type:'ftv',label:'FTV'});
      });
      // Keywords (unique to this chapter)
      const kwSeen=new Set();
      cv.forEach(verse=>{
        verse.t.split(/[\s\u2014\u2013]+/).forEach(w=>{
          const core=w.replace(/[^a-zA-Z]/g,'').toLowerCase();
          if(core.length>=3&&KEY_WORDS.has(core)&&KEYWORD_TO_CHAPTER[core]===ch&&!kwSeen.has(core)){
            kwSeen.add(core);items.push({id:`kw-${ch}-${core}`,text:core,ch,type:'keyword',label:'Key'});
          }
        });
      });
      // 2-word unique phrases
      const p2Seen=new Set();
      cv.forEach(verse=>{
        const cl=verse.t.split(/[\s\u2014\u2013]+/).map(w=>w.replace(/[^a-zA-Z]/g,'').toLowerCase()).filter(Boolean);
        for(let i=0;i<=cl.length-2;i++){
          const g=cl.slice(i,i+2).join(' ');
          if(KEY_PHRASES_2[g]===ch&&!p2Seen.has(g)){p2Seen.add(g);items.push({id:`p2-${ch}-${g.replace(' ','_')}`,text:g,ch,type:'phrase2',label:'2-word'});}
        }
      });
      // 3-word unique phrases
      const p3Seen=new Set();
      cv.forEach(verse=>{
        const cl=verse.t.split(/[\s\u2014\u2013]+/).map(w=>w.replace(/[^a-zA-Z]/g,'').toLowerCase()).filter(Boolean);
        for(let i=0;i<=cl.length-3;i++){
          const g=cl.slice(i,i+3).join(' ');
          if(KEY_PHRASES_3[g]===ch&&!p3Seen.has(g)){p3Seen.add(g);items.push({id:`p3-${ch}-${g.replace(/ /g,'_')}`,text:g,ch,type:'phrase3',label:'3-word'});}
        }
      });
    });
    return sh(items);
  }

  function buildRound(pool,used,chs){
    const avail=pool.filter(i=>!used.has(i.id));
    const byCh={};chs.forEach(ch=>{byCh[ch]={ftv:[],keyword:[],phrase2:[],phrase3:[]};});
    avail.forEach(i=>{if(byCh[i.ch])byCh[i.ch][i.type].push(i);});
    const round=[];
    chs.forEach(ch=>{
      const src=byCh[ch];
      const picks=[];
      // Guarantee at least 1 of each type, up to 2 each
      ['ftv','keyword','phrase2','phrase3'].forEach(t=>{sh(src[t]).slice(0,2).forEach(i=>picks.push(i));});
      // Fill up to 9 per chapter from remaining
      const usedInPicks=new Set(picks.map(i=>i.id));
      sh(avail.filter(i=>i.ch===ch&&!usedInPicks.has(i.id))).slice(0,Math.max(0,9-picks.length)).forEach(i=>picks.push(i));
      sh(picks).forEach(i=>round.push(i));
    });
    return sh(round);
  }

  function startGame(){
    const verses=getVersePool();
    const chs=[...new Set(verses.map(v=>v.ch))].sort((a,b)=>a-b);
    if(chs.length<2)return;
    const pool=buildPool(verses);
    if(pool.length<4)return;
    poolRef.current=pool;
    usedRef.current=new Set();
    setActiveChs(chs);
    setScore({correct:0,total:0});
    const first=buildRound(pool,new Set(),chs);
    first.forEach(i=>usedRef.current.add(i.id));
    setRoundItems(first);
    setPlaced({});
    setChecked(false);
    setPhase('playing');
  }

  function checkRound(){
    if(!roundItems.every(i=>placed[i.id]!==undefined))return;
    const correct=roundItems.filter(i=>placed[i.id]===i.ch).length;
    setScore(s=>({correct:s.correct+correct,total:s.total+roundItems.length}));
    setChecked(true);
  }

  function nextRound(){
    const pool=poolRef.current;
    const rem=pool.filter(i=>!usedRef.current.has(i.id));
    if(rem.length<activeChs.length){setPhase('results');return;}
    const next=buildRound(pool,usedRef.current,activeChs);
    if(next.length===0){setPhase('results');return;}
    next.forEach(i=>usedRef.current.add(i.id));
    // Restore all tray elements
    roundItems.forEach(i=>{const el=elemRef.current[i.id];if(el){el.style.opacity='1';el.style.display='';}});
    setRoundItems(next);
    setPlaced({});
    setChecked(false);
  }

  function ts(type){
    if(type==='ftv')return{bg:'#fff7e0',bdr:'#e0a010',txt:'#7a4205',dot:'#d09010',sh:'rgba(210,150,20,0.22)'};
    if(type==='keyword')return{bg:'#e8f8ef',bdr:'#25b055',txt:'#1a6035',dot:'#20a048',sh:'rgba(35,160,70,0.2)'};
    if(type==='phrase2')return{bg:'#e5f0ff',bdr:'#2e80d8',txt:'#1042a0',dot:'#2070c8',sh:'rgba(35,110,210,0.2)'};
    return{bg:'#f0eaff',bdr:'#8040d0',txt:'#481898',dot:'#7030c0',sh:'rgba(120,60,210,0.2)'};
  }

  const card={background:'rgba(255,255,255,0.80)',border:'1px solid rgba(80,160,255,0.22)',borderRadius:14,backdropFilter:'blur(10px)',boxShadow:'0 2px 16px rgba(60,140,255,0.09)'};
  const lbl={fontFamily:'Cinzel,serif',fontSize:'.56rem',letterSpacing:'.12em',color:'rgba(30,90,200,0.42)',marginBottom:'.6rem'};
  const btn0={fontFamily:'Cinzel,serif',fontSize:'.72rem',padding:'.45rem .95rem',borderRadius:8,cursor:'pointer',border:'1px solid',transition:'all .15s'};

  /* ══ SETUP ══ */
  if(phase==='setup'){
    const verses=getVersePool();
    const chs=[...new Set(verses.map(v=>v.ch))];
    const ok=chs.length>=2;
    return(
      <div style={{position:'relative',minHeight:'100vh'}}>
        <canvas ref={bgRef} style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',zIndex:2,pointerEvents:'none'}}/>
        <div style={{position:'relative',zIndex:3,maxWidth:680,margin:'0 auto',padding:'1rem 1rem 6rem',fontFamily:"'Crimson Pro',serif"}}>
          <div style={{position:'fixed',top:'1.1rem',left:'1rem',zIndex:60}}>
            <button className="kq-nav-btn" style={{color:'#1848a0',borderColor:'rgba(40,120,220,0.3)',background:'rgba(255,255,255,0.7)'}} onClick={onBack}>← Back</button>
          </div>
          <div style={{paddingTop:'3.5rem',textAlign:'center',marginBottom:'1.5rem'}}>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'1.5rem',letterSpacing:'.08em',color:'#7ec8f8',marginBottom:'.25rem',textShadow:'0 2px 10px rgba(60,140,255,0.4)'}}>🧺 Drag Study Game</div>
            <div style={{fontStyle:'italic',fontSize:'.84rem',color:'rgba(20,80,190,0.48)'}}>Sort keywords, phrases &amp; FTV jump points into the right chapter basket</div>
          </div>
          <div style={{...card,padding:'1rem 1.1rem',marginBottom:'.75rem'}}>
            <div style={lbl}>PASSAGE SELECTION</div>
            <div style={{display:'flex',gap:'.45rem',justifyContent:'center',marginBottom:'1rem',flexWrap:'wrap'}}>
              {['chapter','range','custom'].map(m=>{const on=selMode===m;return(
                <button key={m} onClick={()=>setSelMode(m)} style={{...btn0,borderColor:on?'rgba(35,110,210,0.55)':'rgba(80,160,255,0.2)',background:on?'rgba(35,110,210,0.1)':'rgba(255,255,255,0.55)',color:on?'#1848a0':'rgba(50,120,200,0.48)'}}>
                  {m==='chapter'?'Chapter(s)':m==='range'?'Passage Range':'Custom Verses'}
                </button>
              );})}
            </div>
            {selMode==='chapter'&&(<>
              <div style={{display:'flex',flexWrap:'wrap',gap:'.38rem',justifyContent:'center',marginBottom:'.5rem'}}>
                {allChs.map(ch=>{const on=selChs.has(ch);return(
                  <button key={ch} onClick={()=>setSelChs(p=>{const n=new Set(p);n.has(ch)?n.delete(ch):n.add(ch);return n;})}
                    style={{fontFamily:'Cinzel,serif',fontSize:'.7rem',width:'2.5rem',height:'2.5rem',borderRadius:7,cursor:'pointer',transition:'all .14s',
                      border:`1px solid ${on?'rgba(35,110,210,0.55)':'rgba(80,160,255,0.2)'}`,
                      background:on?'rgba(35,110,210,0.1)':'rgba(255,255,255,0.55)',
                      color:on?'#1848a0':'rgba(50,120,200,0.42)'}}>
                    {chLabel(ch)}</button>
                );})}
              </div>
              <div style={{display:'flex',gap:'.45rem',justifyContent:'center'}}>
                <button onClick={()=>setSelChs(new Set(allChs))} style={{...btn0,borderColor:'rgba(80,160,255,0.2)',background:'rgba(255,255,255,0.55)',color:'rgba(50,120,200,0.45)'}}>All</button>
                <button onClick={()=>setSelChs(new Set())} style={{...btn0,borderColor:'rgba(80,160,255,0.2)',background:'rgba(255,255,255,0.55)',color:'rgba(50,120,200,0.45)'}}>None</button>
              </div>
            </>)}
            {selMode==='range'&&(
              <div style={{display:'flex',gap:'.5rem',justifyContent:'center',alignItems:'center',flexWrap:'wrap'}}>
                {[['FROM',sChIdx,setSChIdx,sV,setSV],['TO',eChIdx,setEChIdx,eV,setEV]].map(([label,ci,setCi,v,setVv],idx)=>(
                  <React.Fragment key={label}>
                    {idx>0&&<span style={{color:'rgba(50,100,200,0.38)'}}>—</span>}

                      {CHAPTERS_DATA[ci].verses.map(vr=><option key={vr.v} value={vr.v}>{vr.v}</option>)}
                    </select>
                  </React.Fragment>
                ))}
              </div>
            )}
            {selMode==='custom'&&(<div>
              <div style={{display:'flex',flexWrap:'wrap',gap:'.38rem',justifyContent:'center',marginBottom:'.6rem'}}>
                {allChs.map(ch=>{const isO=openChs.has(ch),isP=hasPicked(ch);return(
                  <button key={ch} onClick={()=>toggleOpenCh(ch)}
                    style={{fontFamily:'Cinzel,serif',fontSize:'.7rem',width:'2.5rem',height:'2.5rem',borderRadius:7,position:'relative',cursor:'pointer',transition:'all .14s',
                      border:`1px solid ${isO?'rgba(35,110,210,0.55)':isP?'rgba(35,160,80,0.5)':'rgba(80,160,255,0.2)'}`,
                      background:isO?'rgba(35,110,210,0.1)':isP?'rgba(35,160,80,0.1)':'rgba(255,255,255,0.55)',
                      color:isO?'#1848a0':isP?'#1a6035':'rgba(50,120,200,0.42)'}}>
                    {chLabel(ch)}{isP&&!isO&&<span style={{position:'absolute',top:2,right:3,width:5,height:5,borderRadius:'50%',background:'#25b055'}}/>}
                  </button>
                );})}
              </div>
              {[...openChs].sort((a,b)=>a-b).map(ch=>{
                const cd=CHAPTERS_DATA.find(c=>c.ch===ch);
                return(
                  <div key={ch} style={{...card,padding:'.65rem .85rem',marginBottom:'.45rem'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.45rem'}}>
                      <span style={{fontFamily:'Cinzel,serif',fontSize:'.58rem',letterSpacing:'.1em',color:'rgba(30,100,210,0.65)'}}>{chLabel(ch)}</span>
                      <div style={{display:'flex',gap:'.3rem'}}>
                        <button onClick={()=>pickAll(ch)} style={{fontFamily:'Cinzel,serif',fontSize:'.56rem',padding:'.12rem .45rem',borderRadius:5,border:'1px solid rgba(80,160,255,0.2)',background:'rgba(255,255,255,0.55)',color:'rgba(50,120,200,0.45)',cursor:'pointer'}}>All</button>
                        <button onClick={()=>clearCh(ch)} style={{fontFamily:'Cinzel,serif',fontSize:'.56rem',padding:'.12rem .45rem',borderRadius:5,border:'1px solid rgba(80,160,255,0.2)',background:'rgba(255,255,255,0.55)',color:'rgba(50,120,200,0.45)',cursor:'pointer'}}>None</button>
                      </div>
                    </div>
                    <div style={{display:'flex',flexWrap:'wrap',gap:'.3rem'}}>
                      {cd.verses.map(v=>{const on=picked.has(`${ch}-${v.v}`);return(
                        <button key={v.v} onClick={()=>toggleV(ch,v.v)} title={v.t.slice(0,60)+'…'}
                          style={{fontFamily:'Cinzel,serif',fontSize:'.62rem',padding:'.22rem .5rem',borderRadius:7,cursor:'pointer',transition:'all .12s',
                            border:`1px solid ${on?'rgba(35,160,80,0.5)':'rgba(80,160,255,0.2)'}`,
                            background:on?'rgba(35,160,80,0.1)':'rgba(255,255,255,0.55)',
                            color:on?'#1a6035':'rgba(50,120,200,0.4)'}}>
                          {v.v}</button>
                      );})}
                    </div>
                  </div>
                );
              })}
              {openChs.size===0&&<div style={{textAlign:'center',fontStyle:'italic',fontSize:'.78rem',color:'rgba(50,120,200,0.38)',marginTop:'.3rem'}}>Tap a chapter to pick verses</div>}
              <div style={{textAlign:'center',marginTop:'.45rem',fontFamily:'Cinzel,serif',fontSize:'.6rem',color:'rgba(50,120,200,0.42)'}}>{picked.size} verse{picked.size!==1?'s':''} selected</div>
            </div>)}
            <div style={{textAlign:'center',marginTop:'.7rem',fontFamily:'Cinzel,serif',fontSize:'.6rem',color:ok?'rgba(50,120,200,0.42)':'rgba(200,40,40,0.7)'}}>
              {verses.length} verse{verses.length!==1?'s':''}{chs.length===1?' — need at least 2 chapters':chs.length===0?' — select chapters above':''}
            </div>
          </div>
          <div style={{textAlign:'center',marginTop:'1rem'}}>
            <button onClick={startGame} disabled={!ok}
              style={{fontFamily:'Cinzel,serif',fontSize:'.92rem',letterSpacing:'.06em',padding:'.72rem 2.3rem',borderRadius:10,border:'none',
                background:ok?'linear-gradient(135deg,#2262cc,#1040aa)':'rgba(160,190,230,0.35)',
                color:ok?'#e8f4ff':'rgba(80,130,200,0.45)',cursor:ok?'pointer':'default',
                boxShadow:ok?'0 4px 22px rgba(30,90,220,0.32)':'none',transition:'all .2s'}}>
              Start Sorting
            </button>
          </div>
        </div>
      </div>
    );
  }

  /* ══ PLAYING ══ */
  if(phase==='playing'){
    const allPlaced=roundItems.every(i=>placed[i.id]!==undefined);

function useOddOneOutBg(canvasRef, effectRef){
  React.useEffect(()=>{
    const c=canvasRef.current; if(!c) return;
    let W=c.width=window.innerWidth, H=c.height=window.innerHeight;
    const ctx=c.getContext('2d');
    let tx=W*0.5, ty=H*0.5;
    let tvx=(Math.random()-.5)*1.6, tvy=(Math.random()-.5)*1.6;
    const particles=[];
    const MAX_P=55;
    let raf, frame=0;
    // Pre-bake grid path for perf
    let gridPath=null;
    function buildGrid(){
      gridPath=new Path2D();
      for(let x=0;x<W;x+=56){gridPath.moveTo(x,0);gridPath.lineTo(x,H);}
      for(let y=0;y<H;y+=56){gridPath.moveTo(0,y);gridPath.lineTo(W,y);}
    }
    buildGrid();

    function spawnSparks(x,y,n=22){
      const room=MAX_P-particles.length;
      const count=Math.min(n,room);
      for(let i=0;i<count;i++){
        const a=Math.random()*Math.PI*2, spd=1.5+Math.random()*4.5;
        particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1,type:'spark',
          r:215+Math.round(Math.random()*30),g:110+Math.round(Math.random()*80),b:10+Math.round(Math.random()*40)});
      }
    }
    function spawnSmoke(x,y,n=14){
      const room=MAX_P-particles.length;
      const count=Math.min(n,room);
      for(let i=0;i<count;i++){
        const a=-Math.PI/2+(Math.random()-.5)*1.1, spd=0.35+Math.random()*1.0;
        particles.push({x:x+(Math.random()-0.5)*10,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
          life:1,type:'smoke',sz:5+Math.random()*11});
      }
    }
    if(effectRef) effectRef.current={spawnSparks,spawnSmoke,getPos:()=>({x:tx,y:ty})};

    function draw(){
      raf=requestAnimationFrame(draw); frame++;
      tx+=tvx; ty+=tvy;
      if(tx<80){tx=80;tvx=Math.abs(tvx)+Math.random()*0.25;}
      if(tx>W-80){tx=W-80;tvx=-(Math.abs(tvx)+Math.random()*0.25);}
      if(ty<80){ty=80;tvy=Math.abs(tvy)+Math.random()*0.25;}
      if(ty>H-80){ty=H-80;tvy=-(Math.abs(tvy)+Math.random()*0.25);}
      if(Math.random()<0.015){ tvx+=(Math.random()-.5)*0.7; tvy+=(Math.random()-.5)*0.7; }
      const spd=Math.sqrt(tvx*tvx+tvy*tvy);
      if(spd>2.4){tvx*=2.4/spd;tvy*=2.4/spd;}
      if(spd<0.5){tvx*=1.25;tvy*=1.25;}

      ctx.fillStyle='#0a0a0c'; ctx.fillRect(0,0,W,H);

      // Grid — draw every 2nd frame only
      if(frame%2===0){
        ctx.strokeStyle='rgba(180,30,30,0.05)'; ctx.lineWidth=0.7;
        ctx.stroke(gridPath);
      }

      // Crosshairs
      ctx.strokeStyle='rgba(200,30,30,0.11)'; ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(tx,0);ctx.lineTo(tx,H);
      ctx.moveTo(0,ty);ctx.lineTo(W,ty);ctx.stroke();

      // Scope — batch all ring strokes
      ctx.save();
      [[64,0.5,1.5],[42,0.34,1.1],[22,0.55,0.9],[8,0.85,1.1]].forEach(([r,a,w])=>{
        ctx.beginPath();ctx.arc(tx,ty,r,0,Math.PI*2);
        ctx.strokeStyle=`rgba(220,30,30,${a})`;ctx.lineWidth=w;ctx.stroke();
      });
      // Tick marks — only 8 instead of 16, skip every other frame for minor ticks
      for(let i=0;i<8;i++){
        const a=(i/8)*Math.PI*2, major=i%2===0;
        const r0=64-(major?11:5), r1=64+(major?9:3);
        ctx.beginPath();
        ctx.moveTo(tx+Math.cos(a)*r0,ty+Math.sin(a)*r0);
        ctx.lineTo(tx+Math.cos(a)*r1,ty+Math.sin(a)*r1);
        ctx.strokeStyle=major?'rgba(220,50,50,0.65)':'rgba(180,30,30,0.3)';
        ctx.lineWidth=major?1.3:0.7; ctx.stroke();
      }
      ctx.restore();
      ctx.beginPath();ctx.arc(tx,ty,3,0,Math.PI*2);
      ctx.fillStyle='rgba(255,40,40,0.85)';ctx.fill();

      // Particles — batched by type for fewer state changes
      if(particles.length>0){
        // draw sparks
        for(let i=particles.length-1;i>=0;i--){
          const p=particles[i];
          p.x+=p.vx; p.y+=p.vy;
          p.life-=p.type==='spark'?0.035:0.024;
          if(p.life<=0){particles.splice(i,1);continue;}
          if(p.type==='spark'){
            p.vy+=0.08;
            ctx.beginPath();ctx.arc(p.x,p.y,1.2+p.life*1.4,0,Math.PI*2);
            ctx.fillStyle=`rgba(${p.r},${p.g},${p.b},${(p.life*0.88).toFixed(2)})`;ctx.fill();
          } else {
            const sz=p.sz*(1.5-p.life*0.5);
            ctx.beginPath();ctx.arc(p.x,p.y,sz,0,Math.PI*2);
            ctx.fillStyle=`rgba(130,122,112,${(p.life*0.16).toFixed(2)})`;ctx.fill();
          }
        }
      }
    }
    draw();
    function onResize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;buildGrid();}
    window.addEventListener('resize',onResize);
    return ()=>{cancelAnimationFrame(raf);window.removeEventListener('resize',onResize);};
  },[]);
}


function OddOneOutPage({ onBack }){
  const canvasRef=React.useRef(null);
  const effectRef=React.useRef(null);
  useOddOneOutBg(canvasRef, effectRef);
  React.useEffect(()=>{ if(window.BgMgr) window.BgMgr.setToolsMode(true); return()=>{ if(window.BgMgr) window.BgMgr.setToolsMode(false); }; },[]);

  const allChapters=CHAPTERS_DATA.map(c=>c.ch);

  /* ── Setup state ── */
  const [phase,setPhase]=React.useState('setup');
  const [mode,setMode]=React.useState('sections');
  const [selChs,setSelChs]=React.useState(new Set([1,2,3,4,5,6,7,8]));
  const [chapterReveal,setChapterReveal]=React.useState(false);
  const [victoryGoal,setVictoryGoal]=React.useState('');   // '' = no goal, else number string

  /* ── Game state ── */
  const [question,setQuestion]=React.useState(null);
  const [chosen,setChosen]=React.useState(null);
  const [hearts,setHearts]=React.useState(3);
  const [score,setScore]=React.useState(0);
  const [total,setTotal]=React.useState(0);
  const [deathScreen,setDeathScreen]=React.useState(false);
  const [deathOpacity,setDeathOpacity]=React.useState(0);
  const [victoryScreen,setVictoryScreen]=React.useState(false);
  const [victoryOpacity,setVictoryOpacity]=React.useState(0);
  const [feedbackState,setFeedbackState]=React.useState(null);

  /* ── Timer ── */
  const [timeLeft,setTimeLeft]=React.useState(10);
  const timerRef=React.useRef(null);

  function clearTimer(){ if(timerRef.current){ clearInterval(timerRef.current); timerRef.current=null; } }

  function startTimer(){
    clearTimer();
    setTimeLeft(10);
    timerRef.current=setInterval(()=>{
      setTimeLeft(t=>{
        if(t<=1){
          clearTimer();
          handleTimeUp();
          return 0;
        }
        return t-1;
      });
    },1000);
  }

  // cleanup on unmount
  React.useEffect(()=>()=>clearTimer(),[]);

  /* ── style helpers ── */
  const dc={background:'rgba(10,8,12,0.9)',border:'1px solid rgba(180,30,30,0.3)',borderRadius:14,backdropFilter:'blur(10px)'};

  function shuffle(arr){ return arr.slice().sort(()=>Math.random()-.5); }

  /* ── Question builder ── */
  function buildQuestion(chs,md){
    const chArr=[...chs].sort((a,b)=>a-b);
    if(chArr.length<2) return null;
    function tryBuild(){
      const homeCh=chArr[Math.floor(Math.random()*chArr.length)];
      const otherChs=chArr.filter(c=>c!==homeCh);
      if(!otherChs.length) return null;
      const oddCh=otherChs[Math.floor(Math.random()*otherChs.length)];
      let homeItems=[], oddItems=[];
      if(md==='sections'){
        homeItems=shuffle(CHAPTER_SECTIONS[homeCh]||[]).map(s=>s.heading);
        oddItems=shuffle(CHAPTER_SECTIONS[oddCh]||[]).map(s=>s.heading);
      } else if(md==='keywords'){
        const homeKws=[], oddKws=[];
        CHAPTERS_DATA.find(c=>c.ch===homeCh)?.verses.forEach(v=>{
          v.t.split(/[\s\u2014\u2013]+/).forEach(w=>{
            const core=w.replace(/[^a-zA-Z]/g,'').toLowerCase();
            if(core.length>=3&&KEY_WORDS.has(core)&&KEYWORD_TO_CHAPTER[core]===homeCh&&!homeKws.includes(core)) homeKws.push(core);
          });
        });
        CHAPTERS_DATA.find(c=>c.ch===oddCh)?.verses.forEach(v=>{
          v.t.split(/[\s\u2014\u2013]+/).forEach(w=>{
            const core=w.replace(/[^a-zA-Z]/g,'').toLowerCase();
            if(core.length>=3&&KEY_WORDS.has(core)&&KEYWORD_TO_CHAPTER[core]===oddCh&&!oddKws.includes(core)) oddKws.push(core);
          });
        });
        homeItems=shuffle(homeKws); oddItems=shuffle(oddKws);
      } else {
        homeItems=shuffle(CHAPTERS_DATA.find(c=>c.ch===homeCh)?.verses||[]).map(v=>v.t);
        oddItems=shuffle(CHAPTERS_DATA.find(c=>c.ch===oddCh)?.verses||[]).map(v=>v.t);
      }
      if(homeItems.length<3||oddItems.length<1) return null;
      const h3=homeItems.slice(0,3);
      const oddItem=oddItems[0];
      if(h3.includes(oddItem)) return null;
      const oddIdx=Math.floor(Math.random()*4);
      const choices=[]; let hi=0;
      for(let i=0;i<4;i++){
        if(i===oddIdx) choices.push({text:oddItem,ch:oddCh,isOdd:true});
        else choices.push({text:h3[hi++],ch:homeCh,isOdd:false});
      }
      return {choices,homeCh,oddCh,oddIdx};
    }
    for(let a=0;a<20;a++){ const q=tryBuild(); if(q) return q; }
    return null;
  }

  function startGame(){
    const q=buildQuestion(selChs,mode);
    if(!q) return;
    setQuestion(q); setChosen(null); setHearts(3);
    setScore(0); setTotal(0); setFeedbackState(null);
    setPhase('playing');
    setTimeout(()=>startTimer(),50);
  }

  function nextQuestion(){
    const q=buildQuestion(selChs,mode);
    if(!q){ setPhase('results'); return; }
    setQuestion(q); setChosen(null); setFeedbackState(null);
    startTimer();
  }

  /* shared logic for correct/wrong outcomes */
  function resolveCorrect(newScore){
    clearTimer();
    setFeedbackState('correct');
    const fx=effectRef.current; const pos=fx?.getPos();
    if(fx&&pos) fx.spawnSparks(pos.x,pos.y,38);
    // Check victory
    const goal=parseInt(victoryGoal);
    if(!isNaN(goal)&&goal>0&&newScore>=goal){
      // Victory!
      setTimeout(()=>{
        setVictoryScreen(true);
        let op=0;
        const vIn=setInterval(()=>{ op+=0.06; if(op>=1){op=1;clearInterval(vIn);} setVictoryOpacity(op); },35);
        setTimeout(()=>{
          let op2=1;
          const vOut=setInterval(()=>{ op2-=0.045; if(op2<=0){op2=0;clearInterval(vOut); setVictoryScreen(false);setVictoryOpacity(0);setPhase('setup');} setVictoryOpacity(op2); },50);
        },2100);
      },300);
    } else {
      setTimeout(()=>nextQuestion(),850);
    }
  }

  function resolveWrong(newHearts, oddCh){
    clearTimer();
    setFeedbackState('wrong_'+oddCh);
    const fx=effectRef.current; const pos=fx?.getPos();
    if(fx&&pos) fx.spawnSmoke(pos.x,pos.y,22);
    if(newHearts<=0){
      setTimeout(()=>{
        setDeathScreen(true);
        let op=0;
        const dIn=setInterval(()=>{ op+=0.07; if(op>=1){op=1;clearInterval(dIn);} setDeathOpacity(op); },40);
        setTimeout(()=>{
          let op2=1;
          const dOut=setInterval(()=>{ op2-=0.05; if(op2<=0){op2=0;clearInterval(dOut); setDeathScreen(false);setDeathOpacity(0);setPhase('setup');} setDeathOpacity(op2); },55);
        },2200);
      },600);
    } else {
      setTimeout(()=>nextQuestion(),1100);
    }
  }

  function handleTimeUp(){
    if(chosen!==null) return;
    // treat as wrong — use a sentinel so UI shows timeout state
    setChosen(-1);
    setTotal(t=>t+1);
    const newHearts=hearts-1;
    setHearts(newHearts);
    const oddCh=question?.oddCh;
    resolveWrong(newHearts, oddCh);
  }

  function handleChoice(idx){
    if(chosen!==null||!question) return;
    clearTimer();
    setChosen(idx);
    const correct=question.choices[idx].isOdd;
    setTotal(t=>t+1);
    if(correct){
      const newScore=score+1;
      setScore(newScore);
      resolveCorrect(newScore);
    } else {
      const newHearts=hearts-1;
      setHearts(newHearts);
      resolveWrong(newHearts, question.oddCh);
    }
  }

  const canEnough=(()=>{
    const chs=[...selChs];
    if(chs.length<2) return false;
    if(mode==='sections') return chs.reduce((s,ch)=>s+(CHAPTER_SECTIONS[ch]||[]).length,0)>=4;
    if(mode==='keywords'){
      for(const ch of chs){
        let count=0;
        CHAPTERS_DATA.find(c=>c.ch===ch)?.verses.forEach(v=>{ v.t.split(/[\s\u2014\u2013]+/).forEach(w=>{ const core=w.replace(/[^a-zA-Z]/g,'').toLowerCase(); if(core.length>=3&&KEY_WORDS.has(core)&&KEYWORD_TO_CHAPTER[core]===ch) count++; }); });
        if(count<1) return false;
      }
      return true;
    }
    return chs.every(ch=>(CHAPTERS_DATA.find(c=>c.ch===ch)?.verses.length||0)>=1)&&chs.length>=2;
  })();

  /* ── SETUP ── */
  if(phase==='setup'){
    return (
      <div style={{position:'relative',minHeight:'100vh'}}>
        <canvas ref={canvasRef} style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',zIndex:2,pointerEvents:'none'}}/>
        <div style={{position:'relative',zIndex:3,maxWidth:640,margin:'0 auto',padding:'1rem 1rem 6rem',fontFamily:"'Crimson Pro',serif"}}>
          <div style={{position:'fixed',top:'1.1rem',left:'1rem',zIndex:60}}>
            <button className="kq-nav-btn" onClick={onBack}>← Back</button>
          </div>
          <div style={{paddingTop:'3.5rem',textAlign:'center',marginBottom:'1.4rem'}}>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'1.5rem',letterSpacing:'.08em',color:'rgba(220,80,80,0.9)',marginBottom:'.3rem'}}>Odd One Out</div>
            <div style={{fontStyle:'italic',fontSize:'.85rem',color:'rgba(180,60,60,0.45)'}}>Three belong to the same chapter — find the one that doesn't</div>
          </div>

          {/* Mode */}
          <div style={{...dc,padding:'1rem 1.1rem',marginBottom:'.75rem'}}>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'.55rem',letterSpacing:'.14em',color:'rgba(180,60,60,0.4)',marginBottom:'.65rem'}}>MODE</div>
            <div style={{display:'flex',gap:'.5rem',justifyContent:'center',flexWrap:'wrap'}}>
              {[{val:'sections',label:'Sections'},{val:'keywords',label:'Keywords'},{val:'verses',label:'Verses'}].map(m=>{
                const on=mode===m.val;
                return <button key={m.val} onClick={()=>setMode(m.val)}
                  style={{fontFamily:'Cinzel,serif',fontSize:'.74rem',padding:'.5rem 1.2rem',borderRadius:8,cursor:'pointer',
                    border:`1px solid ${on?'rgba(220,60,60,0.7)':'rgba(140,30,30,0.28)'}`,
                    background:on?'rgba(160,20,20,0.22)':'rgba(8,5,5,0.6)',
                    color:on?'rgba(240,110,110,0.9)':'rgba(160,60,60,0.45)',transition:'all .15s'}}>
                  {m.label}</button>;
              })}
            </div>
          </div>

          {/* Chapters */}
          <div style={{...dc,padding:'1rem 1.1rem',marginBottom:'.75rem'}}>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'.55rem',letterSpacing:'.14em',color:'rgba(180,60,60,0.4)',marginBottom:'.65rem'}}>CHAPTERS</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:'.38rem',justifyContent:'center',marginBottom:'.55rem'}}>
              {allChapters.map(ch=>{ const on=selChs.has(ch); return (
                <button key={ch} onClick={()=>setSelChs(p=>{const n=new Set(p);n.has(ch)?n.delete(ch):n.add(ch);return n;})}
                  style={{fontFamily:'Cinzel,serif',fontSize:'.68rem',width:'2.5rem',height:'2.5rem',borderRadius:7,
                    border:`1px solid ${on?'rgba(220,60,60,0.65)':'rgba(140,30,30,0.22)'}`,
                    background:on?'rgba(160,20,20,0.22)':'rgba(8,5,5,0.7)',
                    color:on?'rgba(240,110,110,0.9)':'rgba(140,50,50,0.38)',cursor:'pointer',transition:'all .14s'}}>
                  {chLabel(ch)}</button>
              );})}
            </div>
            <div style={{display:'flex',gap:'.45rem',justifyContent:'center'}}>
              <button onClick={()=>setSelChs(new Set(allChapters))} style={{fontFamily:'Cinzel,serif',fontSize:'.68rem',padding:'.4rem .85rem',borderRadius:7,border:'1px solid rgba(140,30,30,0.28)',background:'rgba(8,5,5,0.6)',color:'rgba(160,60,60,0.4)',cursor:'pointer'}}>All</button>
              <button onClick={()=>setSelChs(new Set())} style={{fontFamily:'Cinzel,serif',fontSize:'.68rem',padding:'.4rem .85rem',borderRadius:7,border:'1px solid rgba(140,30,30,0.28)',background:'rgba(8,5,5,0.6)',color:'rgba(160,60,60,0.4)',cursor:'pointer'}}>None</button>
            </div>
          </div>

          {/* Chapter reveal + Victory — side by side on wide, stacked on narrow */}
          <div style={{display:'flex',gap:'.65rem',marginBottom:'1.2rem',flexWrap:'wrap'}}>
            {/* Chapter Reveal */}
            <div style={{...dc,padding:'.85rem 1rem',flex:'1 1 220px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:'.8rem'}}>
              <div>
                <div style={{fontFamily:'Cinzel,serif',fontSize:'.72rem',color:'rgba(210,90,90,0.8)',marginBottom:'.15rem'}}>Chapter Reveal</div>
                <div style={{fontFamily:"'Crimson Pro',serif",fontStyle:'italic',fontSize:'.78rem',color:'rgba(160,60,60,0.45)'}}>Show the chapter the 3 belong to</div>
              </div>
              <div onClick={()=>setChapterReveal(v=>!v)} style={{width:44,height:24,borderRadius:12,flexShrink:0,
                background:chapterReveal?'rgba(200,40,40,0.55)':'rgba(40,10,10,0.7)',
                border:`1px solid ${chapterReveal?'rgba(220,60,60,0.6)':'rgba(120,30,30,0.3)'}`,
                position:'relative',cursor:'pointer',transition:'all .2s'}}>
                <div style={{position:'absolute',top:3,left:chapterReveal?21:3,width:16,height:16,borderRadius:'50%',
                  background:chapterReveal?'rgba(240,100,100,0.9)':'rgba(120,50,50,0.6)',transition:'left .2s'}}/>
              </div>
            </div>
            {/* Victory Goal */}
            <div style={{...dc,padding:'.85rem 1rem',flex:'1 1 180px',display:'flex',flexDirection:'column',gap:'.35rem'}}>
              <div style={{fontFamily:'Cinzel,serif',fontSize:'.72rem',color:'rgba(210,90,90,0.8)'}}>Victory Goal</div>
              <div style={{fontFamily:"'Crimson Pro',serif",fontStyle:'italic',fontSize:'.78rem',color:'rgba(160,60,60,0.45)',marginBottom:'.2rem'}}>Correct answers needed to win</div>
              <input
                type="number" min="1" max="99"
                value={victoryGoal}
                onChange={e=>{ const v=e.target.value; if(v===''||(/^\d{1,2}$/.test(v)&&+v>=1)) setVictoryGoal(v); }}
                placeholder="e.g. 10"
                style={{fontFamily:'Cinzel,serif',fontSize:'.88rem',width:'100%',padding:'.38rem .7rem',
                  borderRadius:7,border:'1px solid rgba(180,40,40,0.4)',
                  background:'rgba(20,5,5,0.7)',color:'rgba(240,130,130,0.88)',
                  outline:'none',boxSizing:'border-box'}}
              />
              {victoryGoal&&<div style={{fontFamily:'Cinzel,serif',fontSize:'.56rem',color:'rgba(210,80,80,0.5)',letterSpacing:'.08em'}}>GOAL: {victoryGoal} CORRECT</div>}
            </div>
          </div>

          <div style={{textAlign:'center'}}>
            <button onClick={startGame} disabled={!canEnough}
              style={{fontFamily:'Cinzel,serif',fontSize:'.9rem',letterSpacing:'.06em',padding:'.72rem 2.2rem',borderRadius:10,border:'none',
                background:canEnough?'linear-gradient(135deg,#8c1a1a,#5c0e0e)':'rgba(40,10,10,0.38)',
                color:canEnough?'rgba(240,140,140,0.9)':'rgba(130,50,50,0.35)',cursor:canEnough?'pointer':'default',
                boxShadow:canEnough?'0 4px 22px rgba(160,20,20,0.4)':'none',transition:'all .2s'}}>
              Begin
            </button>
          </div>
        </div>
      </div>
    );
  }

  /* ── PLAYING ── */
  if(phase==='playing'&&question){
    const {choices,homeCh,oddCh}=question;
    const timedOut=chosen===-1;
    const feedbackWrong=feedbackState&&feedbackState.startsWith('wrong_');
    const wrongCh=feedbackWrong?feedbackState.replace('wrong_',''):'';
    // timer colour
    const timerPct=timeLeft/10;
    const timerColor=timerPct>0.5?'rgba(80,220,120,0.85)':timerPct>0.25?'rgba(220,170,40,0.85)':'rgba(220,50,50,0.9)';
    const goal=parseInt(victoryGoal);
    const hasGoal=!isNaN(goal)&&goal>0;

    return (
      <div style={{position:'relative',minHeight:'100vh'}}>
        <canvas ref={canvasRef} style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',zIndex:2,pointerEvents:'none'}}/>

        {/* Death overlay */}
        {deathScreen&&(
          <div style={{position:'fixed',inset:0,zIndex:100,background:`rgba(8,0,0,${deathOpacity})`,
            display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
            <div style={{fontSize:'8rem',lineHeight:1,filter:`drop-shadow(0 0 ${40*deathOpacity}px #ff0000)`,opacity:deathOpacity}}>😈</div>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'2.2rem',letterSpacing:'.1em',
              color:`rgba(220,30,30,${deathOpacity})`,marginTop:'1rem',
              textShadow:`0 0 ${30*deathOpacity}px #ff0000`}}>YOU FELL</div>
          </div>
        )}

        {/* Victory overlay */}
        {victoryScreen&&(
          <div style={{position:'fixed',inset:0,zIndex:101,background:`rgba(0,80,20,${victoryOpacity*0.96})`,
            display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',pointerEvents:'none',
            overflow:'hidden'}}>
            {/* Falling sparks via CSS — simple approach */}
            <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none'}}>
              {Array.from({length:32}).map((_,i)=>(
                <div key={i} style={{
                  position:'absolute',
                  left:`${(i*37+13)%100}%`,
                  top:`${-10-(i*23)%40}%`,
                  width:6+i%5,height:6+i%5,
                  borderRadius:'50%',
                  background:`hsl(${90+i*8},100%,${55+i%25}%)`,
                  opacity:victoryOpacity*0.9,
                  animation:`vFall ${1.2+(i%6)*0.25}s linear ${(i%8)*0.18}s infinite`,
                }}/>
              ))}
            </div>
            <style>{`@keyframes vFall{from{transform:translateY(0) rotate(0deg)}to{transform:translateY(110vh) rotate(360deg)}}`}</style>
            <div style={{fontSize:'7rem',lineHeight:1,opacity:victoryOpacity,
              filter:`drop-shadow(0 0 ${30*victoryOpacity}px #00ff80)`}}>✅</div>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'2.8rem',letterSpacing:'.14em',marginTop:'1rem',
              color:`rgba(120,255,160,${victoryOpacity})`,
              textShadow:`0 0 ${40*victoryOpacity}px #00ff80, 0 0 ${80*victoryOpacity}px #00cc60`}}>VICTORY</div>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'.9rem',letterSpacing:'.1em',marginTop:'.6rem',
              color:`rgba(100,240,140,${victoryOpacity*0.7})`}}>{score} correct</div>
          </div>
        )}

        <div style={{position:'relative',zIndex:3,maxWidth:640,margin:'0 auto',padding:'.75rem 1rem 5rem',fontFamily:"'Crimson Pro',serif"}}>
          {/* Header row */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingBottom:'.45rem'}}>
            <button className="kq-nav-btn" onClick={()=>{clearTimer();setPhase('setup');}}>✕ Exit</button>
            {/* Hearts */}
            <div style={{display:'flex',gap:'.3rem',alignItems:'center'}}>
              {[0,1,2].map(i=>(
                <span key={i} style={{fontSize:'1.25rem',transition:'filter .3s',filter:i<hearts?'none':'grayscale(1) brightness(0.4)'}}>❤️</span>
              ))}
            </div>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'.62rem',color:'rgba(200,70,70,0.55)',textAlign:'right',lineHeight:1.6}}>
              <div>{score}/{total}</div>
              {hasGoal&&<div style={{color:'rgba(180,220,80,0.6)'}}>{Math.max(0,goal-score)} to go</div>}
            </div>
          </div>

          {/* Timer bar */}
          <div style={{height:5,borderRadius:3,background:'rgba(60,10,10,0.5)',marginBottom:'.6rem',overflow:'hidden',position:'relative'}}>
            <div style={{height:'100%',borderRadius:3,
              background:`linear-gradient(90deg,${timerColor},${timerColor})`,
              width:`${timerPct*100}%`,transition:'width 1s linear, background .5s'}}/>
            <div style={{position:'absolute',right:6,top:-2,fontFamily:'Cinzel,serif',fontSize:'.55rem',
              color:timerColor,lineHeight:'9px'}}>{chosen===null?timeLeft:''}</div>
          </div>

          {/* Chapter reveal banner */}
          {chapterReveal&&(
            <div style={{...dc,padding:'.5rem 1rem',marginBottom:'.6rem',textAlign:'center',
              borderColor:'rgba(200,50,50,0.35)',background:'rgba(80,10,10,0.55)'}}>
              <span style={{fontFamily:'Cinzel,serif',fontSize:'.6rem',letterSpacing:'.1em',color:'rgba(180,60,60,0.5)',marginRight:'.5rem'}}>THREE FROM</span>
              <span style={{fontFamily:'Cinzel,serif',fontSize:'.88rem',color:'rgba(240,130,130,0.85)'}}>{chLabel(homeCh)}</span>
            </div>
          )}

          {/* Prompt card */}
          <div style={{...dc,padding:'.85rem 1.1rem',marginBottom:'.75rem',textAlign:'center'}}>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'.52rem',letterSpacing:'.16em',color:'rgba(160,50,50,0.4)',marginBottom:'.35rem'}}>FIND THE ODD ONE OUT</div>
            <div style={{fontFamily:"'Crimson Pro',serif",fontStyle:'italic',fontSize:'.82rem',color:'rgba(180,70,70,0.55)'}}>
              {mode==='sections'?'One section heading is from a different chapter':
               mode==='keywords'?'One keyword belongs to a different chapter':
               'One verse is from a different chapter'}
            </div>
            {feedbackState==='correct'&&(
              <div style={{marginTop:'.45rem',fontFamily:'Cinzel,serif',fontSize:'.8rem',color:'rgba(80,230,120,0.9)'}}>✓ Correct!</div>
            )}
            {feedbackWrong&&(
              <div style={{marginTop:'.45rem',fontFamily:'Cinzel,serif',fontSize:'.8rem',color:'rgba(230,80,80,0.9)'}}>
                {timedOut?'⏱ Time\'s up! ':'✗ '}{timedOut?'The odd one was from ':'That belonged to '} {chLabel(wrongCh)}
              </div>
            )}
          </div>

          {/* Choices */}
          <div style={{display:'flex',flexDirection:'column',gap:'.55rem'}}>
            {choices.map((choice,i)=>{
              const isChosen=chosen===i;
              const revealed=chosen!==null;
              const isOdd=choice.isOdd;
              let bg,border,color;
              if(!revealed){
                bg='rgba(10,6,6,0.82)'; border='rgba(160,40,40,0.3)'; color='rgba(220,160,160,0.85)';
              } else if(isOdd&&isChosen){
                bg='rgba(20,120,50,0.28)'; border='rgba(50,220,100,0.65)'; color='rgba(120,240,160,0.95)';
              } else if(isOdd){
                bg='rgba(20,120,50,0.15)'; border='rgba(50,200,90,0.4)'; color='rgba(100,220,140,0.7)';
              } else if(!isOdd&&isChosen){
                bg='rgba(140,20,20,0.28)'; border='rgba(220,50,50,0.65)'; color='rgba(240,100,100,0.9)';
              } else {
                bg='rgba(8,5,5,0.55)'; border='rgba(100,25,25,0.2)'; color='rgba(160,80,80,0.38)';
              }
              return (
                <button key={i} onClick={()=>handleChoice(i)} disabled={chosen!==null}
                  style={{fontFamily:"'Crimson Pro',serif",fontSize:'1rem',lineHeight:1.5,
                    padding:'.78rem 1.1rem',borderRadius:10,border:`1px solid ${border}`,
                    background:bg,color,cursor:chosen===null?'pointer':'default',
                    textAlign:'left',transition:'all .2s',
                    display:'flex',alignItems:'center',justifyContent:'space-between',gap:'.5rem',
                    wordBreak:'break-word'}}>
                  <span style={{flex:1}}>{mode==='keywords'?choice.text:choice.text.length>120?choice.text.slice(0,117)+'…':choice.text}</span>
                  {revealed&&isOdd&&<span style={{fontSize:'1.1rem',flexShrink:0}}>✓</span>}
                  {revealed&&!isOdd&&isChosen&&<span style={{fontSize:'1.1rem',flexShrink:0}}>✗</span>}
                </button>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  /* ── RESULTS ── */
  const pct=total>0?Math.round((score/total)*100):0;
  return (
    <div style={{position:'relative',minHeight:'100vh'}}>
      <canvas ref={canvasRef} style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',zIndex:2,pointerEvents:'none'}}/>
      <div style={{position:'relative',zIndex:3,maxWidth:580,margin:'0 auto',padding:'1rem 1rem 5rem',fontFamily:"'Crimson Pro',serif"}}>
        <div style={{paddingTop:'3rem',textAlign:'center',marginBottom:'1.4rem'}}>
          <div style={{fontFamily:'Cinzel,serif',fontSize:'1.35rem',letterSpacing:'.08em',color:'rgba(220,80,80,0.9)'}}>
            {hearts>0?'Round Complete':'Game Over'}
          </div>
        </div>
        <div style={{...dc,padding:'1.4rem',textAlign:'center',marginBottom:'1.2rem'}}>
          <div style={{fontFamily:'Cinzel,serif',fontSize:'2.8rem',color:pct>=80?'rgba(70,220,120,0.9)':pct>=50?'rgba(210,170,40,0.9)':'rgba(210,60,60,0.85)',marginBottom:'.25rem'}}>{pct}%</div>
          <div style={{fontSize:'.88rem',color:'rgba(180,70,70,0.55)'}}>{score} of {total} correct</div>
          <div style={{marginTop:'.7rem',display:'flex',gap:'.35rem',justifyContent:'center'}}>
            {[0,1,2].map(i=><span key={i} style={{fontSize:'1.3rem',filter:i<hearts?'none':'grayscale(1) brightness(0.4)'}}>❤️</span>)}
          </div>
        </div>
        <div style={{display:'flex',gap:'.8rem',justifyContent:'center',flexWrap:'wrap'}}>
          <button onClick={startGame} style={{fontFamily:'Cinzel,serif',fontSize:'.82rem',padding:'.58rem 1.6rem',borderRadius:9,border:'none',background:'linear-gradient(135deg,#8c1a1a,#5c0e0e)',color:'rgba(240,140,140,0.9)',cursor:'pointer',boxShadow:'0 4px 18px rgba(160,20,20,0.35)'}}>Play Again</button>
          <button onClick={()=>setPhase('setup')} style={{fontFamily:'Cinzel,serif',fontSize:'.82rem',padding:'.58rem 1.3rem',borderRadius:9,border:'1px solid rgba(140,30,30,0.4)',background:'rgba(10,6,6,0.88)',color:'rgba(180,70,70,0.55)',cursor:'pointer'}}>Change Setup</button>
          <button onClick={onBack} style={{fontFamily:'Cinzel,serif',fontSize:'.82rem',padding:'.58rem 1.2rem',borderRadius:9,border:'1px solid rgba(120,25,25,0.3)',background:'rgba(10,6,6,0.88)',color:'rgba(150,60,60,0.45)',cursor:'pointer'}}>← Back</button>
        </div>
      </div>
    </div>
  );
}

function useSectionLocatorBg(canvasRef){
  React.useEffect(()=>{
    const c=canvasRef.current; if(!c) return;
    let W=c.width=window.innerWidth, H=c.height=window.innerHeight;
    const ctx=c.getContext('2d');
    let raf, angle=0;
    const cx=W/2, cy=H/2;
    const RINGS=[{r:0.28,a:0.04},{r:0.48,a:0.025},{r:0.72,a:0.015},{r:0.96,a:0.008}];
    const SPOKES=16;
    const DOTS=[];
    for(let x=0;x<W;x+=56) for(let y=0;y<H;y+=56) DOTS.push({x:x+(Math.random()*14-7),y:y+(Math.random()*14-7),a:Math.random()*0.18+0.04});
    let bgGradSL=null;
    function makeBgSL(){bgGradSL=ctx.createLinearGradient(0,0,W,H);bgGradSL.addColorStop(0,'#071a14');bgGradSL.addColorStop(0.5,'#0d2b1e');bgGradSL.addColorStop(1,'#09201a');}
    makeBgSL();
    let frameCount=0;

    function draw(){
      raf=requestAnimationFrame(draw); frameCount++;
      angle+=0.0018;
      ctx.fillStyle=bgGradSL; ctx.fillRect(0,0,W,H);

      // Dot grid — every 3rd frame
      if(frameCount%3===0){
        DOTS.forEach(d=>{ ctx.beginPath(); ctx.arc(d.x,d.y,1.1,0,Math.PI*2); ctx.fillStyle=`rgba(80,190,140,${d.a})`; ctx.fill(); });
      }

      // Compass rings
      RINGS.forEach(ring=>{
        const r=ring.r*Math.min(W,H);
        ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
        ctx.strokeStyle=`rgba(100,210,155,${ring.a})`; ctx.lineWidth=1; ctx.stroke();
      });

      // Compass spokes (rotate slowly)
      ctx.save(); ctx.translate(cx,cy); ctx.rotate(angle);
      for(let i=0;i<SPOKES;i++){
        const a=(i/SPOKES)*Math.PI*2;
        const major=(i%4===0);
        ctx.beginPath();
        ctx.moveTo(0,0);
        ctx.lineTo(Math.cos(a)*Math.min(W,H)*0.52, Math.sin(a)*Math.min(W,H)*0.52);
        ctx.strokeStyle=major?'rgba(180,240,190,0.06)':'rgba(80,190,140,0.025)';
        ctx.lineWidth=major?1.2:0.7; ctx.stroke();
      }
      ctx.restore();

      // Golden sweep needle
      ctx.save(); ctx.translate(cx,cy); ctx.rotate(angle*0.7);
      const needleLen=Math.min(W,H)*0.38;
      const ng=ctx.createLinearGradient(0,0,needleLen,0);
      ng.addColorStop(0,'rgba(220,170,40,0)'); ng.addColorStop(0.6,'rgba(220,170,40,0.18)'); ng.addColorStop(1,'rgba(220,170,40,0)');
      ctx.fillStyle=ng;
      ctx.beginPath(); ctx.moveTo(0,-3); ctx.lineTo(needleLen,0); ctx.lineTo(0,3); ctx.closePath();
      ctx.fill();
      ctx.restore();

      // Cross-hairs
      ctx.strokeStyle='rgba(100,210,155,0.07)'; ctx.lineWidth=0.8;
      ctx.beginPath(); ctx.moveTo(cx,0); ctx.lineTo(cx,H); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,cy); ctx.lineTo(W,cy); ctx.stroke();

      // Centre rose dot
      ctx.beginPath(); ctx.arc(cx,cy,5,0,Math.PI*2);
      ctx.fillStyle='rgba(180,240,190,0.2)'; ctx.fill();
      ctx.beginPath(); ctx.arc(cx,cy,2,0,Math.PI*2);
      ctx.fillStyle='rgba(220,170,40,0.55)'; ctx.fill();
    }
    draw();
    function onResize(){ W=c.width=window.innerWidth; H=c.height=window.innerHeight; makeBgSL(); }
    window.addEventListener('resize',onResize);
    return ()=>{ cancelAnimationFrame(raf); window.removeEventListener('resize',onResize); };
  },[]);
}

function SectionLocatorPage({ onBack }){
  const canvasRef=React.useRef(null);
  useSectionLocatorBg(canvasRef);
  React.useEffect(()=>{ if(window.BgMgr) window.BgMgr.setToolsMode(true); return()=>{ if(window.BgMgr) window.BgMgr.setToolsMode(false); }; },[]);

  const allChapters=CHAPTERS_DATA.map(c=>c.ch);

  /* ── Setup state ── */
  const [phase,setPhase]=React.useState('setup');
  const [selChs,setSelChs]=React.useState(new Set([1,2,3,4,5,6]));
  const [direction,setDirection]=React.useState('heading->chapter'); // or 'chapter->heading'

  /* ── Quiz state ── */
  const [questions,setQuestions]=React.useState([]);
  const [qIdx,setQIdx]=React.useState(0);
  const [chosen,setChosen]=React.useState(null);
  const [history,setHistory]=React.useState([]);
  const [shake,setShake]=React.useState(false);

  /* ── helpers ── */
  const dc={background:'rgba(5,20,14,0.88)',border:'1px solid rgba(80,190,140,0.22)',borderRadius:14,backdropFilter:'blur(10px)'};
  const acc='rgba(100,220,160,0.85)';
  const accDim='rgba(80,180,130,0.45)';
  const btnBase={fontFamily:'Cinzel,serif',fontSize:'.74rem',padding:'.48rem .95rem',borderRadius:8,cursor:'pointer',transition:'all .15s',border:'1px solid'};

  function shuffleArr(arr){ return arr.slice().sort(()=>Math.random()-.5); }

  function buildQuestions(){
    const chs=[...selChs].sort((a,b)=>a-b);
    // gather all (chapter, heading) pairs
    const pairs=[];
    chs.forEach(ch=>{
      (CHAPTER_SECTIONS[ch]||[]).forEach(sec=>pairs.push({ch,heading:sec.heading}));
    });
    if(pairs.length<4) return null;
    const shuffled=shuffleArr(pairs);
    return shuffled.map(pair=>{
      if(direction==='heading->chapter'){
        // prompt=heading, answer=chapter, distractors=other chapters
        const otherChs=chs.filter(c=>c!==pair.ch);
        const wrong=shuffleArr(otherChs).slice(0,3);
        const choices=shuffleArr([pair.ch,...wrong]);
        return {prompt:pair.heading,promptLabel:'Section Heading',answer:pair.ch,choices,displayFn:c=>`Chapter ${c}`};
      } else {
        // prompt=chapter, answer=heading, distractors=other headings from other chapters
        const otherHeadings=pairs.filter(p=>p.ch!==pair.ch).map(p=>p.heading);
        const wrong=shuffleArr(otherHeadings).slice(0,3);
        const choices=shuffleArr([pair.heading,...wrong]);
        return {prompt:`Chapter ${pair.ch}`,promptLabel:'Chapter',answer:pair.heading,choices,displayFn:h=>h};
      }
    });
  }

  function startGame(){
    const qs=buildQuestions();
    if(!qs||qs.length<1) return;
    setQuestions(qs);
    setQIdx(0);
    setChosen(null);
    setHistory([]);
    setPhase('playing');
  }

  function handleChoice(choice){
    if(chosen!==null) return;
    const q=questions[qIdx];
    const correct=choice===q.answer;
    setChosen(choice);
    if(!correct){ setShake(true); setTimeout(()=>setShake(false),500); }
    setTimeout(()=>{
      setHistory(h=>[...h,{prompt:q.prompt,answer:q.answer,chosen:choice,correct}]);
      const next=qIdx+1;
      if(next>=questions.length){ setPhase('results'); }
      else{ setQIdx(next); setChosen(null); }
    }, correct?700:1100);

  /* ── SETUP ── */

            <div style={{fontStyle:'italic',fontSize:'.85rem',color:'rgba(90,185,130,0.45)'}}>Match headings to chapters — or chapters to headings</div>
          </div>

          {/* Chapter selection */}
          <div style={{...dc,padding:'1rem 1.1rem',marginBottom:'.8rem'}}>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'.55rem',letterSpacing:'.14em',color:'rgba(80,190,140,0.4)',marginBottom:'.65rem'}}>CHAPTERS TO INCLUDE</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:'.38rem',justifyContent:'center',marginBottom:'.55rem'}}>

                    title={`${scount} section${scount!==1?'s':''}`}
                    style={{fontFamily:'Cinzel,serif',fontSize:'.68rem',width:'2.5rem',height:'2.5rem',borderRadius:7,position:'relative',
                      border:`1px solid ${on?'rgba(80,210,145,0.65)':'rgba(50,140,90,0.22)'}`,
                      background:on?'rgba(30,140,80,0.2)':'rgba(5,18,12,0.7)',
                      color:on?'rgba(130,230,170,0.9)':'rgba(60,140,90,0.35)',cursor:'pointer',transition:'all .14s'}}>

            </div>
            <div style={{display:'flex',gap:'.45rem',justifyContent:'center'}}>
              <button onClick={()=>setSelChs(new Set(allChapters))} style={{...btnBase,borderColor:'rgba(50,140,90,0.28)',background:'rgba(5,18,12,0.6)',color:'rgba(80,190,130,0.4)'}}>All</button>
              <button onClick={()=>setSelChs(new Set())} style={{...btnBase,borderColor:'rgba(50,140,90,0.28)',background:'rgba(5,18,12,0.6)',color:'rgba(80,190,130,0.4)'}}>None</button>
            </div>

            </div>
          </div>

          {/* Direction */}
          <div style={{...dc,padding:'1rem 1.1rem',marginBottom:'1.2rem'}}>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'.55rem',letterSpacing:'.14em',color:'rgba(80,190,140,0.4)',marginBottom:'.65rem'}}>DIRECTION</div>
            <div style={{display:'flex',gap:'.55rem',justifyContent:'center',flexWrap:'wrap'}}>
              {[
                {val:'heading->chapter',label:'Heading → Chapter',desc:'See a section heading, pick the chapter'},
                {val:'chapter->heading',label:'Chapter → Heading',desc:'See a chapter number, pick the right heading'},
              ].map(opt=>{
                const on=direction===opt.val;
                return (
                  <button key={opt.val} onClick={()=>setDirection(opt.val)}
                    style={{...btnBase,flex:'1 1 180px',minWidth:180,flexDirection:'column',display:'flex',alignItems:'center',gap:'.25rem',padding:'.65rem .9rem',
                      borderColor:on?'rgba(80,210,145,0.65)':'rgba(50,140,90,0.22)',
                      background:on?'rgba(30,140,80,0.2)':'rgba(5,18,12,0.6)',
                      color:on?'rgba(130,230,170,0.9)':'rgba(60,140,90,0.38)'}}>
                    <span style={{fontFamily:'Cinzel,serif',fontSize:'.74rem',letterSpacing:'.04em'}}>{opt.label}</span>
                    <span style={{fontFamily:"'Crimson Pro',serif",fontSize:'.78rem',fontStyle:'italic',color:on?'rgba(100,210,155,0.55)':'rgba(50,120,75,0.35)'}}>{opt.desc}</span>
                  </button>
                );
              })}
            </div>
          </div>

          <div style={{textAlign:'center'}}>
            <button onClick={startGame} disabled={!enough}
              style={{fontFamily:'Cinzel,serif',fontSize:'.9rem',letterSpacing:'.06em',padding:'.72rem 2.2rem',borderRadius:10,border:'none',
                background:enough?'linear-gradient(135deg,#1a6640,#0d4429)':'rgba(10,40,20,0.38)',
                color:enough?'rgba(140,240,180,0.9)':'rgba(50,120,75,0.35)',cursor:enough?'pointer':'default',
                boxShadow:enough?'0 4px 22px rgba(20,140,70,0.35)':'none',transition:'all .2s'}}>
              Begin
            </button>
          </div>
        </div>
      </div>
    );
  }

  /* ── PLAYING ── */
  if(phase==='playing'){
    const q=questions[qIdx];
    const prog=qIdx+1;
    const total=questions.length;
    return (
      <div style={{position:'relative',minHeight:'100vh'}}>
        <canvas ref={canvasRef} style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',zIndex:2,pointerEvents:'none'}}/>
        <div style={{position:'relative',zIndex:3,maxWidth:600,margin:'0 auto',padding:'1rem 1rem 4rem',fontFamily:"'Crimson Pro',serif"}}>
          {/* Nav */}
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',paddingBottom:'.5rem'}}>
            <button className="kq-nav-btn" onClick={()=>setPhase('setup')}>✕ Exit</button>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'.62rem',color:'rgba(80,190,130,0.5)',textAlign:'center'}}>
              {prog} / {total}
              <div style={{color:'rgba(60,200,110,0.6)'}}>{history.filter(h=>h.correct).length} correct</div>
            </div>
            <div style={{width:56}}/>
          </div>

          {/* Progress bar */}
          <div style={{height:3,borderRadius:2,background:'rgba(30,80,50,0.4)',marginBottom:'1.4rem',overflow:'hidden'}}>
            <div style={{height:'100%',borderRadius:2,background:'linear-gradient(90deg,#1a7a40,#2fb870)',width:`${(prog/total)*100}%`,transition:'width .4s'}}/>
          </div>

          {/* Prompt */}
          <div style={{...dc,padding:'1.4rem 1.2rem',marginBottom:'1.1rem',textAlign:'center'}}>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'.52rem',letterSpacing:'.16em',color:'rgba(80,190,140,0.38)',marginBottom:'.55rem'}}>{q.promptLabel}</div>
            <div style={{fontFamily:"'Crimson Pro',serif",fontSize:'1.18rem',lineHeight:1.5,color:'rgba(190,245,215,0.88)',fontStyle:'italic'}}>{q.prompt}</div>
          </div>

          {/* Choices */}
          <div style={{display:'flex',flexDirection:'column',gap:'.55rem',
            animation:shake?'slShake .45s ease':'none'}}>
            <style>{`@keyframes slShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}`}</style>
            {q.choices.map((choice,i)=>{
              const isChosen=chosen===choice;
              const isCorrect=choice===q.answer;
              const revealed=chosen!==null;
              let bg,border,color;
              if(!revealed){
                bg='rgba(5,22,14,0.75)'; border='rgba(60,160,100,0.28)'; color='rgba(150,230,185,0.8)';
              } else if(isCorrect){
                bg='rgba(20,120,55,0.28)'; border='rgba(50,220,110,0.65)'; color='rgba(120,240,165,0.95)';
              } else if(isChosen){
                bg='rgba(140,25,25,0.28)'; border='rgba(220,60,60,0.55)'; color='rgba(240,110,110,0.9)';
              } else {
                bg='rgba(5,18,12,0.4)'; border='rgba(40,100,65,0.18)'; color='rgba(80,160,110,0.35)';
              }
              return (
                <button key={i} onClick={()=>handleChoice(choice)} disabled={chosen!==null}
                  style={{fontFamily:"'Crimson Pro',serif",fontSize:'1.02rem',lineHeight:1.45,
                    padding:'.78rem 1.1rem',borderRadius:10,border:`1px solid ${border}`,
                    background:bg,color,cursor:chosen===null?'pointer':'default',
                    textAlign:'left',transition:'all .2s',
                    display:'flex',alignItems:'center',justifyContent:'space-between',gap:'.5rem'}}>
                  <span>{q.displayFn(choice)}</span>
                  {revealed&&isCorrect&&<span style={{fontSize:'1.1rem'}}>✓</span>}
                  {revealed&&isChosen&&!isCorrect&&<span style={{fontSize:'1.1rem'}}>✗</span>}
                </button>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  /* ── RESULTS ── */
  const correct=history.filter(h=>h.correct).length;
  const pct=history.length>0?Math.round((correct/history.length)*100):0;
  return (
    <div style={{position:'relative',minHeight:'100vh'}}>
      <canvas ref={canvasRef} style={{position:'fixed',top:0,left:0,width:'100%',height:'100%',zIndex:2,pointerEvents:'none'}}/>
      <div style={{position:'relative',zIndex:3,maxWidth:600,margin:'0 auto',padding:'1rem 1rem 5rem',fontFamily:"'Crimson Pro',serif"}}>
        <div style={{paddingTop:'3rem',textAlign:'center',marginBottom:'1.4rem'}}>
          <div style={{fontFamily:'Cinzel,serif',fontSize:'1.35rem',letterSpacing:'.08em',color:'rgba(140,230,180,0.9)'}}>Results</div>
        </div>
        <div style={{...dc,padding:'1.4rem',textAlign:'center',marginBottom:'1rem'}}>
